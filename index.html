function renderBidAnalytics() {
  ensureEstimating();
  const decided = db.bids.filter(b => b.status === 'Won' || b.status === 'Lost');

  if (decided.length < 2) {
    return `<div class="table-empty" style="padding:40px"><h3 style="color:var(--text-secondary)">Not enough data yet</h3><p style="margin-top:6px;font-size:0.85rem">You need at least 2 decided bids (Won or Lost) to see analytics. Keep tracking your bids!</p></div>`;
  }

  return `
    ${renderWinRateByGC()}
    ${renderWinRateBySize()}
    ${renderWinRateByProfit()}
    ${renderWinRateOverTime()}
    ${renderLostReasons()}
    ${renderBidHelper()}`;
}

function renderWinRateByGC() {
  const decided = db.bids.filter(b => b.status === 'Won' || b.status === 'Lost');
  const gcs = [...new Set(decided.map(b => b.gc).filter(Boolean))];
  if (!gcs.length) return '';

  const rows = gcs.map(gc => {
    const gcBids = decided.filter(b => b.gc === gc);
    const wins = gcBids.filter(b => b.status === 'Won');
    const winRate = Math.round(wins.length / gcBids.length * 100);
    const avgWinProfit = wins.length ? (wins.reduce((s,b) => s + (parseFloat(b.profitPct)||0), 0) / wins.length).toFixed(1) : '—';
    const losses = gcBids.filter(b => b.status === 'Lost');
    const avgLossProfit = losses.length ? (losses.reduce((s,b) => s + (parseFloat(b.profitPct)||0), 0) / losses.length).toFixed(1) : '—';
    return `<tr>
      <td style="font-weight:600">${gc}</td>
      <td style="text-align:center">${gcBids.length}</td>
      <td style="text-align:center;color:#22c55e;font-weight:700">${wins.length}</td>
      <td style="text-align:center"><div class="est-wr-bar" style="width:100px;display:inline-flex"><div class="est-wr-fill" style="width:${winRate}%">${winRate}%</div></div></td>
      <td style="text-align:center;font-weight:600;color:#22c55e">${avgWinProfit}%</td>
      <td style="text-align:center;font-weight:600;color:#ef4444">${avgLossProfit}%</td>
    </tr>`;
  }).sort((a,b) => 0).join('');

  return `<div class="est-analytics-card">
    <div class="est-analytics-title">Win Rate by General Contractor</div>
    <table class="data-table"><thead><tr><th>GC</th><th style="text-align:center">Bids</th><th style="text-align:center">Wins</th><th style="text-align:center">Win Rate</th><th style="text-align:center">Avg Win Profit</th><th style="text-align:center">Avg Loss Profit</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

function renderWinRateBySize() {
  const decided = db.bids.filter(b => b.status === 'Won' || b.status === 'Lost');
  const sizes = ['Small','Medium','Large','Major'];

  const rows = sizes.map(size => {
    const sizeBids = decided.filter(b => (b.sizeCategory || getBidSizeCategory(b.bidAmount)) === size);
    if (!sizeBids.length) return '';
    const wins = sizeBids.filter(b => b.status === 'Won');
    const winRate = Math.round(wins.length / sizeBids.length * 100);
    const avgWinProfit = wins.length ? (wins.reduce((s,b) => s + (parseFloat(b.profitPct)||0), 0) / wins.length).toFixed(1) : '—';
    return `<tr>
      <td><span class="status-badge est-size-${size}">${size}</span> <span style="font-size:0.78rem;color:var(--text-muted)">${getBidSizeLabel(size)}</span></td>
      <td style="text-align:center">${sizeBids.length}</td>
      <td style="text-align:center;color:#22c55e;font-weight:700">${wins.length}</td>
      <td style="text-align:center"><div class="est-wr-bar" style="width:100px;display:inline-flex"><div class="est-wr-fill" style="width:${winRate}%">${winRate}%</div></div></td>
      <td style="text-align:center;font-weight:600">${avgWinProfit}%</td>
    </tr>`;
  }).filter(Boolean).join('');

  if (!rows) return '';
  return `<div class="est-analytics-card">
    <div class="est-analytics-title">Win Rate by Project Size</div>
    <table class="data-table"><thead><tr><th>Size</th><th style="text-align:center">Bids</th><th style="text-align:center">Wins</th><th style="text-align:center">Win Rate</th><th style="text-align:center">Avg Winning Profit</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

function renderWinRateByProfit() {
  const decided = db.bids.filter(b => (b.status === 'Won' || b.status === 'Lost') && b.profitPct);
  if (!decided.length) return '';

  const ranges = [
    { label: '0–5%', min: 0, max: 5 },
    { label: '5–10%', min: 5, max: 10 },
    { label: '10–15%', min: 10, max: 15 },
    { label: '15–20%', min: 15, max: 20 },
    { label: '20%+', min: 20, max: 999 }
  ];

  const rows = ranges.map(r => {
    const rangeBids = decided.filter(b => {
      const pct = parseFloat(b.profitPct) || 0;
      return pct >= r.min && pct < r.max;
    });
    if (!rangeBids.length) return '';
    const wins = rangeBids.filter(b => b.status === 'Won');
    const winRate = Math.round(wins.length / rangeBids.length * 100);
    return `<tr>
      <td style="font-weight:600">${r.label}</td>
      <td style="text-align:center">${rangeBids.length}</td>
      <td style="text-align:center;color:#22c55e;font-weight:700">${wins.length}</td>
      <td style="text-align:center"><div class="est-wr-bar" style="width:100px;display:inline-flex"><div class="est-wr-fill" style="width:${winRate}%">${winRate}%</div></div></td>
    </tr>`;
  }).filter(Boolean).join('');

  if (!rows) return '';
  return `<div class="est-analytics-card">
    <div class="est-analytics-title">Win Rate by Profit Percentage</div>
    <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:10px">Shows your sweet spot — which profit margins win the most work</p>
    <table class="data-table"><thead><tr><th>Profit Range</th><th style="text-align:center">Bids</th><th style="text-align:center">Wins</th><th style="text-align:center">Win Rate</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

function renderWinRateOverTime() {
  const decided = db.bids.filter(b => (b.status === 'Won' || b.status === 'Lost') && b.bidDate);
  if (decided.length < 3) return '';

  // Group by quarter
  const quarters = {};
  decided.forEach(b => {
    const d = new Date(b.bidDate + 'T00:00:00');
    const q = Math.ceil((d.getMonth() + 1) / 3);
    const key = d.getFullYear() + ' Q' + q;
    if (!quarters[key]) quarters[key] = { total: 0, wins: 0 };
    quarters[key].total++;
    if (b.status === 'Won') quarters[key].wins++;
  });

  const sortedKeys = Object.keys(quarters).sort();
  const rows = sortedKeys.map(k => {
    const q = quarters[k];
    const wr = Math.round(q.wins / q.total * 100);
    return `<tr>
      <td style="font-weight:600">${k}</td>
      <td style="text-align:center">${q.total}</td>
      <td style="text-align:center;color:#22c55e;font-weight:700">${q.wins}</td>
      <td style="text-align:center"><div class="est-wr-bar" style="width:100px;display:inline-flex"><div class="est-wr-fill" style="width:${wr}%">${wr}%</div></div></td>
    </tr>`;
  }).join('');

  return `<div class="est-analytics-card">
    <div class="est-analytics-title">Win Rate Over Time (Quarterly)</div>
    <table class="data-table"><thead><tr><th>Quarter</th><th style="text-align:center">Bids</th><th style="text-align:center">Wins</th><th style="text-align:center">Win Rate</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

function renderLostReasons() {
  const lost = db.bids.filter(b => b.status === 'Lost' && b.lostReason);
  if (!lost.length) return '';

  const reasons = {};
  lost.forEach(b => {
    if (!reasons[b.lostReason]) reasons[b.lostReason] = 0;
    reasons[b.lostReason]++;
  });

  const sorted = Object.entries(reasons).sort((a,b) => b[1] - a[1]);
  const maxCount = sorted[0][1];

  const rows = sorted.map(([reason, count]) => {
    const pct = Math.round(count / lost.length * 100);
    return `<tr>
      <td style="font-weight:600">${reason}</td>
      <td style="text-align:center">${count}</td>
      <td style="text-align:center">${pct}%</td>
      <td><div style="background:#fee2e2;border-radius:4px;height:16px;width:${Math.round(count/maxCount*100)}%"></div></td>
    </tr>`;
  }).join('');

  return `<div class="est-analytics-card">
    <div class="est-analytics-title">Why We Lose</div>
    <table class="data-table"><thead><tr><th>Reason</th><th style="text-align:center">Count</th><th style="text-align:center">% of Losses</th><th>Distribution</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

function renderBidHelper() {
  // "What should I bid?" — show sweet spots
  const decided = db.bids.filter(b => (b.status === 'Won' || b.status === 'Lost') && b.profitPct);
  if (decided.length < 5) return '';

  const wins = decided.filter(b => b.status === 'Won');
  if (!wins.length) return '';

  const avgWinProfit = (wins.reduce((s,b) => s + (parseFloat(b.profitPct)||0), 0) / wins.length).toFixed(1);
  const minWinProfit = Math.min(...wins.map(b => parseFloat(b.profitPct) || 0)).toFixed(1);
  const maxWinProfit = Math.max(...wins.map(b => parseFloat(b.profitPct) || 0)).toFixed(1);

  // Find the profit range with highest win rate
  const ranges = [[0,5],[5,10],[10,15],[15,20],[20,100]];
  let bestRange = null, bestRate = 0;
  ranges.forEach(([min,max]) => {
    const rangeBids = decided.filter(b => { const p = parseFloat(b.profitPct)||0; return p >= min && p < max; });
    if (rangeBids.length >= 2) {
      const rate = rangeBids.filter(b => b.status === 'Won').length / rangeBids.length;
      if (rate > bestRate) { bestRate = rate; bestRange = [min, max]; }
    }
  });

  return `<div class="est-analytics-card" style="background:#f0fdf4;border-color:#86efac">
    <div class="est-analytics-title" style="color:#22c55e">Bidding Sweet Spot</div>
    <div style="font-size:0.9rem;color:var(--text);line-height:1.7">
      <div>Your winning bids have averaged <strong>${avgWinProfit}% profit</strong> (range: ${minWinProfit}% – ${maxWinProfit}%)</div>
      ${bestRange ? `<div>Your best win rate (${Math.round(bestRate*100)}%) is in the <strong>${bestRange[0]}–${bestRange[1]}% profit range</strong></div>` : ''}
      <div style="margin-top:8px;font-size:0.82rem;color:var(--text-secondary)">Based on ${decided.length} decided bids (${wins.length} won, ${decided.length - wins.length} lost)</div>
    </div>
  </div>`;
}

// ── CASH FLOW FORECAST ───────────────────────────────────────
let cfState = {
  months: 12,
  paymentLag: 30,
  materialInflation: 0,
  excludedProjects: {},
  overhead: []
};

function loadCFState() {
  try {
    const s = localStorage.getItem('electricalPM_cashFlow');
    if (s) {
      const parsed = JSON.parse(s);
      cfState = { ...cfState, ...parsed };
    }
  } catch(e) {}
}

function saveCFState() {
  localStorage.setItem('electricalPM_cashFlow', JSON.stringify(cfState));
}

function getMonthLabel(date) {
  return date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
}

function getMonthKey(date) {
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0');
}

function getMonthRange(numMonths) {
  const months = [];
  const now = new Date();
  for (let i = 0; i < numMonths; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    months.push({ date: d, label: getMonthLabel(d), key: getMonthKey(d) });
  }
  return months;
}

function getProjectMonthSpan(p) {
  const start = p.startDate ? new Date(p.startDate + 'T00:00:00') : null;
  const end = p.completionDate ? new Date(p.completionDate + 'T00:00:00') : null;
  return { start, end };
}

function monthsBetween(d1, d2) {
  return (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth()) + 1;
}

function buildCashFlowData() {
  loadCFState();
  const months = getMonthRange(cfState.months);
  const projects = db.projects.filter(p =>
    p.status !== 'Cancelled' && !cfState.excludedProjects[p.id]
  );

  // Initialize monthly data
  const data = months.map(m => ({
    ...m,
    revenue: 0,
    laborCost: 0,
    materialCost: 0,
    overheadCost: 0,
    totalIn: 0,
    totalOut: 0,
    net: 0,
    balance: 0
  }));

  // Revenue: spread contract value + approved COs across project duration, shifted by payment lag
  projects.forEach(p => {
    const span = getProjectMonthSpan(p);
    if (!span.start || !span.end) return;
    const contractVal = getUpdatedContractValue(p);
    if (!contractVal) return;
    const projMonths = Math.max(1, monthsBetween(span.start, span.end));
    const monthlyRevenue = contractVal / projMonths;

    // For each project month, figure out which forecast month it lands in (with payment lag)
    for (let i = 0; i < projMonths; i++) {
      const workMonth = new Date(span.start.getFullYear(), span.start.getMonth() + i, 1);
      // Apply payment lag
      const lagDays = cfState.paymentLag;
      const payDate = new Date(workMonth.getFullYear(), workMonth.getMonth() + 1, lagDays); // end of work month + lag
      const payKey = getMonthKey(payDate);
      const idx = data.findIndex(d => d.key === payKey);
      if (idx >= 0) data[idx].revenue += monthlyRevenue;
    }
  });

  // Labor: project current monthly labor cost forward for active projects
  projects.forEach(p => {
    ensureBudget(p);
    const span = getProjectMonthSpan(p);
    if (!span.start || !span.end) return;
    const b = p.budget;
    if (!b.laborEntries || !b.laborEntries.length) return;

    // Calculate current monthly labor cost from entries
    // Use quoted labor spread across project months, or current burn rate
    let monthlyLabor = 0;
    const projMonths = Math.max(1, monthsBetween(span.start, span.end));

    if (b.quotedLabor && parseFloat(b.quotedLabor) > 0) {
      monthlyLabor = parseFloat(b.quotedLabor) / projMonths;
    } else {
      // Estimate from current entries: total cost / months elapsed so far
      b.laborEntries.forEach(le => {
        const emp = db.employees ? db.employees.find(e => e.id === le.employeeId) : null;
        if (!emp) return;
        const rate = parseFloat(emp.rate) || 0;
        const otRate = parseFloat(emp.otRate) || 0;
        const hrs = parseFloat(le.hours) || 0;
        const otHrs = parseFloat(le.otHours) || 0;
        const totalCost = (rate * hrs) + (otRate * otHrs);
        // Spread over project duration
        monthlyLabor += totalCost / projMonths;
      });
    }

    // Apply to each month the project is active
    for (let i = 0; i < projMonths; i++) {
      const workMonth = new Date(span.start.getFullYear(), span.start.getMonth() + i, 1);
      const workKey = getMonthKey(workMonth);
      const idx = data.findIndex(d => d.key === workKey);
      if (idx >= 0) data[idx].laborCost += monthlyLabor;
    }
  });

  // Materials: spread material budgets across project duration
  projects.forEach(p => {
    ensureBudget(p);
    const span = getProjectMonthSpan(p);
    if (!span.start || !span.end) return;
    const b = p.budget;
    const projMonths = Math.max(1, monthsBetween(span.start, span.end));

    let totalMaterial = 0;
    MATERIAL_CATS.forEach(cat => {
      const m = b.materials[cat] || {};
      // Use quoted if available, otherwise actual
      const val = parseFloat(m.quoted) || parseFloat(m.actual) || 0;
      totalMaterial += val;
    });

    // Apply inflation
    totalMaterial *= (1 + cfState.materialInflation / 100);
    const monthlyMaterial = totalMaterial / projMonths;

    for (let i = 0; i < projMonths; i++) {
      const workMonth = new Date(span.start.getFullYear(), span.start.getMonth() + i, 1);
      const workKey = getMonthKey(workMonth);
      const idx = data.findIndex(d => d.key === workKey);
      if (idx >= 0) data[idx].materialCost += monthlyMaterial;
    }
  });

  // Overhead: fixed monthly costs
  (cfState.overhead || []).forEach(oh => {
    const amt = parseFloat(oh.amount) || 0;
    if (oh.type === 'monthly') {
      data.forEach(d => d.overheadCost += amt);
    } else if (oh.type === 'one-time' && oh.month) {
      const idx = data.findIndex(d => d.key === oh.month);
      if (idx >= 0) data[idx].overheadCost += amt;
    }
  });

  // Calculate totals and running balance
  let runningBalance = 0;
  data.forEach(d => {
    d.totalIn = d.revenue;
    d.totalOut = d.laborCost + d.materialCost + d.overheadCost;
    d.net = d.totalIn - d.totalOut;
    runningBalance += d.net;
    d.balance = runningBalance;
  });

  return data;
}

function renderCashFlow() {
  loadCFState();
  const data = buildCashFlowData();
  const months = getMonthRange(cfState.months);
  const projects = db.projects.filter(p => p.status !== 'Cancelled');

  // Project toggles
  const toggles = projects.map(p => {
    const active = !cfState.excludedProjects[p.id];
    const val = getUpdatedContractValue(p);
    return `<label class="cf-toggle ${active?'active':''}" onclick="toggleCFProject('${p.id}')">
      <input type="checkbox" ${active?'checked':''}>
      ${p.name} ${val ? '('+fmtMoney(val)+')' : ''}
    </label>`;
  }).join('');

  // Chart
  const maxVal = Math.max(...data.map(d => Math.max(d.totalIn, d.totalOut)), 1);
  const chartBars = data.map(d => {
    const inH = Math.round((d.totalIn / maxVal) * 140);
    const outH = Math.round((d.totalOut / maxVal) * 140);
    return `<div class="cf-bar-group">
      <div class="cf-bar-stack">
        <div class="cf-bar revenue" style="height:${inH}px" title="In: ${fmtMoneyPlain(d.totalIn)}"></div>
        <div class="cf-bar expense" style="height:${outH}px" title="Out: ${fmtMoneyPlain(d.totalOut)}"></div>
      </div>
      <div class="cf-bar-label">${d.label}</div>
    </div>`;
  }).join('');

  // Summary chips
  const totalIn = data.reduce((s,d) => s + d.totalIn, 0);
  const totalOut = data.reduce((s,d) => s + d.totalOut, 0);
  const totalNet = totalIn - totalOut;
  const lowestBalance = Math.min(...data.map(d => d.balance));

  // Month headers
  const monthHeaders = data.map(d => `<th class="cf-month-header">${d.label}</th>`).join('');

  // Table rows
  const revenueRow = data.map(d => `<td style="text-align:right;font-weight:600;color:#22c55e">${d.revenue ? fmtMoneyPlain(d.revenue) : '—'}</td>`).join('');
  const laborRow = data.map(d => `<td style="text-align:right;color:#dc2626">${d.laborCost ? fmtMoneyPlain(d.laborCost) : '—'}</td>`).join('');
  const materialRow = data.map(d => `<td style="text-align:right;color:#dc2626">${d.materialCost ? fmtMoneyPlain(d.materialCost) : '—'}</td>`).join('');
  const overheadRow = data.map(d => `<td style="text-align:right;color:#dc2626">${d.overheadCost ? fmtMoneyPlain(d.overheadCost) : '—'}</td>`).join('');
  const totalInRow = data.map(d => `<td style="text-align:right;font-weight:700;color:#22c55e">${fmtMoneyPlain(d.totalIn)}</td>`).join('');
  const totalOutRow = data.map(d => `<td style="text-align:right;font-weight:700;color:#dc2626">${fmtMoneyPlain(d.totalOut)}</td>`).join('');
  const netRow = data.map(d => `<td style="text-align:right;font-weight:800;color:${d.net>=0?'#166534':'#dc2626'}">${d.net>=0?'+':''}${fmtMoneyPlain(d.net)}</td>`).join('');
  const balanceRow = data.map(d => `<td style="text-align:right;font-weight:800;color:${d.balance>=0?'var(--accent-hex)':'#ef4444'}">${fmtMoneyPlain(d.balance)}</td>`).join('');

  // Overhead items list
  const overheadItems = (cfState.overhead || []).map((oh, i) => {
    const monthSel = oh.type === 'one-time'
      ? `<select onchange="updateOverhead(${i},'month',this.value)" style="padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:0.82rem">${months.map(m => `<option value="${m.key}" ${oh.month===m.key?'selected':''}>${m.label}</option>`).join('')}</select>`
      : '';
    return `<div class="cf-overhead-row">
      <input value="${oh.name||''}" placeholder="Name" onblur="updateOverhead(${i},'name',this.value)" style="flex:1">
      <input value="${oh.amount||''}" placeholder="$0.00" type="number" onblur="updateOverhead(${i},'amount',this.value)" style="width:110px">
      <select onchange="updateOverhead(${i},'type',this.value);renderCashFlow()" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.82rem">
        <option value="monthly" ${oh.type==='monthly'?'selected':''}>Monthly</option>
        <option value="one-time" ${oh.type==='one-time'?'selected':''}>One-Time</option>
      </select>
      ${monthSel}

function fmtMoneyPlain(v) {
  const n = parseFloat(v);
  if (!n || isNaN(n)) return '$0';
  return '$' + Math.round(n).toLocaleString('en-US');
}

function toggleCFProject(id) {
  if (cfState.excludedProjects[id]) delete cfState.excludedProjects[id];
  else cfState.excludedProjects[id] = true;
  saveCFState();
  renderCashFlow();
}

function addOverhead() {
  if (!cfState.overhead) cfState.overhead = [];
  const months = getMonthRange(cfState.months);
  cfState.overhead.push({ name: '', amount: '', type: 'monthly', month: months[0]?.key || '' });
  saveCFState();
  renderCashFlow();
}

function updateOverhead(idx, field, value) {
  cfState.overhead[idx][field] = value;
  saveCFState();
  if (field !== 'name') renderCashFlow();
}

function removeOverhead(idx) {
  cfState.overhead.splice(idx, 1);
  saveCFState();
  renderCashFlow();
}

// ── FLEET & TOOLS ────────────────────────────────────────────
function ensureFleet() {
  if (!db.vehicles) db.vehicles = [];
  if (!db.tools) db.tools = [];
}

function getVehicleAlerts() {
  ensureFleet();
  const alerts = [];
  const today = new Date(); today.setHours(0,0,0,0);
  const warn30 = new Date(today); warn30.setDate(warn30.getDate() + 30);
  db.vehicles.forEach(v => {
    if (v.insuranceExp) {
      const d = new Date(v.insuranceExp + 'T00:00:00');
      if (d < today) alerts.push({ type: 'danger', msg: `${v.unit || v.yearMakeModel} — Insurance EXPIRED (${fmtDate(v.insuranceExp)})`, vid: v.id });
      else if (d <= warn30) alerts.push({ type: 'warn', msg: `${v.unit || v.yearMakeModel} — Insurance expires ${fmtDate(v.insuranceExp)}`, vid: v.id });
    }
    if (v.registrationExp) {
      const d = new Date(v.registrationExp + 'T00:00:00');
      if (d < today) alerts.push({ type: 'danger', msg: `${v.unit || v.yearMakeModel} — Registration EXPIRED (${fmtDate(v.registrationExp)})`, vid: v.id });
      else if (d <= warn30) alerts.push({ type: 'warn', msg: `${v.unit || v.yearMakeModel} — Registration expires ${fmtDate(v.registrationExp)}`, vid: v.id });
    }
    if (v.status === 'In Shop') alerts.push({ type: 'warn', msg: `${v.unit || v.yearMakeModel} — Currently in shop`, vid: v.id });
    if (v.status === 'Out of Service') alerts.push({ type: 'danger', msg: `${v.unit || v.yearMakeModel} — Out of service`, vid: v.id });
  });
  db.tools.forEach(t => {
    if (t.condition === 'Needs Repair') alerts.push({ type: 'danger', msg: `${t.name} (${t.serialNumber||'no serial'}) — Needs repair`, tid: t.id });
    if (t.condition === 'Out of Service') alerts.push({ type: 'danger', msg: `${t.name} — Out of service`, tid: t.id });
  });
  return alerts;
}

function renderFleetTools() {
  ensureFleet();
  const alerts = getVehicleAlerts();

  const alertHtml = alerts.length ? alerts.map(a =>
    `<div class="ft-alert ft-alert-${a.type}">${a.msg}</div>`
  ).join('') : '';

  const tabBar = `<div class="ft-tab-bar">
    <button class="ft-tab ${ftTab==='vehicles'?'active':''}" onclick="ftTab='vehicles';renderFleetTools()">Vehicles (${db.vehicles.length})</button>
    <button class="ft-tab ${ftTab==='tools'?'active':''}" onclick="ftTab='tools';renderFleetTools()">Tools &amp; Equipment (${db.tools.length})</button>
  </div>`;

  let content = '';
  if (ftTab === 'vehicles') content = renderVehiclesList();
  else content = renderToolsList();

  document.getElementById('mainContent').innerHTML = `
    <div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--glass-border);margin-bottom:16px">
      <div class="section-header"><h3>Fleet &amp; Tools</h3></div>
      ${alertHtml ? `<div style="margin-bottom:16px">${alertHtml}</div>` : ''}
      ${tabBar}
      ${content}
    </div>`;
}

function saveVehicle(id) {
  ensureFleet();
  const data = {
    unit: val('v_unit').trim(),
    yearMakeModel: val('v_ymm'),
    vin: val('v_vin'),
    plate: val('v_plate'),
    status: val('v_status'),
    assignedTo: val('v_assigned'),
    currentMileage: val('v_mileage'),
    insurancePolicy: val('v_insPolicy'),
    insuranceExp: val('v_insExp'),
    registrationExp: val('v_regExp'),
    monthlyFuel: val('v_fuelCost')
  };
  if (!data.unit && !data.yearMakeModel) { alert('Enter a unit name or vehicle description.'); return; }
  if (id) {
    const v = db.vehicles.find(x => x.id === id);
    Object.assign(v, data);
  } else {
    data.id = genId();
    data.mileageLog = [];
    data.maintenance = [];
    db.vehicles.push(data);
  }
  saveData(); closeModal(); renderFleetTools(); showToast('Vehicle saved!');
}

function deleteVehicle(id) {
  if (!confirm('Delete this vehicle and all its logs?')) return;
  db.vehicles = db.vehicles.filter(v => v.id !== id);
  saveData(); closeModal(); renderFleetTools(); showToast('Vehicle deleted.');
}

function addMileageEntry(vid) {
  const v = db.vehicles.find(x => x.id === vid);
  if (!v) return;
  const date = val('ml_date');
  const miles = val('ml_miles');
  if (!miles) { alert('Enter mileage.'); return; }
  if (!v.mileageLog) v.mileageLog = [];
  v.mileageLog.push({ date, mileage: miles });
  v.currentMileage = miles;
  saveData(); openVehicleDetail(vid); showToast('Mileage logged!');
}

function deleteMileageEntry(vid, idx) {
  const v = db.vehicles.find(x => x.id === vid);
  v.mileageLog.splice(idx, 1);
  saveData(); openVehicleDetail(vid);
}

function addMaintEntry(vid) {
  const v = db.vehicles.find(x => x.id === vid);
  if (!v) return;
  const date = val('mt_date');
  const desc = val('mt_desc').trim();
  if (!desc) { alert('Enter a description.'); return; }
  if (!v.maintenance) v.maintenance = [];
  v.maintenance.push({ date, description: desc, vendor: val('mt_vendor'), cost: val('mt_cost') });
  saveData(); openVehicleDetail(vid); showToast('Maintenance logged!');
}

function deleteMaintEntry(vid, idx) {
  const v = db.vehicles.find(x => x.id === vid);
  v.maintenance.splice(idx, 1);
  saveData(); openVehicleDetail(vid);
}

function renderToolsList() {
  ensureFleet();
  if (!db.tools.length) {
    return `<div class="section-header"><h3>Tools &amp; Equipment</h3><button class="btn btn-primary btn-sm" onclick="openToolModal()">+ Add Tool</button></div>
      <div class="no-projects" style="padding:40px"><div style="font-size:2.5rem;margin-bottom:12px">🔧</div><h3 style="color:var(--text-secondary)">No tools yet</h3><p style="margin-top:6px;font-size:0.85rem">Click "+ Add Tool" to get started</p></div>`;
  }
  const cards = db.tools.map(t => {
    const condCls = 'ft-status-' + (t.condition || 'Good').replace(/\s/g, '');
    const assignLabel = getToolAssignLabel(t);
    return `<div class="ft-card" onclick="openToolDetail('${t.id}')">
      <div class="ft-card-header">
        <div class="ft-card-title">${t.name}</div>
        <span class="ft-status ${condCls}">${t.condition || 'Good'}</span>
      </div>
      <div class="ft-card-sub">${t.serialNumber ? 'S/N: '+t.serialNumber : ''} ${t.category ? `<span class="ft-cat-badge">${t.category}</span>` : ''}</div>
      <div class="ft-card-detail">
        ${assignLabel ? `<span class="ft-assign-badge">${assignLabel}</span>` : '<span>Unassigned</span>'}
        ${t.purchaseCost ? `<span>${fmtMoneyPlain(parseFloat(t.purchaseCost))}</span>` : ''}
      </div>
    </div>`;
  }).join('');
  return `<div class="section-header"><h3>Tools &amp; Equipment</h3><button class="btn btn-primary btn-sm" onclick="openToolModal()">+ Add Tool</button></div>
    <div class="ft-cards">${cards}</div>`;
}

function getToolAssignLabel(t) {
  if (!t.assignType || !t.assignId) return '';
  if (t.assignType === 'employee') {
    const emp = (db.employees || []).find(e => e.id === t.assignId);
    return emp ? emp.name : 'Unknown';
  }
  if (t.assignType === 'project') {
    const p = db.projects.find(p => p.id === t.assignId);
    return p ? p.name : 'Unknown';
  }
  if (t.assignType === 'vehicle') {
    const v = (db.vehicles || []).find(v => v.id === t.assignId);
    return v ? (v.unit || v.yearMakeModel) : 'Unknown';
  }
  if (t.assignType === 'shop') return 'Shop';
  return '';
}

function getAssignOptions(t) {
  const empOpts = (db.employees || []).map(e => `<option value="employee|${e.id}" ${t.assignType==='employee'&&t.assignId===e.id?'selected':''}>${e.name}</option>`).join('');
  const projOpts = db.projects.filter(p => p.status !== 'Cancelled' && p.status !== 'Completed').map(p => `<option value="project|${p.id}" ${t.assignType==='project'&&t.assignId===p.id?'selected':''}>${p.name}</option>`).join('');
  const vehOpts = (db.vehicles || []).map(v => `<option value="vehicle|${v.id}" ${t.assignType==='vehicle'&&t.assignId===v.id?'selected':''}>${v.unit||v.yearMakeModel}</option>`).join('');
  const shopSel = t.assignType === 'shop' ? 'selected' : '';
  return `<option value="">Unassigned</option>
    <option value="shop|shop" ${shopSel}>Shop</option>
    <optgroup label="Employees">${empOpts}</optgroup>
    <optgroup label="Projects">${projOpts}</optgroup>
    <optgroup label="Vehicles">${vehOpts}</optgroup>`;
}

function openToolModal(id) {
  ensureFleet();
  const t = id ? db.tools.find(x => x.id === id) : {};
  const title = id ? 'Edit Tool' : 'Add Tool';
  const catOpts = TOOL_CATS.map(c => `<option value="${c}" ${t.category===c?'selected':''}>${c}</option>`).join('');
  const condOpts = ['Good','Fair','Needs Repair','Out of Service'].map(c => `<option value="${c}" ${(t.condition||'Good')===c?'selected':''}>${c}</option>`).join('');
  modal(title,
    `<div class="form-group"><label>Item Name *</label><input id="t_name" value="${t.name||''}" placeholder="e.g. Hilti Drill, Greenlee Bender"></div>
     <div class="form-row">
       <div class="form-group"><label>Serial #</label><input id="t_serial" value="${t.serialNumber||''}"></div>
       <div class="form-group"><label>Category</label><select id="t_cat">${catOpts}</select></div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>Condition</label><select id="t_cond">${condOpts}</select></div>
       <div class="form-group"><label>Assigned To</label><select id="t_assign">${getAssignOptions(t)}</select></div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>Purchase Date</label><input id="t_purchDate" type="date" value="${t.purchaseDate||''}"></div>
       <div class="form-group"><label>Purchase Cost ($)</label><input id="t_purchCost" type="number" value="${t.purchaseCost||''}" placeholder="0.00"></div>
     </div>
     ${id ? `<div class="form-section-title" style="color:#dc2626;border-top-color:#fee2e2">Danger Zone</div><button class="btn btn-danger" onclick="deleteTool('${id}')">Delete Tool</button>` : ''}`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveTool('${id||''}')">Save</button>`);
}

function saveTool(id) {
  ensureFleet();
  const name = val('t_name').trim();
  if (!name) { alert('Enter a tool name.'); return; }
  const assignVal = val('t_assign');
  let assignType = '', assignId = '';
  if (assignVal) {
    const parts = assignVal.split('|');
    assignType = parts[0];
    assignId = parts[1];
  }
  const data = {
    name,
    serialNumber: val('t_serial'),
    category: val('t_cat'),
    condition: val('t_cond'),
    assignType,
    assignId,
    purchaseDate: val('t_purchDate'),
    purchaseCost: val('t_purchCost')
  };
  if (id) {
    const t = db.tools.find(x => x.id === id);
    // Log assignment change
    const oldAssign = getToolAssignLabel(t);
    Object.assign(t, data);
    const newAssign = getToolAssignLabel(t);
    if (oldAssign !== newAssign) {
      if (!t.checkLog) t.checkLog = [];
      t.checkLog.push({ date: new Date().toISOString().slice(0,10), from: oldAssign || 'Unassigned', to: newAssign || 'Unassigned' });
    }
  } else {
    data.id = genId();
    data.checkLog = [];
    db.tools.push(data);
  }
  saveData(); closeModal(); renderFleetTools(); showToast('Tool saved!');
}

function deleteTool(id) {
  if (!confirm('Delete this tool?')) return;
  db.tools = db.tools.filter(t => t.id !== id);
  saveData(); closeModal(); renderFleetTools(); showToast('Tool deleted.');
}

          <div style="font-size:0.85rem;color:var(--text-secondary);margin-top:4px">${t.serialNumber ? 'S/N: '+t.serialNumber : ''} ${t.category ? `<span class="ft-cat-badge" style="margin-left:4px">${t.category}</span>` : ''}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="showFleetTools('tools')">Back to Tools</button>
          <button class="btn btn-secondary btn-sm" onclick="openToolModal('${id}')">Edit</button>
        </div>
      </div>
      <div class="info-grid" style="margin-top:16px">
        <div class="info-item"><label>Current Location</label><value><span class="ft-assign-badge">${assignLabel}</span></value></div>
        <div class="info-item"><label>Category</label><value>${t.category || '<span class="empty">—</span>'}</value></div>
        <div class="info-item"><label>Purchase Date</label><value>${fmtDate(t.purchaseDate)}</value></div>
        <div class="info-item"><label>Purchase Cost</label><value>${t.purchaseCost ? fmtMoney(t.purchaseCost) : '<span class="empty">—</span>'}</value></div>
      </div>
    </div>

    <div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--glass-border);margin-bottom:16px">
      <div class="section-header"><h3>Quick Reassign</h3></div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="tool_reassign" style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.85rem">${assignOpts}</select>
        <button class="btn btn-primary btn-sm" onclick="reassignTool('${id}')">Move</button>
      </div>
    </div>

    <div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--glass-border);margin-bottom:16px">
      <div class="section-header"><h3>Check-In / Check-Out Log</h3></div>
      ${logRows}
    </div>`;
}

function reassignTool(id) {
  const t = db.tools.find(x => x.id === id);
  if (!t) return;
  const assignVal = val('tool_reassign');
  const oldLabel = getToolAssignLabel(t) || 'Unassigned';
  if (assignVal) {
    const parts = assignVal.split('|');
    t.assignType = parts[0];
    t.assignId = parts[1];
  } else {
    t.assignType = '';
    t.assignId = '';
  }
  const newLabel = getToolAssignLabel(t) || 'Unassigned';
  if (oldLabel !== newLabel) {
    if (!t.checkLog) t.checkLog = [];
    t.checkLog.push({ date: new Date().toISOString().slice(0,10), from: oldLabel, to: newLabel });
    saveData(); openToolDetail(id); showToast('Moved: ' + oldLabel + ' → ' + newLabel);
  } else {
    showToast('No change');
  }
}

// ── BUDGET REPORT (PDF + EMAIL) ──────────────────────────────
function loadReportLibraries() {
  return new Promise((resolve, reject) => {
    if (window.jspdf && window.jspdf.jsPDF) { resolve(); return; }
    // Try multiple CDNs in case one is blocked
    const cdns = [
      ['https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js', 'https://unpkg.com/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js'],
      ['https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js', 'https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js']
    ];
    let cdnIdx = 0;
    function tryNextCDN() {
      if (cdnIdx >= cdns.length) { reject(new Error('All CDNs failed. Check internet connection.')); return; }
      const libs = cdns[cdnIdx];
      let loaded = 0;
      function loadNext() {
        if (loaded >= libs.length) {
          setTimeout(() => {
            if (window.jspdf && window.jspdf.jsPDF) resolve();
            else { cdnIdx++; tryNextCDN(); }
          }, 300);
          return;
        }
        const s = document.createElement('script');
        s.src = libs[loaded];
        s.onload = () => { loaded++; loadNext(); };
        s.onerror = () => { cdnIdx++; tryNextCDN(); };
        document.head.appendChild(s);
      }
      loadNext();
    }
    tryNextCDN();
  });
}

async function generateBudgetReport() {
  if (!db.projects.length) { alert('No projects to report on.'); return; }

  showToast('Generating report...');

  try {
    await loadReportLibraries();
  } catch(e) {
    alert('Could not load PDF library. Make sure you have an internet connection and try again.\n\n' + e.message);
    return;
  }

  try {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape' });
  const pageW = doc.internal.pageSize.getWidth();
  const today = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

  // ── Title Page ──
  doc.setFontSize(22);
  doc.setTextColor(30, 58, 95);
  doc.text('Cahaba Electric', 14, 25);
  doc.setFontSize(16);
  doc.setTextColor(80, 80, 80);
  doc.text('Budget Report — All Projects', 14, 35);
  doc.setFontSize(10);
  doc.text(today, 14, 43);

  // ── Company Summary ──
  let grandContract = 0, grandMatQuoted = 0, grandMatActual = 0, grandLaborQuoted = 0, grandLaborActual = 0;
  const projectRows = [];

  db.projects.forEach(p => {
    ensureBudget(p);
    const b = p.budget;
    const updatedContract = getUpdatedContractValue(p);
    const approvedCOs = getApprovedCOTotal(p);

    let matQuoted = 0, matActual = 0;
    MATERIAL_CATS.forEach(cat => {
      const m = b.materials[cat] || {};
      matQuoted += parseFloat(m.quoted) || 0;
      matActual += parseFloat(m.actual) || 0;
    });

    const quotedLabor = parseFloat(b.quotedLabor) || 0;
    let laborActual = 0;
    b.laborEntries.forEach(le => {
      const emp = db.employees.find(e => e.id === le.employeeId);
      const rate = emp ? parseFloat(emp.rate) || 0 : 0;
      const otRate = emp ? parseFloat(emp.otRate) || 0 : 0;
      laborActual += (rate * (parseFloat(le.hours) || 0)) + (otRate * (parseFloat(le.otHours) || 0));
    });

    const totalActual = matActual + laborActual;
    const profit = updatedContract - totalActual;
    const profitPct = updatedContract > 0 ? (profit / updatedContract * 100) : 0;

    grandContract += updatedContract;
    grandMatQuoted += matQuoted; grandMatActual += matActual;
    grandLaborQuoted += quotedLabor; grandLaborActual += laborActual;

    projectRows.push({
      name: p.name || 'Unnamed',
      contract: fmtMoneyPlain(parseFloat(p.contractValue) || 0),
      cos: fmtMoneyPlain(approvedCOs),
      updated: fmtMoneyPlain(updatedContract),
      matQuoted: fmtMoneyPlain(matQuoted),
      matActual: fmtMoneyPlain(matActual),
      labQuoted: fmtMoneyPlain(quotedLabor),
      labActual: fmtMoneyPlain(laborActual),
      profit: fmtMoneyPlain(profit),
      profitPct: profitPct.toFixed(1) + '%',
      // Raw for detail pages
      _p: p, _updatedContract: updatedContract, _matQuoted: matQuoted, _matActual: matActual,
      _quotedLabor: quotedLabor, _laborActual: laborActual, _profit: profit, _profitPct: profitPct
    });
  });

  const grandTotalActual = grandMatActual + grandLaborActual;
  const grandProfit = grandContract - grandTotalActual;
  const grandProfitPct = grandContract > 0 ? (grandProfit / grandContract * 100) : 0;

  // ── Summary Table ──
  doc.setFontSize(13);
  doc.setTextColor(30, 58, 95);
  doc.text('Company Summary', 14, 55);

  doc.autoTable({
    startY: 60,
    head: [['', 'Value']],
    body: [
      ['Total Updated Contract', fmtMoneyPlain(grandContract)],
      ['Total Materials Quoted', fmtMoneyPlain(grandMatQuoted)],
      ['Total Materials Actual', fmtMoneyPlain(grandMatActual)],
      ['Total Labor Quoted', fmtMoneyPlain(grandLaborQuoted)],
      ['Total Labor Actual', fmtMoneyPlain(grandLaborActual)],
      ['Total Profit', fmtMoneyPlain(grandProfit)],
      ['Overall Profit %', grandProfitPct.toFixed(1) + '%']
    ],
    theme: 'grid',
    styles: { fontSize: 9, cellPadding: 3 },
    headStyles: { fillColor: [30, 58, 95] },
    columnStyles: { 1: { halign: 'right', fontStyle: 'bold' } },
    margin: { left: 14, right: pageW / 2 + 10 }
  });

  // ── All Projects Overview Table ──
  doc.addPage('landscape');
  doc.setFontSize(13);
  doc.setTextColor(30, 58, 95);
  doc.text('All Projects Overview', 14, 20);

  doc.autoTable({
    startY: 25,
    head: [['Project', 'Contract', 'Approved COs', 'Updated Contract', 'Mat Quoted', 'Mat Actual', 'Lab Quoted', 'Lab Actual', 'Profit', 'Profit %']],
    body: projectRows.map(r => [r.name, r.contract, r.cos, r.updated, r.matQuoted, r.matActual, r.labQuoted, r.labActual, r.profit, r.profitPct]),
    foot: [['TOTALS', '', '', fmtMoneyPlain(grandContract), fmtMoneyPlain(grandMatQuoted), fmtMoneyPlain(grandMatActual), fmtMoneyPlain(grandLaborQuoted), fmtMoneyPlain(grandLaborActual), fmtMoneyPlain(grandProfit), grandProfitPct.toFixed(1) + '%']],
    theme: 'grid',
    styles: { fontSize: 8, cellPadding: 2.5 },
    headStyles: { fillColor: [30, 58, 95], fontSize: 7.5 },
    footStyles: { fillColor: [241, 245, 249], textColor: [30, 58, 95], fontStyle: 'bold' },
    columnStyles: {
      0: { cellWidth: 40 },
      1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' },
      4: { halign: 'right' }, 5: { halign: 'right' }, 6: { halign: 'right' },
      7: { halign: 'right' }, 8: { halign: 'right' }, 9: { halign: 'right' }
    }
  });

  // ── Per-Project Detail Pages ──
  projectRows.forEach(r => {
    const p = r._p;
    ensureBudget(p);
    const b = p.budget;
    doc.addPage('landscape');

    doc.setFontSize(14);
    doc.setTextColor(30, 58, 95);
    doc.text(p.name || 'Unnamed Project', 14, 20);
    doc.setFontSize(9);
    doc.setTextColor(100, 100, 100);
    doc.text(`Updated Contract: ${r.updated}    Profit: ${r.profit} (${r.profitPct})`, 14, 27);

    // Materials table
    doc.setFontSize(11);
    doc.setTextColor(30, 58, 95);
    doc.text('Materials', 14, 36);

    const matBody = MATERIAL_CATS.map(cat => {
      const m = b.materials[cat] || {};
      const q = parseFloat(m.quoted) || 0;
      const a = parseFloat(m.actual) || 0;
      const v = q - a;
      return [cat, fmtMoneyPlain(q), fmtMoneyPlain(a), (v >= 0 ? '+' : '') + fmtMoneyPlain(v)];
    });
    const matVar = r._matQuoted - r._matActual;
    matBody.push(['TOTALS', fmtMoneyPlain(r._matQuoted), fmtMoneyPlain(r._matActual), (matVar >= 0 ? '+' : '') + fmtMoneyPlain(matVar)]);

    doc.autoTable({
      startY: 40,
      head: [['Category', 'Quoted', 'Actual', 'Variance']],
      body: matBody,
      theme: 'grid',
      styles: { fontSize: 8.5, cellPadding: 2.5 },
      headStyles: { fillColor: [30, 58, 95] },
      columnStyles: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' } },
      margin: { right: pageW / 2 + 10 },
      didParseCell: function(data) {
        if (data.row.index === matBody.length - 1) {
          data.cell.styles.fontStyle = 'bold';
          data.cell.styles.fillColor = [241, 245, 249];
        }
      }
    });

    // Labor table
    const labY = doc.lastAutoTable.finalY + 12;
    doc.setFontSize(11);
    doc.setTextColor(30, 58, 95);
    doc.text('Labor', 14, labY);

    const labBody = [];
    let totalHrs = 0, totalOT = 0, totalLabCost = 0;
    b.laborEntries.forEach(le => {
      const emp = db.employees.find(e => e.id === le.employeeId);
      const name = emp ? emp.name : 'Unknown';
      const rate = emp ? parseFloat(emp.rate) || 0 : 0;
      const otRate = emp ? parseFloat(emp.otRate) || 0 : 0;
      const hrs = parseFloat(le.hours) || 0;
      const otHrs = parseFloat(le.otHours) || 0;
      const cost = (rate * hrs) + (otRate * otHrs);
      totalHrs += hrs; totalOT += otHrs; totalLabCost += cost;
      labBody.push([name, fmtMoneyPlain(rate) + '/hr', hrs.toString(), otHrs.toString(), fmtMoneyPlain(cost)]);
    });

    if (labBody.length) {
      labBody.push(['TOTALS', '', totalHrs.toString(), totalOT.toString(), fmtMoneyPlain(totalLabCost)]);
      doc.autoTable({
        startY: labY + 4,
        head: [['Employee', 'Rate', 'Hours', 'OT Hours', 'Cost']],
        body: labBody,
        theme: 'grid',
        styles: { fontSize: 8.5, cellPadding: 2.5 },
        headStyles: { fillColor: [30, 58, 95] },
        columnStyles: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } },
        margin: { right: pageW / 2 + 10 },
        didParseCell: function(data) {
          if (data.row.index === labBody.length - 1) {
            data.cell.styles.fontStyle = 'bold';
            data.cell.styles.fillColor = [241, 245, 249];
          }
        }
      });
    } else {
      doc.setFontSize(9);
      doc.setTextColor(150, 150, 150);
      doc.text('No labor entries tracked.', 14, labY + 8);
    }

    const laborVar = r._quotedLabor - r._laborActual;
    const summY = (doc.lastAutoTable ? doc.lastAutoTable.finalY : labY) + 10;
    doc.setFontSize(9);
    doc.setTextColor(80, 80, 80);
    doc.text(`Quoted Labor: ${fmtMoneyPlain(r._quotedLabor)}   |   Actual Labor: ${fmtMoneyPlain(r._laborActual)}   |   Labor Variance: ${(laborVar >= 0 ? '+' : '') + fmtMoneyPlain(laborVar)}`, 14, summY);
  });

  // ── Save PDF ──
  const filename = 'CahabaElectric_BudgetReport_' + new Date().toISOString().slice(0, 10) + '.pdf';
  doc.save(filename);

  // ── Send via EmailJS if configured ──
  const ejsPub = localStorage.getItem('electricalPM_emailjs_pubkey');
  const ejsSvc = localStorage.getItem('electricalPM_emailjs_service');
  const ejsTpl = localStorage.getItem('electricalPM_emailjs_template');
  const ejsTo = localStorage.getItem('electricalPM_emailjs_recipients');

  if (ejsPub && ejsSvc && ejsTpl && ejsTo) {
    // Build plain-text summary for email body
    let emailBody = 'CAHABA ELECTRIC — BUDGET REPORT\n' + today + '\n\n';
    emailBody += 'COMPANY SUMMARY\n';
    emailBody += '─────────────────────────────────\n';
    emailBody += 'Total Updated Contract: ' + fmtMoneyPlain(grandContract) + '\n';
    emailBody += 'Total Materials Quoted: ' + fmtMoneyPlain(grandMatQuoted) + '\n';
    emailBody += 'Total Materials Actual: ' + fmtMoneyPlain(grandMatActual) + '\n';
    emailBody += 'Total Labor Quoted: ' + fmtMoneyPlain(grandLaborQuoted) + '\n';
    emailBody += 'Total Labor Actual: ' + fmtMoneyPlain(grandLaborActual) + '\n';
    emailBody += 'Total Profit: ' + fmtMoneyPlain(grandProfit) + '\n';
    emailBody += 'Overall Profit %: ' + grandProfitPct.toFixed(1) + '%\n\n';
    emailBody += 'PROJECT BREAKDOWN\n';
    emailBody += '─────────────────────────────────\n';
    projectRows.forEach(r => {
      emailBody += '\n' + r.name + '\n';
      emailBody += '  Contract: ' + r.updated + '  |  Profit: ' + r.profit + ' (' + r.profitPct + ')\n';
      emailBody += '  Materials: ' + r.matQuoted + ' quoted / ' + r.matActual + ' actual\n';
      emailBody += '  Labor: ' + r.labQuoted + ' quoted / ' + r.labActual + ' actual\n';
    });
    emailBody += '\n─────────────────────────────────\n';
    emailBody += 'Full PDF report attached to this email or downloaded locally.\n';
    emailBody += 'Generated by ElectricalPM';

    emailjs.init(ejsPub);
    emailjs.send(ejsSvc, ejsTpl, {
      to_email: ejsTo,
      subject: 'Cahaba Electric — Budget Report ' + today,
      message: emailBody
    }).then(() => {
      showToast('Report emailed to ' + ejsTo.split(',').length + ' recipient(s)!');
    }).catch(err => {
      console.error('EmailJS error:', err);
      showToast('PDF downloaded. Email failed — check Settings.');
    });
  } else {
    showToast('PDF downloaded! Set up EmailJS in Settings to auto-email.');
  }

  } catch(err) {
    console.error('Budget report error:', err);
    alert('Error generating report: ' + err.message + '\n\nLine: ' + (err.stack||'').split('\n').slice(0,3).join('\n'));
  }
}

// ── MIGRATE FILES FROM LOCALSTORAGE TO INDEXEDDB ────────────
async function migrateFilesToIDB() {
  let migrated = 0;
  for (const p of db.projects) {
    // Project files
    for (const f of (p.files || [])) {
      if (f.fileData && !isFileRef(f.fileData)) {
        f.fileData = await fileSave(f.fileData); migrated++;
      }
    }
    // Change orders
    for (const c of (p.changeOrders || [])) {
      if (c.fileData && !isFileRef(c.fileData)) {
        c.fileData = await fileSave(c.fileData); migrated++;
      }
    }
    // Submittals
    for (const s of (p.submittals || [])) {
      if (s.initialFile && !isFileRef(s.initialFile)) {
        s.initialFile = await fileSave(s.initialFile); migrated++;
      }
      if (s.approvedFile && !isFileRef(s.approvedFile)) {
        s.approvedFile = await fileSave(s.approvedFile); migrated++;
      }
    }
    // RFIs
    for (const r of (p.rfis || [])) {
      if (r.fileData && !isFileRef(r.fileData)) {
        r.fileData = await fileSave(r.fileData); migrated++;
      }
    }
    // Pay apps
    if (p.billing && p.billing.payApps) {
      for (const pa of p.billing.payApps) {
        if (pa.fileData && !isFileRef(pa.fileData)) {
          pa.fileData = await fileSave(pa.fileData); migrated++;
        }
      }
    }
    // Retainage releases
    if (p.billing && p.billing.retainageReleases) {
      for (const r of p.billing.retainageReleases) {
        if (r.fileData && !isFileRef(r.fileData)) {
          r.fileData = await fileSave(r.fileData); migrated++;
        }
      }
    }
    // Daily log photos
    for (const l of (p.dailyLogs || [])) {
      for (const ph of (l.photos || [])) {
        if (ph.data && !isFileRef(ph.data)) {
          ph.data = await fileSave(ph.data); migrated++;
        }
      }
    }
  }
  if (migrated > 0) {
    saveData(); // Save with refs instead of base64 — localStorage is now much smaller
    console.log('Migrated ' + migrated + ' files to IndexedDB');
    showToast('Upgraded file storage — ' + migrated + ' files migrated!');
  }
}
