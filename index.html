// ── RFI TRACKER ──────────────────────────────────────────────
function ensureRFIs(p) { if (!p.rfis) p.rfis = []; }

function rfiStatusStyle(s) {
  const m = {'Pending Review':'background:rgba(249,115,22,0.15);color:#ea580c','Open':'background:rgba(245,158,11,0.12);color:#f59e0b','Answered':'background:rgba(34,197,94,0.12);color:#22c55e','Closed':'background:rgba(99,102,241,0.12);color:#6366f1'};
  return m[s] || 'background:#f1f5f9;color:var(--text-secondary)';
}

function renderRFIs(p) {
  ensureRFIs(p);
  const rfis = p.rfis;
  const openCount = rfis.filter(r => r.status === 'Open').length;
  const pendingCount = rfis.filter(r => r.status === 'Pending Review').length;

  const rows = rfis.length ? rfis.map((r, i) => {
    const overdue = r.status === 'Open' && r.dateNeeded && new Date(r.dateNeeded+'T00:00:00') < new Date();
    const isPending = r.status === 'Pending Review';
    const rowStyle = overdue ? 'background:#fff5f5' : (isPending && !isField() ? 'background:rgba(249,115,22,0.06)' : '');
    const actions = !canEditProject()
      ? `<td style="white-space:nowrap">
          <button class="btn btn-sm btn-secondary" onclick="viewRFIDetail('${p.id}',${i})">View</button>
        </td>`
      : `<td style="white-space:nowrap">
          <button class="btn btn-sm btn-secondary" onclick="viewRFIDetail('${p.id}',${i})">View</button>
          <button class="btn btn-sm btn-primary" onclick="generateRFIPdf('${p.id}',${i})" title="Generate PDF">PDF</button>
          ${isPending ? `<button class="btn btn-sm" style="background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.2)" onclick="approveRFI('${p.id}',${i})">Approve</button>` : ''}
          ${!isPending && r.status==='Open' ? `<button class="btn btn-sm" style="background:rgba(99,102,241,0.12);color:#6366f1;border:1px solid rgba(99,102,241,0.2)" onclick="emailRFIToGC('${p.id}',${i})">Email GC</button>` : ''}
          <button class="btn btn-sm btn-secondary" onclick="openRFIModal('${p.id}',${i})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRFI('${p.id}',${i})">Del</button>
        </td>`;
    return `<tr style="${rowStyle}">
      <td style="font-weight:700">${r.number || i+1}</td>
      <td style="font-weight:600">${r.subject||''} ${overdue?'<span class="la-tag la-overdue">OVERDUE</span>':''}</td>
      <td>${r.sentTo||''}</td>
      <td>${fmtDate(r.dateSent)}</td>
      <td>${fmtDate(r.dateNeeded)}</td>
      <td>${fmtDate(r.dateAnswered)}</td>
      <td><span class="status-badge" style="${rfiStatusStyle(r.status||'Open')}">${r.status||'Open'}</span></td>
      ${actions}
    </tr>`;
  }).join('') : `<tr><td colspan="8" class="table-empty">${isField() ? 'No RFIs yet. Click "Submit RFI" to send one to the office.' : 'No RFIs yet. Click "+ Add RFI" to create one.'}</td></tr>`;

  const addBtn = !canEditProject() ? ''
    : isField()
    ? `<button class="btn btn-primary btn-sm" onclick="openFieldRFIForm('${p.id}')">Submit RFI</button>`
    : `<button class="btn btn-primary btn-sm" onclick="openRFIModal('${p.id}')">+ Add RFI</button>`;

  return `
    <div class="section-header"><h3>RFIs</h3>${addBtn}</div>
    <div class="summary-chips">
      <div class="chip"><div class="chip-icon">\u2753</div><div class="chip-label">Total RFIs</div><div class="chip-value">${rfis.length}</div></div>
      ${pendingCount > 0 ? `<div class="chip red"><div class="chip-icon">\u{1F4CB}</div><div class="chip-label">Awaiting Review</div><div class="chip-value">${pendingCount}</div></div>` : ''}
      <div class="chip ${openCount>0?'red':'green'}"><div class="chip-icon">\u{1F4E8}</div><div class="chip-label">Open</div><div class="chip-value">${openCount}</div></div>
      <div class="chip green"><div class="chip-icon">\u2705</div><div class="chip-label">Answered / Closed</div><div class="chip-value">${rfis.length - openCount - pendingCount}</div></div>
    </div>
    <table class="data-table desktop-table">
      <thead><tr><th>#</th><th>Subject</th><th>Sent To</th><th>Date Sent</th><th>Needed By</th><th>Answered</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="mobile-cards">${rfis.length ? rfis.map((r,i) => {
      const overdue = r.status === 'Open' && r.dateNeeded && new Date(r.dateNeeded+'T00:00:00') < new Date();
      const isPending = r.status === 'Pending Review';
      const borderColor = overdue ? '#ef4444' : (isPending ? '#f97316' : 'var(--glass-border)');
      const dates = [r.dateSent ? 'Sent ' + fmtDate(r.dateSent) : '', r.dateNeeded ? 'Due ' + fmtDate(r.dateNeeded) : '', r.dateAnswered ? 'Answered ' + fmtDate(r.dateAnswered) : ''].filter(Boolean).join(' \u00b7 ');
      if (isField()) {
        return `<div class="mobile-card" style="border-left:4px solid ${borderColor};cursor:pointer" onclick="viewRFIDetail('${p.id}',${i})">
          <div class="mc-row"><div class="mc-title">RFI #${r.number||i+1}</div><span class="status-badge" style="${rfiStatusStyle(r.status||'Open')}">${r.status||'Open'}</span></div>
          <div class="mc-subtitle">${r.subject||'No subject'} ${overdue?'<span class="la-tag la-overdue">OVERDUE</span>':''}</div>
          ${r.dateNeeded ? `<div style="font-size:0.78rem;color:${overdue?'#ef4444':'var(--text-muted)'}">Due ${fmtDate(r.dateNeeded)}</div>` : ''}
        </div>`;
      }
      return `<div class="mobile-card" style="border-left:4px solid ${borderColor};cursor:pointer" onclick="viewRFIDetail('${p.id}',${i})">
        <div class="mc-row"><div class="mc-title">RFI #${r.number||i+1}</div><span class="status-badge" style="${rfiStatusStyle(r.status||'Open')}">${r.status||'Open'}</span></div>
        <div class="mc-subtitle">${r.subject||'No subject'} ${overdue?'<span class="la-tag la-overdue">OVERDUE</span>':''}</div>
        ${r.sentTo ? `<div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:4px">To: ${r.sentTo}</div>` : ''}
        ${dates ? `<div style="font-size:0.75rem;color:${overdue?'#ef4444':'var(--text-muted)'}">${dates}</div>` : ''}
        ${isPending || (!isPending && canEditProject()) ? `<div class="mc-actions" onclick="event.stopPropagation()" style="margin-top:8px">
          ${isPending ? `<button class="btn btn-sm" style="background:rgba(34,197,94,0.12);color:#22c55e" onclick="approveRFI('${p.id}',${i})">Approve</button>` : ''}
          <button class="btn btn-sm btn-secondary" onclick="openRFIModal('${p.id}',${i})">Edit</button>
        </div>` : ''}
      </div>`;
    }).join('') : `<div class="table-empty" style="padding:24px;text-align:center;color:var(--text-muted)">${isField() ? 'No RFIs yet. Click "Submit RFI" to send one.' : 'No RFIs yet. Click "+ Add RFI" to create one.'}</div>`}</div>`;
}

// ── RFI Modal (multi-file + AI rewrite) ──────────────────────
let _rfiFiles = []; // {data, type, name} array for current modal session

function openRFIModal(projectId, editIdx) {
  const p = getProject(projectId);
  ensureRFIs(p);
  const isEdit = editIdx != null && editIdx !== undefined;
  const r = isEdit ? p.rfis[editIdx] : {};

  // Pre-load existing attachments
  _rfiFiles = [];
  const existingFileCount = (r.files && r.files.length) ? r.files.length : (r.fileData ? 1 : 0);

  modal(isEdit ? 'Edit RFI #' + nextNum : 'New RFI',
    `<div class="form-row">
       <div class="form-group"><label>RFI #</label><input id="rfi_num" value="${nextNum}" style="width:80px"></div>
       <div class="form-group"><label>Status</label><select id="rfi_status">${statusOpts}</select></div>
     </div>
     <div class="form-group"><label>Subject *</label><input id="rfi_subject" value="${r.subject||''}" placeholder="Brief topic of the question"></div>
     <div class="form-group">
       <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
         <label style="margin:0">Question / Description *</label>
         <button class="rfi-ai-btn" onclick="rfiAIRewrite()" id="rfi_ai_btn">
           <span style="font-size:0.9rem">&#9733;</span> Rewrite with AI
         </button>
       </div>
       <textarea id="rfi_question" rows="3" placeholder="Type your question casually — AI will make it professional...">${r.question||''}</textarea>
       <div id="rfi_ai_preview"></div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>Sent To</label><input id="rfi_sentTo" value="${r.sentTo||''}" placeholder="Engineer, Architect, GC..."></div>
       <div class="form-group"><label>Priority</label><select id="rfi_pri">${priOpts}</select></div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>Date Sent</label><input id="rfi_dateSent" type="date" value="${r.dateSent||new Date().toISOString().slice(0,10)}"></div>
       <div class="form-group"><label>Date Needed By</label><input id="rfi_dateNeeded" type="date" value="${r.dateNeeded||''}"></div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>Date Answered</label><input id="rfi_dateAnswered" type="date" value="${r.dateAnswered||''}"></div>
       <div class="form-group"></div>
     </div>
     <div class="form-group"><label>Response / Answer</label><textarea id="rfi_response" rows="3" placeholder="Record the answer when received...">${r.response||''}</textarea></div>
     <div class="form-group"><label>Attachments (Photos & Drawings)</label>
       <div id="rfi_dropzone" class="drop-zone" style="padding:16px">
         <div class="drop-zone-icon">\u{1F4CE}</div>
         <div class="drop-zone-text">Drop photos or PDFs here, or click to browse</div>
         <input type="file" id="rfi_file" accept=".pdf,image/*" multiple style="display:none">
       </div>
       <div id="rfi_attach_grid" class="rfi-attach-grid"></div>
       ${existingFileCount > 0 ? `<div id="rfi_existing_note" style="font-size:0.78rem;color:var(--text-muted);margin-top:6px">${existingFileCount} existing file(s) will be kept unless you remove them</div>` : ''}
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveRFI('${projectId}',${isEdit?editIdx:'null'})">Save</button>`);

  // Setup multi-file drop
  const dz = document.getElementById('rfi_dropzone');
  const fi = document.getElementById('rfi_file');
  dz.onclick = (e) => { if (e.target.tagName !== 'INPUT') fi.click(); };
  setupDropZone(dz, f => handleRFIFileMulti(f));
  fi.onchange = () => { for (const f of fi.files) handleRFIFileMulti(f); fi.value = ''; };

  // Load existing files into preview
  if (isEdit) rfiLoadExistingFiles(r);
}

async function rfiLoadExistingFiles(r) {
  // Migrate old single-file format
  if (r.fileData && !r.files) {
    const data = await fileGet(r.fileData);
    if (data) {
      _rfiFiles.push({ data, type: r.fileType || '', name: r.fileName || 'Attachment', idbKey: r.fileData });
    }
  }
  // Load multi-file format
  if (r.files && r.files.length) {
    for (const f of r.files) {
      const data = await fileGet(f.idbKey);
      if (data) {
        _rfiFiles.push({ data, type: f.type, name: f.name, idbKey: f.idbKey });
      }
    }
  }
  renderRFIAttachGrid();
}

function handleRFIFileMulti(file) {
  const reader = new FileReader();
  reader.onload = e => {
    _rfiFiles.push({ data: e.target.result, type: file.type, name: file.name, isNew: true });
    renderRFIAttachGrid();
  };
  reader.readAsDataURL(file);
}

function renderRFIAttachGrid() {
  const grid = document.getElementById('rfi_attach_grid');
  if (!grid) return;
  grid.innerHTML = _rfiFiles.map((f, i) => {
    const isImage = f.type && f.type.startsWith('image/');
    const thumb = isImage
      ? `<img src="${f.data}" alt="${f.name}">`
      : `<div class="rfi-pdf-icon">\u{1F4C4}</div>`;
    return `<div class="rfi-attach-thumb">
      ${thumb}
      <button class="rfi-attach-remove" onclick="rfiRemoveFile(${i})" title="Remove">&times;</button>
      <div class="rfi-attach-name">${f.name}</div>
    </div>`;
  }).join('');
}

function rfiRemoveFile(idx) {
  _rfiFiles.splice(idx, 1);
  renderRFIAttachGrid();
}

// ── AI Rewrite ───────────────────────────────────────────────
function rfiAIRewrite() {
  const questionEl = document.getElementById('rfi_question');
  const text = questionEl.value.trim();
  if (!text) { showToast('Type a description first'); return; }

  const apiKey = localStorage.getItem('electricalPM_claudeKey');
  if (!apiKey) { showToast('No API key — set it in Settings'); return; }

  const btn = document.getElementById('rfi_ai_btn');
  btn.disabled = true;
  btn.innerHTML = '<span style="font-size:0.9rem">&#9733;</span> Rewriting...';
  const preview = document.getElementById('rfi_ai_preview');
  preview.innerHTML = '<div style="color:var(--text-muted);font-size:0.82rem;padding:8px">AI is rewriting your description...</div>';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      messages: [{
        role: 'user',
        content: `You are a professional construction project manager writing an RFI (Request for Information) for an electrical contractor. Rewrite the following rough description into a clear, professional, and concise RFI question. Use proper construction terminology. Reference drawing sheets if mentioned. Keep it direct and specific. Do NOT add information that wasn't in the original. Return ONLY the rewritten text, no preamble or explanation.

Original description:
${text}`
      }]
    })
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    btn.innerHTML = '<span style="font-size:0.9rem">&#9733;</span> Rewrite with AI';
    if (data.content && data.content[0]) {
      const rewritten = data.content[0].text;
      preview.innerHTML = `<div class="rfi-ai-preview">
        <div style="font-size:0.72rem;font-weight:700;color:var(--accent-hex);margin-bottom:6px;text-transform:uppercase">AI Rewrite Preview</div>
        <div>${rewritten.replace(/\n/g, '<br>')}</div>
        <div class="rfi-ai-actions">
          <button class="btn btn-primary btn-sm" onclick="rfiAcceptRewrite()">Use This</button>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('rfi_ai_preview').innerHTML=''">Keep Original</button>
        </div>
      </div>`;
      preview.dataset.rewritten = rewritten;
    } else {
      preview.innerHTML = `<div style="color:#ef4444;font-size:0.82rem;padding:8px">AI rewrite failed. ${data.error ? data.error.message : 'Try again.'}</div>`;
    }
  })
  .catch(err => {
    btn.disabled = false;
    btn.innerHTML = '<span style="font-size:0.9rem">&#9733;</span> Rewrite with AI';
    preview.innerHTML = `<div style="color:#ef4444;font-size:0.82rem;padding:8px">Error: ${err.message}</div>`;
  });
}

function rfiAcceptRewrite() {
  const preview = document.getElementById('rfi_ai_preview');
  const rewritten = preview.dataset.rewritten;
  if (rewritten) {
    document.getElementById('rfi_question').value = rewritten;
    preview.innerHTML = '<div style="color:#16a34a;font-size:0.82rem;padding:4px;font-weight:600">AI rewrite applied &#10003;</div>';
    setTimeout(() => { preview.innerHTML = ''; }, 2000);
  }
}

// ── Save RFI (multi-file) ────────────────────────────────────
async function saveRFI(projectId, editIdx) {
  const p = getProject(projectId);
  ensureRFIs(p);
  const subject = val('rfi_subject').trim();
  if (!subject) { alert('Subject is required.'); return; }
  const isEdit = editIdx !== null && editIdx !== 'null' && editIdx !== undefined;
  const existing = isEdit ? p.rfis[editIdx] : {};

  const r = {
    number: val('rfi_num'),
    subject,
    question: val('rfi_question'),
    sentTo: val('rfi_sentTo'),
    priority: val('rfi_pri'),
    status: val('rfi_status'),
    dateSent: val('rfi_dateSent'),
    dateNeeded: val('rfi_dateNeeded'),
    dateAnswered: val('rfi_dateAnswered'),
    response: val('rfi_response'),
    files: []
  };

  // Delete old files that are no longer in _rfiFiles
  if (isEdit) {
    const oldKeys = new Set();
    if (existing.fileData) oldKeys.add(existing.fileData);
    if (existing.files) existing.files.forEach(f => oldKeys.add(f.idbKey));
    const keptKeys = new Set(_rfiFiles.filter(f => f.idbKey).map(f => f.idbKey));
    for (const key of oldKeys) {
      if (!keptKeys.has(key)) await fileDel(key);
    }
  }

  // Save all files
  for (const f of _rfiFiles) {
    if (f.isNew) {
      const key = await fileSave(f.data);
      r.files.push({ idbKey: key, type: f.type, name: f.name });
    } else if (f.idbKey) {
      r.files.push({ idbKey: f.idbKey, type: f.type, name: f.name });
    }
  }

  // Clean up legacy single-file fields
  delete r.fileData; delete r.fileType; delete r.fileName;

  _rfiFiles = [];
  if (isEdit) p.rfis[editIdx] = r;
  else p.rfis.push(r);
  saveData(); closeModal(); showProject(projectId, 'rfis'); showToast('RFI saved!');
}

  const p = getProject(projectId);

  if (!subject) { alert('Subject is required.'); return; }

// ── Approve RFI (Office/Master) ─────────────────────────────
function approveRFI(projectId, idx) {
  const p = getProject(projectId);
  ensureRFIs(p);
  const r = p.rfis[idx];
  if (!r) return;
  r.status = 'Open';
  r.dateSent = r.dateSent || new Date().toISOString().slice(0,10);
  saveData();
  showProject(projectId, 'rfis');
  showToast('RFI #' + (r.number || idx+1) + ' approved and set to Open');
}

// ── Email RFI to GC (with recipient picker) ─────────────────
function emailRFIToGC(projectId, idx) {
  const ejsPub = localStorage.getItem('electricalPM_emailjs_pubkey');
  const ejsSvc = localStorage.getItem('electricalPM_emailjs_service');
  const ejsTpl = localStorage.getItem('electricalPM_emailjs_template');

  if (!ejsPub || !ejsSvc || !ejsTpl) {
    alert('EmailJS is not set up yet. Go to Settings and configure EmailJS first.');
    return;
  }

  const p = getProject(projectId);
  const r = p.rfis[idx];
  if (!r) return;

  // Build recipient list: GC contacts + team employees
  let recipientRows = '';
  let hasAny = false;

  // GC Contacts section
  const gcRoles = [
    { key: 'gcSeniorPm', label: 'Senior PM' },
    { key: 'gcPm', label: 'Project Manager' },
    { key: 'gcAsstPm', label: 'Assistant PM' },
    { key: 'gcSuper', label: 'Superintendent' },
    { key: 'gcAsstSuper', label: 'Asst. Superintendent' }
  ];
  let gcRows = '';
  gcRoles.forEach(gc => {
    const email = p[gc.key + 'Email'];
    const name = p[gc.key + 'Name'] || gc.label;
    if (email) {
      hasAny = true;
      gcRows += `<label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-xs);cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(var(--accent),0.06)'" onmouseout="this.style.background='transparent'">

          <div style="font-weight:600;font-size:0.85rem;color:var(--text)">${name}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">${email}</div>
        </div>
        <span style="font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(245,158,11,0.12);color:#f59e0b">${gc.label}</span>
      </label>`;
    }
  });

  // Team members section
  let teamRows = '';
  const employees = db.employees || [];
  employees.forEach(emp => {
    if (emp.email) {
      teamRows += `<label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-xs);cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(var(--accent),0.06)'" onmouseout="this.style.background='transparent'">
        <input type="checkbox" class="rfi-email-cb" value="${emp.email}" style="width:18px;height:18px;accent-color:var(--accent-hex);cursor:pointer">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:0.85rem;color:var(--text)">${emp.name||''}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">${emp.email}</div>
        </div>
        <span style="font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(var(--accent),0.08);color:var(--accent-hex)">${emp.role||'Team'}</span>
      </label>`;
    }
  });

  if (!hasAny && !teamRows) {
    alert('No email addresses found.\n\nAdd GC contacts on the Overview tab or employees in Employee Manager.');
    return;
  }

  const body = `
    <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:14px">Select who should receive RFI #${r.number || idx+1}: <strong>${r.subject||''}</strong></div>
    ${gcRows ? `<div style="font-size:0.72rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;padding:4px 12px;margin-bottom:2px">GC Contacts</div>
    <div style="border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:14px;overflow:hidden">${gcRows}</div>` : '<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:14px;padding:12px;border:1px dashed var(--border);border-radius:var(--radius-sm)">No GC contacts with email on this project</div>'}
    ${teamRows ? `<div style="font-size:0.72rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;padding:4px 12px;margin-bottom:2px">Team Members</div>
    <div style="border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;max-height:200px;overflow-y:auto">${teamRows}</div>` : ''}
    <div style="margin-top:14px;display:flex;align-items:center;gap:8px">
      <span style="font-size:0.78rem;color:var(--text-muted)">Selected:</span>
      <strong id="rfiEmailCount" style="font-size:0.85rem;color:var(--accent-hex)">0</strong>
    </div>`;

  modal('Send RFI — Select Recipients', body,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="sendRFIEmail('${projectId}',${idx})">Send Email with PDF</button>`);

  // Update count on checkbox changes
  function updateCount() {
    const checked = document.querySelectorAll('.rfi-email-cb:checked').length;
    const countEl = document.getElementById('rfiEmailCount');
    if (countEl) countEl.textContent = checked;
  }
  updateCount();
  document.querySelectorAll('.rfi-email-cb').forEach(cb => cb.addEventListener('change', updateCount));
}

async function sendRFIEmail(projectId, idx) {
  const ejsPub = localStorage.getItem('electricalPM_emailjs_pubkey');
  const ejsSvc = localStorage.getItem('electricalPM_emailjs_service');
  const ejsTpl = localStorage.getItem('electricalPM_emailjs_template');

  if (!ejsPub || !ejsSvc || !ejsTpl) {
    alert('EmailJS is not set up yet. Go to Settings and configure EmailJS first.');
    return;
  }

  const checked = document.querySelectorAll('.rfi-email-cb:checked');
  if (!checked.length) { alert('Select at least one recipient.'); return; }

  const recipients = Array.from(checked).map(cb => cb.value).join(', ');
  const p = getProject(projectId);
  const r = p.rfis[idx];

  closeModal();
  showToast('Generating RFI PDF and sending...');

  // Generate RFI PDF, upload to Supabase Storage, include download link
  let pdfLink = '';
  try {
    const result = await generateRFIPdf(projectId, idx, true);
    if (result && result.doc) {
      const pdfBlob = result.doc.output('blob');
      const timestamp = Date.now();
      const storagePath = `rfi-emails/${timestamp}_${result.fileName}`;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/project-files/${storagePath}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${_cachedAccessToken}`,
          'Content-Type': 'application/pdf',
        },
        body: pdfBlob
      });
      if (uploadRes.ok) {
        pdfLink = `${SUPABASE_URL}/storage/v1/object/public/project-files/${storagePath}`;
      } else {
        console.error('PDF upload failed:', await uploadRes.text());
      }
    }
  } catch(e) { console.error('PDF generation error:', e); }

  let emailBody = 'REQUEST FOR INFORMATION\n';
  emailBody += '═══════════════════════════════\n\n';
  emailBody += 'Project: ' + (p.name || 'Unknown') + '\n';
  emailBody += 'Job #: ' + (p.jobNumber || 'N/A') + '\n';
  emailBody += 'RFI #: ' + (r.number || idx+1) + '\n';
  emailBody += 'Date: ' + (r.dateSent || new Date().toISOString().slice(0,10)) + '\n';
  if (r.dateNeeded) emailBody += 'Response Needed By: ' + r.dateNeeded + '\n';
  emailBody += 'Sent To: ' + (r.sentTo || 'General Contractor') + '\n';
  emailBody += '\n───────────────────────────────\n';
  emailBody += 'QUESTION\n';
  emailBody += '───────────────────────────────\n';
  emailBody += (r.question || 'No description provided.') + '\n';
  if (pdfLink) {
    emailBody += '\n───────────────────────────────\n';
    emailBody += 'RFI DOCUMENT (PDF)\n';
    emailBody += '───────────────────────────────\n';
    emailBody += pdfLink + '\n';
  }
  emailBody += '\n───────────────────────────────\n';
  emailBody += 'Please respond at your earliest convenience.\n\n';
  emailBody += 'Sent from ElectricalPM — Cahaba Electric\n';

  const subject = 'RFI #' + (r.number || idx+1) + ' — ' + (r.subject || 'Request for Information') + ' — ' + (p.name || 'Project');

  emailjs.init(ejsPub);
  emailjs.send(ejsSvc, ejsTpl, {
    to_email: recipients,
    subject: subject,
    message: emailBody
  }).then(() => {
    showToast('RFI sent to ' + checked.length + ' recipient(s)' + (pdfLink ? ' with PDF link!' : '!'));
  }).catch(err => {
    console.error('Email error:', err);
    alert('Failed to send email. Check your EmailJS settings.\n\n' + (err.text || err.message || err));
  });
}

async function viewRFIFileMulti(projectId, rfiIdx, fileIdx) {
  const p = getProject(projectId);
  const r = p.rfis[rfiIdx];
  if (!r || !r.files || !r.files[fileIdx]) return;
  const f = r.files[fileIdx];
  const data = await fileGet(f.idbKey);
  if (!data) { showToast('File not found'); return; }
  openFileViewer(f.name, data, f.type);
}

async function viewRFIFileLegacy(projectId, idx) {
  const p = getProject(projectId);
  const r = p.rfis[idx];
  if (!r || !r.fileData) return;
  const data = await fileGet(r.fileData);
  if (!data) { showToast('File not found'); return; }
  openFileViewer(r.fileName || 'RFI Attachment', data, r.fileType || '');
}

function deleteRFI(projectId, idx) {
  if (!confirm('Delete this RFI?')) return;
  const p = getProject(projectId);
  const r = p.rfis[idx];
  // Clean up files from IndexedDB
  if (r.files) r.files.forEach(f => fileDel(f.idbKey));
  if (r.fileData) fileDel(r.fileData);
  p.rfis.splice(idx, 1);
  saveData(); showProject(projectId, 'rfis'); showToast('RFI deleted.');
}

// ── RFI PDF Generator (BuildingBlok Style) ───────────────────
async function generateRFIPdf(projectId, idx, returnDoc) {
  const p = getProject(projectId);
  ensureRFIs(p);
  const r = p.rfis[idx];
  if (!r) return;

  showToast('Generating RFI PDF...');

  try { await loadReportLibraries(); } catch(e) {
    alert('Could not load PDF library. Check your internet connection.\n\n' + e.message);
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait' });
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const ml = 20;
  const mr = 20;
  const cw = W - ml - mr;
  let y = 20;

  const black = [0, 0, 0];
  const dark = [40, 40, 40];
  const gray = [100, 100, 100];
  const fmtD = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: '2-digit' }) : '';

  function checkPage(needed) {
    if (y + needed > H - 20) { doc.addPage(); y = 20; return true; }
    return false;
  }

  function hr() {
    doc.setDrawColor(160, 160, 160);
    doc.setLineWidth(0.3);
    doc.line(ml, y, W - mr, y);
    y += 6;
  }

  // ── HEADER — Project name centered at top ──────────────────
  const centerX = W / 2;

  // Project name — large, centered, prominent
  doc.setFontSize(16);
  doc.setTextColor(...black);
  doc.setFont('helvetica', 'bold');
  doc.text(p.name || 'Project', centerX, y, { align: 'center' });
  y += 5;

  y += 2;

  // Logo + RFI # left, GC info right
  try { doc.addImage(CAHABA_LOGO, 'JPEG', ml, y - 8, 18, 18); } catch(e) {}
  doc.setFontSize(18);
  doc.setTextColor(...black);
  doc.setFont('helvetica', 'bold');
  doc.text('RFI #' + (r.number || idx + 1), ml + 22, y + 4);

  // GC info — right aligned
  const rightX = W - mr;
  doc.setFontSize(8.5);
  doc.setTextColor(...dark);
  doc.setFont('helvetica', 'normal');
  if (p.gcCompany) doc.text('GC: ' + p.gcCompany, rightX, y + 2, { align: 'right' });

  y += 12;

  // Thick divider
  doc.setDrawColor(0, 0, 0);
  doc.setLineWidth(0.6);
  doc.line(ml, y, W - mr, y);
  y += 7;

  // ── INFO GRID — two columns of label/value pairs ──────────
  const col1L = ml;
  const col1V = ml + 32;
  const col2L = ml + cw * 0.52;
  const col2V = ml + cw * 0.52 + 32;
  const rowH = 5.5;

  function infoRow(lbl1, val1, lbl2, val2) {
    doc.setFontSize(8.5);
    doc.setTextColor(...gray);
    doc.setFont('helvetica', 'normal');
    doc.text(lbl1 + ':', col1L, y);
    doc.setTextColor(...dark);
    doc.text(val1 || '', col1V, y);
    if (lbl2) {
      doc.setTextColor(...gray);
      doc.text(lbl2 + ':', col2L, y);
      doc.setTextColor(...dark);
      doc.text(val2 || '', col2V, y);
    }
    y += rowH;
  }

  infoRow('Date Sent', fmtD(r.dateSent), 'Status', (r.status || 'Open'));
  infoRow('To', r.sentTo || p.gcCompany || '', 'From', 'Cahaba Electric');
  infoRow('Priority', r.priority || 'Medium', 'Due By', fmtD(r.dateNeeded));

  y += 3;
  hr();

  // ── SUMMARY (Subject) ─────────────────────────────────────
  doc.setFontSize(9);
  doc.setTextColor(...gray);
  doc.setFont('helvetica', 'bold');
  doc.text('Summary:', ml, y);
  y += 4.5;
  doc.setFontSize(9.5);
  doc.setTextColor(...dark);
  doc.setFont('helvetica', 'normal');
  const subjLines = doc.splitTextToSize(r.subject || '', cw);
  doc.text(subjLines, ml, y);
  y += subjLines.length * 4.2 + 5;

  // ── QUESTION ───────────────────────────────────────────────
  doc.setFontSize(9);
  doc.setTextColor(...gray);
  doc.setFont('helvetica', 'bold');
  doc.text('Question:', ml, y);
  y += 4.5;
  doc.setFontSize(9.5);
  doc.setTextColor(...dark);
  doc.setFont('helvetica', 'normal');
  const qLines = doc.splitTextToSize(r.question || '', cw);
  const qH = qLines.length * 4.2;
  if (qH > 50) checkPage(qH + 8);
  doc.text(qLines, ml, y);
  y += qH + 6;

  // ── ATTACHMENTS ────────────────────────────────────────────
  const files = r.files && r.files.length ? r.files : (r.fileData ? [{ idbKey: r.fileData, type: r.fileType, name: r.fileName }] : []);

  if (files.length > 0) {
    hr();
    doc.setFontSize(9);
    doc.setTextColor(...gray);
    doc.setFont('helvetica', 'bold');
    doc.text('Attachments:', ml, y);
    y += 5;

    for (const f of files) {
      const data = await fileGet(f.idbKey);
      if (!data) continue;

      if (f.type && f.type.startsWith('image/')) {
        try {
          checkPage(70);
          doc.setFontSize(8);
          doc.setTextColor(...gray);
          doc.setFont('helvetica', 'italic');
          doc.text(f.name || 'Photo', ml, y);
          y += 4;
          const imgProps = doc.getImageProperties(data);
          let imgW = Math.min(cw, 140);
          let imgH = (imgProps.height / imgProps.width) * imgW;
          if (imgH > 100) { imgH = 100; imgW = (imgProps.width / imgProps.height) * imgH; }
          checkPage(imgH + 8);
          doc.addImage(data, ml, y, imgW, imgH);
          y += imgH + 4;
        } catch(e) {
          doc.setFontSize(8);
          doc.setTextColor(180, 50, 50);
          doc.text('[Could not embed: ' + (f.name || 'image') + ']', ml, y);
          y += 5;
        }
      } else {
        doc.setFontSize(8.5);
        doc.setTextColor(...dark);
        doc.setFont('helvetica', 'normal');
        doc.text('\u2022  ' + (f.name || 'Attached file'), ml + 2, y);
        y += 5;
      }
    }
    y += 3;
  }

  // ── RESPONSE ───────────────────────────────────────────────
  hr();
  doc.setFontSize(9);
  doc.setTextColor(...gray);
  doc.setFont('helvetica', 'bold');
  doc.text('Response:', ml, y);
  y += 4.5;

  if (r.response) {
    doc.setFontSize(9.5);
    doc.setTextColor(...dark);
    doc.setFont('helvetica', 'normal');
    const rLines = doc.splitTextToSize(r.response, cw);
    const rH = rLines.length * 4.2;
    checkPage(rH + 15);
    doc.text(rLines, ml, y);
    y += rH + 8;
  } else {
    y += 25;
  }

  // ── RESPONDER ──────────────────────────────────────────────
  hr();
  doc.setFontSize(9);
  doc.setTextColor(...gray);
  doc.setFont('helvetica', 'bold');
  doc.text('Responder:', ml, y);
  y += 8;

  // Name line
  doc.setFontSize(8.5);
  doc.setTextColor(...gray);
  doc.setFont('helvetica', 'normal');
  doc.text('Name:', ml, y);
  doc.setDrawColor(0, 0, 0);
  doc.setLineWidth(0.25);
  doc.line(ml + 14, y, ml + cw * 0.45, y);
  // Date line
  doc.text('Date:', ml + cw * 0.55, y);
  doc.line(ml + cw * 0.55 + 14, y, W - mr, y);

  if (r.dateAnswered) {
    doc.setTextColor(...dark);
    doc.text(fmtD(r.dateAnswered), ml + cw * 0.55 + 16, y - 1);
  }

  y += 12;

  // ── NOTE ───────────────────────────────────────────────────
  doc.setFontSize(6.5);
  doc.setTextColor(...gray);
  doc.setFont('helvetica', 'italic');
  const noteText = 'NOTE: This reply is not an authorization to proceed with work involving additional cost, time or both. If any reply requires a change to the Contract Documents, a Change Order, Construction Change Directive or a Minor Change in the work must be executed in accordance with the Contract Documents.';
  const noteLines = doc.splitTextToSize(noteText, cw);
  checkPage(noteLines.length * 3 + 5);
  doc.text(noteLines, ml, y);

  // ── FOOTER ─────────────────────────────────────────────────
  doc.setFontSize(7);
  doc.setTextColor(150, 150, 150);
  doc.setFont('helvetica', 'normal');
  doc.text('Cahaba Electric', ml, H - 6);
  doc.text('Page ' + doc.internal.getNumberOfPages(), W - mr, H - 6, { align: 'right' });

  const fileName = 'RFI_' + (r.number || idx+1) + '_' + (r.subject || 'untitled').replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30) + '.pdf';

  // If returnDoc mode, return the doc and filename instead of downloading
  if (returnDoc) return { doc, fileName };

  doc.save(fileName);
  showToast('RFI PDF downloaded!');
}

// ── ESTIMATING ───────────────────────────────────────────────
function ensureEstimating() { if (!db.bids) db.bids = []; }

const BID_STATUSES = ['Pending','Won','Lost','No Bid','Cancelled'];
const LOST_REASONS = ['Price','Relationship','Scope Issue','Timing','Qualification','Other'];

function getBidSizeCategory(amount) {
  const v = parseFloat(amount) || 0;
  if (v < 50000) return 'Small';
  if (v < 200000) return 'Medium';
  if (v < 500000) return 'Large';
  return 'Major';
}

function getBidSizeLabel(cat) {
  const m = { Small: '<$50K', Medium: '$50K–$200K', Large: '$200K–$500K', Major: '$500K+' };
  return m[cat] || cat;
}

function calcBidStats(bids) {
  const decided = bids.filter(b => b.status === 'Won' || b.status === 'Lost');
  const wins = decided.filter(b => b.status === 'Won');
  const winRate = decided.length > 0 ? Math.round(wins.length / decided.length * 100) : 0;
  const totalVolume = bids.reduce((s, b) => s + (parseFloat(b.bidAmount) || 0), 0);
  const allProfitPcts = bids.filter(b => b.profitPct).map(b => parseFloat(b.profitPct));
  const avgProfit = allProfitPcts.length ? allProfitPcts.reduce((s,v) => s+v, 0) / allProfitPcts.length : 0;
  const winProfitPcts = wins.filter(b => b.profitPct).map(b => parseFloat(b.profitPct));
  const avgWinProfit = winProfitPcts.length ? winProfitPcts.reduce((s,v) => s+v, 0) / winProfitPcts.length : 0;
  const pending = bids.filter(b => b.status === 'Pending');
  return { total: bids.length, decided: decided.length, wins: wins.length, winRate, totalVolume, avgProfit, avgWinProfit, pending: pending.length };
}

function renderEstimating() {
  ensureEstimating();
  const tabBar = `<div class="est-tabs">
    <button class="est-tab ${estTab==='bids'?'active':''}" onclick="estTab='bids';renderEstimating()">Bid Log</button>
    <button class="est-tab ${estTab==='analytics'?'active':''}" onclick="estTab='analytics';renderEstimating()">Analytics</button>
  </div>`;

  const stats = calcBidStats(db.bids);

  const chips = `<div class="summary-chips">
    <div class="chip"><div class="chip-icon">\u{1F4CA}</div><div class="chip-label">Total Bids</div><div class="chip-value">${stats.total}</div></div>
    <div class="chip ${stats.winRate>=30?'green':'red'}"><div class="chip-icon">\u{1F3AF}</div><div class="chip-label">Win Rate</div><div class="chip-value">${stats.winRate}%</div></div>
    <div class="chip"><div class="chip-icon">\u{23F3}</div><div class="chip-label">Active Bids</div><div class="chip-value">${stats.pending}</div></div>
    <div class="chip"><div class="chip-icon">\u{1F4B0}</div><div class="chip-label">Total Bid Volume</div><div class="chip-value">${fmtMoneyPlain(stats.totalVolume)}</div></div>
    <div class="chip"><div class="chip-icon">\u{1F4C8}</div><div class="chip-label">Avg Profit %</div><div class="chip-value">${stats.avgProfit.toFixed(1)}%</div></div>
    <div class="chip green"><div class="chip-icon">\u{1F3C6}</div><div class="chip-label">Avg Winning Profit %</div><div class="chip-value">${stats.avgWinProfit.toFixed(1)}%</div></div>
  </div>`;

  // Weighted pipeline
  const pendingBids = db.bids.filter(b => b.status === 'Pending');
  const pipelineTotal = pendingBids.reduce((s, b) => s + (parseFloat(b.bidAmount) || 0), 0);
  const weightedPipeline = pendingBids.reduce((s, b) => {
    const gc = b.gc || '';
    const size = b.sizeCategory || getBidSizeCategory(b.bidAmount);
    // Get historical win rate for this GC+size combo
    const similar = db.bids.filter(x => (x.status==='Won'||x.status==='Lost') && x.gc===gc);
    const simWinRate = similar.length >= 3 ? similar.filter(x => x.status==='Won').length / similar.length : (stats.winRate / 100);
    return s + (parseFloat(b.bidAmount) || 0) * (typeof simWinRate === 'number' ? simWinRate : 0.3);
  }, 0);

  const pipelineHtml = pendingBids.length ? `<div class="est-pipeline">
    <div style="font-size:0.78rem;font-weight:700;color:var(--accent-hex);text-transform:uppercase;margin-bottom:8px">Bid Pipeline</div>
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <div><span style="font-size:0.75rem;color:var(--text-secondary)">Total Pending</span><div style="font-size:1.1rem;font-weight:800;color:var(--accent-hex)">${fmtMoneyPlain(pipelineTotal)}</div></div>
      <div><span style="font-size:0.75rem;color:var(--text-secondary)">Weighted Pipeline (est.)</span><div style="font-size:1.1rem;font-weight:800;color:#22c55e">${fmtMoneyPlain(weightedPipeline)}</div></div>
      <div><span style="font-size:0.75rem;color:var(--text-secondary)">Pending Count</span><div style="font-size:1.1rem;font-weight:800;color:var(--accent-hex)">${pendingBids.length}</div></div>
    </div>
  </div>` : '';

  let content = '';
  if (estTab === 'bids') content = renderBidLog();
  else content = renderBidAnalytics();

  document.getElementById('mainContent').innerHTML = `
    <div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--glass-border);margin-bottom:16px">
      <div class="section-header"><h3>Estimating</h3></div>
      ${chips}
      ${pipelineHtml}
      ${tabBar}
      ${content}
    </div>`;
}

function renderBidLog() {
  ensureEstimating();
  // Sort by date, then keep multi-GC bids grouped together
  const bids = db.bids.slice().sort((a,b) => {
    const dateA = a.bidDate || '';
    const dateB = b.bidDate || '';
    if (dateA !== dateB) return dateB.localeCompare(dateA);
    // Same date: group by bidGroupId
    if (a.bidGroupId && a.bidGroupId === b.bidGroupId) return 0;
    return 0;
  });
  // Re-sort to ensure grouped bids are adjacent
  const grouped = [];
  const added = new Set();
  bids.forEach(b => {
    if (added.has(b)) return;
    grouped.push(b);
    added.add(b);
    if (b.bidGroupId) {
      bids.filter(x => x.bidGroupId === b.bidGroupId && !added.has(x)).forEach(x => { grouped.push(x); added.add(x); });
    }
  });
  const sortedBids = grouped;

  if (!bids.length) {
    return `<div class="section-header"><h3>Bid Log</h3><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="openBidModal()">+ Add Bid</button><button class="btn btn-sm" style="background:#e0e7ff;color:#3730a3;font-weight:600" onclick="openMultiGCBidModal()">+ Multi-GC Bid</button></div></div>
      <div class="table-empty" style="padding:40px"><div style="font-size:2.5rem;margin-bottom:12px">📊</div><h3 style="color:var(--text-secondary)">No bids tracked yet</h3><p style="margin-top:6px;font-size:0.85rem">Click "+ Add Bid" to start tracking your estimates</p></div>`;
  }

  // Track which bidGroupIds we've seen to show group indicator
  const seenGroups = {};
  const rows = sortedBids.map((b, _) => {
    const realIdx = db.bids.indexOf(b);
    const sizeCls = 'est-size-' + (b.sizeCategory || getBidSizeCategory(b.bidAmount));
    const statusCls = 'est-bid-' + (b.status || 'Pending').replace(/\s/g,'');
    const profitColor = b.profitPct ? (parseFloat(b.profitPct) >= 15 ? '#22c55e' : (parseFloat(b.profitPct) >= 10 ? 'var(--accent-hex)' : '#f59e0b')) : 'var(--text-secondary)';
    const aging = b.status === 'Pending' && b.bidDate ? (() => {
      const days = Math.round((new Date() - new Date(b.bidDate+'T00:00:00')) / (1000*60*60*24));
      return days > 30 ? `<span style="color:#dc2626;font-size:0.75rem;font-weight:700">${days}d pending</span>` : '';
    })() : '';
    const convertBtn = b.status === 'Won' && !b.convertedToProject ? `<button class="btn btn-sm" style="background:rgba(34,197,94,0.12);color:#22c55e" onclick="convertBidToProject(${realIdx})">Convert</button>` : '';
    // Multi-GC group indicator
    let groupTag = '';
    if (b.bidGroupId) {
      const groupBids = db.bids.filter(x => x.bidGroupId === b.bidGroupId);
      if (!seenGroups[b.bidGroupId]) {
        seenGroups[b.bidGroupId] = true;
        groupTag = `<span style="display:inline-block;background:#e0e7ff;color:#3730a3;font-size:0.7rem;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px" title="Multi-GC bid: ${groupBids.length} GCs">▼ ${groupBids.length} GCs</span>`;
      } else {
        groupTag = `<span style="display:inline-block;background:#f1f5f9;color:var(--text-secondary);font-size:0.7rem;padding:1px 6px;border-radius:8px;margin-left:4px">↳</span>`;
      }
    }
    // Dashed border between grouped bids (not on first in group)
    const isGroupContinuation = b.bidGroupId && !groupTag.includes('▼');
    const rowBorder = isGroupContinuation ? 'border-top:1px dashed var(--border)' : '';
    return `<tr style="${rowBorder}">
      <td>${fmtDate(b.bidDate)}</td>
      <td style="font-weight:600">${b.projectName||''}${groupTag}</td>
      <td>${b.gc||''}</td>
      <td style="text-align:right;font-weight:600">${b.bidAmount ? fmtMoneyPlain(parseFloat(b.bidAmount)) : '—'}</td>
      <td style="text-align:right;font-weight:700;color:${profitColor}">${b.profitPct ? b.profitPct+'%' : '—'}</td>
      <td style="text-align:right">${b.profitDollars ? fmtMoneyPlain(parseFloat(b.profitDollars)) : '—'}</td>
      <td><span class="status-badge ${sizeCls}">${b.sizeCategory || getBidSizeCategory(b.bidAmount)}</span></td>
      <td><span style="font-weight:700" class="${statusCls}">${b.status||'Pending'}</span> ${aging}</td>
      <td style="white-space:nowrap">
        ${convertBtn}
        <button class="btn btn-sm btn-secondary" onclick="openBidModal(${realIdx})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteBid(${realIdx})">Del</button>
      </td>
    </tr>`;
  }).join('');

  return `<div class="section-header"><h3>Bid Log</h3><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="openBidModal()">+ Add Bid</button><button class="btn btn-sm" style="background:#e0e7ff;color:#3730a3;font-weight:600" onclick="openMultiGCBidModal()">+ Multi-GC Bid</button></div></div>
    <div style="overflow-x:auto">
    <table class="data-table">
      <thead><tr><th>Date</th><th>Project</th><th>GC</th><th style="text-align:right">Bid Amount</th><th style="text-align:right">Profit %</th><th style="text-align:right">Profit $</th><th>Size</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>`;
}

function openBidModal(editIdx) {
  ensureEstimating();
  const isEdit = editIdx != null && editIdx !== undefined;
  const b = isEdit ? db.bids[editIdx] : {};
  const statusOpts = BID_STATUSES.map(s => `<option value="${s}" ${(b.status||'Pending')===s?'selected':''}>${s}</option>`).join('');
  const reasonOpts = LOST_REASONS.map(r => `<option value="${r}" ${b.lostReason===r?'selected':''}>${r}</option>`).join('');
  const sizeOpts = ['','Small','Medium','Large','Major'].map(s => `<option value="${s}" ${(b.sizeCategory||'')===s?'selected':''}>${s ? s+' ('+getBidSizeLabel(s)+')' : 'Auto-detect'}</option>`).join('');

  // GC autocomplete will be set up after modal opens
  const existingCost = b.cost || '';
  const existingBid = b.bidAmount || '';

  // Historical helper
  let helperHtml = '';
  if (isEdit && b.gc && (b.status === 'Pending' || !b.status)) {
    const gcBids = db.bids.filter(x => x.gc === b.gc && (x.status==='Won'||x.status==='Lost'));
    if (gcBids.length >= 2) {
      const gcWins = gcBids.filter(x => x.status === 'Won');
      const gcWinRate = Math.round(gcWins.length / gcBids.length * 100);
      const avgWinProfit = gcWins.length ? (gcWins.reduce((s,x) => s + (parseFloat(x.profitPct)||0), 0) / gcWins.length).toFixed(1) : '—';
      helperHtml = `<div class="est-helper"><strong>History with ${b.gc}:</strong> ${gcBids.length} bids, ${gcWinRate}% win rate, avg winning profit ${avgWinProfit}%</div>`;
    }
  }

  modal(isEdit ? 'Edit Bid' : 'New Bid',
    `<div class="form-group"><label>Project Name *</label><input id="bid_name" value="${b.projectName||''}" placeholder="Project being bid"></div>
     <div class="form-row">
       <div class="form-group"><label>General Contractor</label><input id="bid_gc" value="${b.gc||''}" placeholder="GC name"></div>
       <div class="form-group"><label>Bid Date</label><input id="bid_date" type="date" value="${b.bidDate||new Date().toISOString().slice(0,10)}"></div>
     </div>
     <div class="form-section-title">Pricing</div>
     <div class="form-row">
       <div class="form-group"><label>Our Cost ($)</label><input id="bid_cost" type="number" value="${existingCost}" placeholder="0.00" oninput="calcBidProfit()"></div>
       <div class="form-group"><label>Bid Amount ($) *</label><input id="bid_amount" type="number" value="${existingBid}" placeholder="0.00" oninput="calcBidProfit()"></div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>Profit %</label><input id="bid_profitPct" type="number" value="${b.profitPct||''}" placeholder="Auto or enter" step="0.1" oninput="calcBidFromPct()"></div>
       <div class="form-group"><label>Profit $</label><input id="bid_profitDollars" type="number" value="${b.profitDollars||''}" placeholder="Auto-calculated" readonly style="background:var(--bg-surface)"></div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>Size Category</label><select id="bid_size">${sizeOpts}</select></div>
       <div class="form-group"><label>Status</label><select id="bid_status" onchange="toggleLostReason()">${statusOpts}</select></div>
     </div>
     <div id="bid_lost_section" style="display:${b.status==='Lost'?'block':'none'}">
       <div class="form-row">
         <div class="form-group"><label>Reason Lost</label><select id="bid_lostReason"><option value="">Select...</option>${reasonOpts}</select></div>
         <div class="form-group"><label>Result Date</label><input id="bid_resultDate" type="date" value="${b.resultDate||''}"></div>
       </div>
     </div>
     <div id="bid_won_section" style="display:${b.status==='Won'?'block':'none'}">
       <div class="form-group"><label>Result Date</label><input id="bid_wonDate" type="date" value="${b.resultDate||''}"></div>
     </div>
     <div class="form-group"><label>Notes</label><textarea id="bid_notes" rows="2" placeholder="Competitors, scope details, why won/lost...">${b.notes||''}</textarea></div>
     ${helperHtml}`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveBid(${isEdit?editIdx:'null'})">Save</button>`);

  // Setup GC autocomplete
  setTimeout(() => {
    ensureContacts();
    const gcNames = [...new Set([
      ...(db.contacts.companies || []),
      ...db.bids.map(b => b.gc).filter(Boolean)
    ])];
    setupAC('bid_gc',
      q => gcNames.filter(c => c.toLowerCase().includes(q.toLowerCase())).map(c => ({ label: c })),
      item => { setVal('bid_gc', item.label); updateBidHelper(); }
    );
  }, 50);
}

function calcBidProfit() {
  const cost = parseFloat(val('bid_cost')) || 0;
  const bid = parseFloat(val('bid_amount')) || 0;
  if (cost > 0 && bid > 0) {
    const profit = bid - cost;
    const pct = ((profit / bid) * 100).toFixed(1);
    setVal('bid_profitPct', pct);
    setVal('bid_profitDollars', profit.toFixed(2));
  }
}

function calcBidFromPct() {
  const cost = parseFloat(val('bid_cost')) || 0;
  const pct = parseFloat(val('bid_profitPct')) || 0;
  if (cost > 0 && pct > 0) {
    const bid = cost / (1 - pct / 100);
    const profit = bid - cost;
    setVal('bid_amount', bid.toFixed(2));
    setVal('bid_profitDollars', profit.toFixed(2));
  }
}

function toggleLostReason() {
  const status = val('bid_status');
  const lostSec = document.getElementById('bid_lost_section');
  const wonSec = document.getElementById('bid_won_section');
  if (lostSec) lostSec.style.display = status === 'Lost' ? 'block' : 'none';
  if (wonSec) wonSec.style.display = status === 'Won' ? 'block' : 'none';
}

function updateBidHelper() {
  // Could dynamically update helper — keeping simple for now
}

// ── MULTI-GC BID ───────────────────────────────────────────────
let multiGCRowCount = 0;

function openMultiGCBidModal() {
  ensureEstimating();
  multiGCRowCount = 0;

  modal('Multi-GC Bid',
    `<div class="form-group"><label>Project Name *</label><input id="mgc_name" placeholder="Project being bid"></div>
     <div class="form-row">
       <div class="form-group"><label>Bid Date</label><input id="mgc_date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
       <div class="form-group"><label>Our Cost ($) *</label><input id="mgc_cost" type="number" placeholder="0.00" oninput="recalcAllMultiGCRows()"></div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>Size Category</label><select id="mgc_size"><option value="">Auto-detect</option><option value="Small">Small (<$50K)</option><option value="Medium">Medium ($50K–$200K)</option><option value="Large">Large ($200K–$500K)</option><option value="Major">Major ($500K+)</option></select></div>
       <div class="form-group"><label>Notes</label><input id="mgc_notes" placeholder="Scope details, competitors..."></div>
     </div>
     <div style="margin-top:16px;padding-top:12px;border-top:2px solid #e2e8f0">
       <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
         <strong style="font-size:0.95rem;color:var(--accent-hex)">GC Pricing</strong>
         <button class="btn btn-sm" style="background:#e0e7ff;color:#3730a3;font-weight:600" onclick="addMultiGCRow()">+ Add GC</button>
       </div>
       <div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:8px">Enter each GC with their specific bid amount or profit %. Local GCs might get tighter pricing than out-of-state.</div>
       <div id="mgc_rows"></div>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveMultiGCBid()">Save All Bids</button>`);

  // Add two starter rows
  setTimeout(() => { addMultiGCRow(); addMultiGCRow(); }, 50);
}

function addMultiGCRow() {
  const idx = multiGCRowCount++;
  const container = document.getElementById('mgc_rows');
  if (!container) return;
  const row = document.createElement('div');
  row.id = 'mgc_row_' + idx;
  row.style.cssText = 'background:var(--bg-surface);border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative';
  row.innerHTML = `
    <button onclick="this.parentElement.remove()" style="position:absolute;top:6px;right:8px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;padding:2px 6px" title="Remove">&times;</button>
    <div class="form-row" style="margin-bottom:0">
      <div class="form-group" style="flex:2"><label style="font-size:0.78rem">General Contractor</label><input id="mgc_gc_${idx}" placeholder="GC name"></div>
      <div class="form-group" style="flex:1"><label style="font-size:0.78rem">Bid Amount ($)</label><input id="mgc_bid_${idx}" type="number" placeholder="0.00" oninput="calcMultiGCRowProfit(${idx})"></div>
      <div class="form-group" style="flex:0.7"><label style="font-size:0.78rem">Profit %</label><input id="mgc_pct_${idx}" type="number" placeholder="Auto" step="0.1" oninput="calcMultiGCRowFromPct(${idx})"></div>
      <div class="form-group" style="flex:0.7"><label style="font-size:0.78rem">Profit $</label><input id="mgc_profit_${idx}" type="number" readonly style="background:#f1f5f9" placeholder="—"></div>
    </div>
    <div id="mgc_helper_${idx}" style="font-size:0.75rem;color:var(--text-secondary);margin-top:2px"></div>`;
  container.appendChild(row);

  // Setup GC autocomplete for this row
  setTimeout(() => {
    ensureContacts();
    const gcNames = [...new Set([
      ...(db.contacts.companies || []),
      ...db.bids.map(b => b.gc).filter(Boolean)
    ])];
    setupAC('mgc_gc_' + idx,
      q => gcNames.filter(c => c.toLowerCase().includes(q.toLowerCase())).map(c => ({ label: c })),
      item => {
        setVal('mgc_gc_' + idx, item.label);
        showMultiGCHelper(idx, item.label);
      }
    );
    // Show helper on blur too
    const gcInput = document.getElementById('mgc_gc_' + idx);
    if (gcInput) gcInput.addEventListener('blur', () => setTimeout(() => showMultiGCHelper(idx, gcInput.value), 150));
  }, 50);
}

function showMultiGCHelper(idx, gcName) {
  const el = document.getElementById('mgc_helper_' + idx);
  if (!el || !gcName) { if (el) el.innerHTML = ''; return; }
  const gcBids = db.bids.filter(x => x.gc === gcName && (x.status==='Won'||x.status==='Lost'));
  if (gcBids.length >= 2) {
    const wins = gcBids.filter(x => x.status === 'Won');
    const winRate = Math.round(wins.length / gcBids.length * 100);
    const avgWinProfit = wins.length ? (wins.reduce((s,x) => s + (parseFloat(x.profitPct)||0), 0) / wins.length).toFixed(1) : '—';
    el.innerHTML = `<span style="color:#3730a3">📊 ${gcName}: ${gcBids.length} bids, ${winRate}% win rate, avg winning profit ${avgWinProfit}%</span>`;
  } else {
    el.innerHTML = '';
  }
}

function calcMultiGCRowProfit(idx) {
  const cost = parseFloat(val('mgc_cost')) || 0;
  const bid = parseFloat(val('mgc_bid_' + idx)) || 0;
  if (cost > 0 && bid > 0) {
    const profit = bid - cost;
    const pct = ((profit / bid) * 100).toFixed(1);
    setVal('mgc_pct_' + idx, pct);
    setVal('mgc_profit_' + idx, profit.toFixed(2));
  }
}

function calcMultiGCRowFromPct(idx) {
  const cost = parseFloat(val('mgc_cost')) || 0;
  const pct = parseFloat(val('mgc_pct_' + idx)) || 0;
  if (cost > 0 && pct > 0) {
    const bid = cost / (1 - pct / 100);
    const profit = bid - cost;
    setVal('mgc_bid_' + idx, bid.toFixed(2));
    setVal('mgc_profit_' + idx, profit.toFixed(2));
  }
}

function recalcAllMultiGCRows() {
  for (let i = 0; i < multiGCRowCount; i++) {
    if (!document.getElementById('mgc_row_' + i)) continue;
    const bid = parseFloat(val('mgc_bid_' + i));
    const pct = parseFloat(val('mgc_pct_' + i));
    if (bid) calcMultiGCRowProfit(i);
    else if (pct) calcMultiGCRowFromPct(i);
  }
}

function saveMultiGCBid() {
  ensureEstimating();
  const name = val('mgc_name').trim();
  if (!name) { alert('Project name is required.'); return; }
  const cost = val('mgc_cost');
  const bidDate = val('mgc_date');
  const sizeManual = val('mgc_size');
  const notes = val('mgc_notes');

  // Collect GC rows
  const gcEntries = [];
  for (let i = 0; i < multiGCRowCount; i++) {
    if (!document.getElementById('mgc_row_' + i)) continue;
    const gc = val('mgc_gc_' + i).trim();
    const bidAmount = val('mgc_bid_' + i);
    const profitPct = val('mgc_pct_' + i);
    const profitDollars = val('mgc_profit_' + i);
    if (!gc && !bidAmount) continue; // skip empty rows
    if (!gc) { alert('Each GC row needs a GC name.'); return; }
    if (!bidAmount) { alert('Each GC row needs a bid amount. Missing for: ' + gc); return; }
    gcEntries.push({ gc, bidAmount, profitPct, profitDollars });
  }

  if (gcEntries.length < 1) { alert('Add at least one GC with pricing.'); return; }

  const bidGroupId = genId();

  gcEntries.forEach(entry => {
    const b = {
      projectName: name,
      gc: entry.gc,
      bidDate,
      cost,
      bidAmount: entry.bidAmount,
      profitPct: entry.profitPct,
      profitDollars: entry.profitDollars,
      sizeCategory: sizeManual || getBidSizeCategory(entry.bidAmount),
      status: 'Pending',
      lostReason: '',
      resultDate: '',
      notes,
      convertedToProject: false,
      bidGroupId
    };
    db.bids.push(b);

    // Save GC to contacts
    if (entry.gc) {
      ensureContacts();
      if (!db.contacts.companies.includes(entry.gc)) db.contacts.companies.push(entry.gc);
    }
  });

  saveData(); closeModal(); renderEstimating();
  showToast(`${gcEntries.length} bids created for ${name}!`);
}

function saveBid(editIdx) {
  ensureEstimating();
  const name = val('bid_name').trim();
  if (!name) { alert('Project name is required.'); return; }
  const bidAmount = val('bid_amount');
  if (!bidAmount) { alert('Bid amount is required.'); return; }

  const isEdit = editIdx !== null && editIdx !== 'null' && editIdx !== undefined;
  const existing = isEdit ? db.bids[editIdx] : {};
  const status = val('bid_status');

  const b = {
    projectName: name,
    gc: val('bid_gc'),
    bidDate: val('bid_date'),
    cost: val('bid_cost'),
    bidAmount,
    profitPct: val('bid_profitPct'),
    profitDollars: val('bid_profitDollars'),
    sizeCategory: val('bid_size') || getBidSizeCategory(bidAmount),
    status,
    lostReason: status === 'Lost' ? val('bid_lostReason') : '',
    resultDate: status === 'Lost' ? val('bid_resultDate') : (status === 'Won' ? val('bid_wonDate') : ''),
    notes: val('bid_notes'),
    convertedToProject: existing.convertedToProject || false
  };

  // Save GC to contacts
  if (b.gc) {
    ensureContacts();
    if (!db.contacts.companies.includes(b.gc)) db.contacts.companies.push(b.gc);
  }

  if (isEdit) db.bids[editIdx] = b;
  else db.bids.push(b);
  saveData(); closeModal(); renderEstimating(); showToast('Bid saved!');
}

function deleteBid(idx) {
  if (!confirm('Delete this bid?')) return;
  db.bids.splice(idx, 1);
  saveData(); renderEstimating(); showToast('Bid deleted.');
}

function convertBidToProject(bidIdx) {
  const b = db.bids[bidIdx];
  if (!b || b.convertedToProject) return;
  if (!confirm('Create a new project from this bid?\n\n' + b.projectName + ' — ' + fmtMoneyPlain(parseFloat(b.bidAmount)))) return;

  const p = {
    id: genId(),
    name: b.projectName,
    client: b.gc || '',
    gcCompany: b.gc || '',
    contractValue: b.bidAmount,
    status: 'Active',
    jobNumber: '',
    address: '',
    pm: '',
    startDate: '',
    completionDate: '',
    subcontractors: [],
    changeOrders: [],
    submittals: [],
    rfis: [],
    dailyLogs: [],
    punchList: [],
    startupChecks: {},
    notes: b.notes ? 'From bid: ' + b.notes : ''
  };
  db.projects.push(p);
  b.convertedToProject = true;
  extractContacts(p);
  saveData(); renderEstimating();
  showToast('Project created! Go to Projects to view it.');
}
