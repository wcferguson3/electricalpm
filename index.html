// ── INDEXEDDB FILE STORAGE ──────────────────────────────────
// Files go here (hundreds of MB), project data stays in localStorage
let fileDB = null;
function openFileDB() {
  return new Promise((resolve, reject) => {
    if (fileDB) { resolve(fileDB); return; }
    const req = indexedDB.open('electricalPM_files', 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore('files'); };
    req.onsuccess = e => { fileDB = e.target.result; resolve(fileDB); };
    req.onerror = e => { console.error('IndexedDB error:', e); reject(e); };
  });
}
// ── SUPABASE STORAGE (cloud file storage) ───────────────────
async function filePut(key, data) {
  // Upload to Supabase Storage
  try {
    // Convert base64 data URL to blob
    const res = await fetch(data);
    const blob = await res.blob();
    const ext = blob.type.split('/')[1] || 'bin';
    const filePath = `${key}.${ext}`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/project-files/${filePath}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${_cachedAccessToken}`,
      },
      body: blob
    });
    if (!uploadRes.ok) {
      const err = await uploadRes.text();
      console.error('File upload error:', err);
      // Fallback to IndexedDB
      const db_ = await openFileDB();
      return new Promise((resolve, reject) => {
        const tx = db_.transaction('files', 'readwrite');
        tx.objectStore('files').put(data, key);
        tx.oncomplete = () => resolve();
        tx.onerror = e => reject(e);
      });
    }
  } catch(e) {
    console.error('File upload exception:', e);
    // Fallback to IndexedDB
    const db_ = await openFileDB();
    return new Promise((resolve, reject) => {
      const tx = db_.transaction('files', 'readwrite');
      tx.objectStore('files').put(data, key);
      tx.oncomplete = () => resolve();
      tx.onerror = e => reject(e);
    });
  }
}

async function fileGet(key) {
  if (!key) return null;
  // Cloud reference (supa:key.ext)
  if (key.startsWith('supa:')) {
    const filePath = key.slice(5);
    return `${SUPABASE_URL}/storage/v1/object/public/project-files/${filePath}`;
  }
  // Legacy IDB reference
  if (key.startsWith('idb:')) {
    const realKey = key.slice(4);
    const db_ = await openFileDB();
    return new Promise((resolve, reject) => {
      const tx = db_.transaction('files', 'readonly');
      const req = tx.objectStore('files').get(realKey);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = e => reject(e);
    });
  }
  return key; // Raw data URL (legacy)
}

async function fileDel(key) {
  if (!key) return;
  if (key.startsWith('supa:')) {
    const filePath = key.slice(5);
    await fetch(`${SUPABASE_URL}/storage/v1/object/project-files/${filePath}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${_cachedAccessToken}`,
      }
    }).catch(e => console.error('File delete error:', e));
    return;
  }
  if (key.startsWith('idb:')) {
    const realKey = key.slice(4);
    const db_ = await openFileDB();
    return new Promise((resolve, reject) => {
      const tx = db_.transaction('files', 'readwrite');
      tx.objectStore('files').delete(realKey);
      tx.oncomplete = () => resolve();
      tx.onerror = e => reject(e);
    });
  }
}

// Save file to Supabase Storage, return reference key
async function fileSave(data) {
  const key = genId();
  try {
    const res = await fetch(data);
    const blob = await res.blob();
    const ext = blob.type.split('/')[1] || 'bin';
    const filePath = `${key}.${ext}`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/project-files/${filePath}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${_cachedAccessToken}`,
      },
      body: blob
    });
    if (uploadRes.ok) {
      return 'supa:' + filePath;
    }
    console.error('Upload failed:', await uploadRes.text());
  } catch(e) {
    console.error('Upload exception:', e);
  }
  // Fallback to IndexedDB if cloud upload fails
  await filePut(key, data);
  return 'idb:' + key;
}

function isFileRef(val) { return val && typeof val === 'string' && (val.startsWith('idb:') || val.startsWith('supa:')); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtDate(v) { if (!v) return '<span class="empty">—</span>'; const [y,m,d] = v.split('-'); return `${m}/${d}/${y}`; }
function fmtMoney(v) { if (v === '' || v === null || v === undefined) return '<span class="empty">—</span>'; return '$' + parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function dash(v) { return (v && v.trim()) ? v : '<span class="empty">—</span>'; }

// ── DASHBOARD ────────────────────────────────────────────────
let showProjectCards = true;

function getLookAheadItems() {
  const items = [];
  const today = new Date(); today.setHours(0,0,0,0);
  const twoWeeks = new Date(today); twoWeeks.setDate(twoWeeks.getDate() + 14);
  const todayStr = today.toISOString().slice(0,10);

  db.projects.forEach(p => {
    if (p.status === 'Completed' || p.status === 'Cancelled') return;
    const pName = p.name;
    const pid = p.id;

    // Project dates
    if (p.startDate) items.push({ date:p.startDate, project:pName, pid, item:'Project Start', type:'project' });
    if (p.completionDate) items.push({ date:p.completionDate, project:pName, pid, item:'Project Completion', type:'project' });

    // Inspection dates
    const inspections = [['dateService','Service Inspection'],['dateUnderground','Underground Inspection'],['dateInwall','In-Wall Inspection'],['dateOverhead','Overhead Inspection'],['dateFireAlarm','Fire Alarm Inspection'],['dateFinalElectrical','Final Electrical Inspection']];
    inspections.forEach(([key, label]) => {
      if (p[key] && !p[key+'Passed']) items.push({ date:p[key], project:pName, pid, item:label, type:'inspection' });
    });

    // Submittal dates
    (p.submittals||[]).forEach(s => {
      if (s.dateRequested) items.push({ date:s.dateRequested, project:pName, pid, item:s.description+' — Requested', type:'submittal' });
      if (s.dateSubmitted && s.status === 'Pending') items.push({ date:s.dateSubmitted, project:pName, pid, item:s.description+' — Submitted', type:'submittal' });
      if (s.dateReturned) items.push({ date:s.dateReturned, project:pName, pid, item:s.description+' — Released', type:'submittal' });
      // Follow-up reminder: 7 days after requested if no submitted date
      if (s.dateRequested && !s.dateSubmitted) {
        const reqDate = new Date(s.dateRequested+'T00:00:00');
        const followUp = new Date(reqDate); followUp.setDate(followUp.getDate() + 7);
        const followUpStr = followUp.toISOString().slice(0,10);
        items.push({ date:followUpStr, project:pName, pid, item:s.description+' — Follow Up (requested '+fmtDate(s.dateRequested)+')', type:'submittal' });
      }
    });

    // CO dates
    (p.changeOrders||[]).forEach(c => {
      if (c.approvalDate && c.status === 'Pending') items.push({ date:c.approvalDate, project:pName, pid, item:'CO #'+c.number+' — Approval', type:'co' });
    });
  });

  // Filter to items within range: past 7 days (overdue) through next 14 days
  const pastWeek = new Date(today); pastWeek.setDate(pastWeek.getDate() - 7);
  return items
    .filter(i => {
      const d = new Date(i.date+'T00:00:00');
      return d >= pastWeek && d <= twoWeeks;
    })
    .sort((a,b) => a.date.localeCompare(b.date))
    .map(i => {
      const d = new Date(i.date+'T00:00:00');
      if (d < today) i.status = 'overdue';
      else if (i.date === todayStr) i.status = 'today';
      else i.status = 'upcoming';
      return i;
    });
}

              <span class="status-badge status-${(p.status||'Active').replace(/ /g,'-')}">${p.status||'Active'}</span>
            </div>

      <div style="margin-bottom:20px">
        <div style="font-size:1.1rem;font-weight:700;color:var(--text)">Hey ${firstName}</div>
        <div style="font-size:0.82rem;color:var(--text-secondary);margin-top:2px">Select a project to get started</div>
      </div>

      <div class="projects-grid">${cards}</div>`;

  const userName = currentUserProfile ? (currentUserProfile.full_name || currentUserProfile.email || '') : '';

  // Stats
  const openRFIs = projects.reduce((s, p) => s + (p.rfis || []).filter(r => r.status === 'Open' || r.status === 'Pending Review').length, 0);
  const pendingCOs = projects.reduce((s, p) => s + (p.changeOrders || []).filter(c => c.status === 'Pending' || c.status === 'In Review').length, 0);
  const overdueItems = lookAhead.filter(i => i.status === 'overdue').length;
  const totalValue = activeProjects.reduce((s, p) => s + (parseFloat(p.contractValue) || 0), 0);

  // Look ahead rows
  const laRows = lookAhead.length ? lookAhead.slice(0, 10).map(i => {

    return `<tr class="${rowClass}" style="cursor:pointer" onclick="showProject('${i.pid}')">
      <td style="font-weight:600;white-space:nowrap">${fmtDate(i.date)}</td>
      <td>${i.project}</td>
      <td><span class="la-tag ${tagClass}">${i.type.charAt(0).toUpperCase()+i.type.slice(1)}</span></td>
      <td>${i.item}${statusTag}</td>
    </tr>`;

  let cards = projects.length === 0
    ? `<div class="no-projects"><div style="font-size:3rem;margin-bottom:12px">\u{1F4CB}</div><h3 style="color:var(--text-secondary)">No projects yet</h3><p style="margin-top:6px;font-size:0.85rem">Click "+ New Project" to get started</p></div>`
    : projects.map(p => `
        <div class="project-card" onclick="showProject('${p.id}')">
          <div class="card-job-num">${p.jobNumber || 'No Job #'}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-client">${p.client || ''}</div>
          <div class="card-footer">
            <span class="status-badge status-${(p.status||'Active').replace(/ /g,'-')}">${p.status||'Active'}</span>
            <span class="card-value">${p.contractValue ? '$'+parseFloat(p.contractValue).toLocaleString() : ''}</span>
          </div>
        </div>`).join('');

  document.getElementById('mainContent').innerHTML = `
    <!-- Welcome Banner -->
    <div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px;box-shadow:var(--shadow-sm)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <div>
          <div style="font-size:1.15rem;font-weight:800;color:var(--text)">Welcome back, ${firstName}</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:2px">${roleName} \u2022 Cahaba Electric</div>
        </div>
        <button class="btn btn-primary" onclick="openProjectModal()" style="white-space:nowrap">+ New Project</button>
      </div>
      <div class="summary-chips" style="margin:0">
        <div class="chip"><div class="chip-icon">\u{1F3D7}</div><div class="chip-label">Active Projects</div><div class="chip-value">${activeProjects.length}</div></div>
        <div class="chip"><div class="chip-icon">\u{1F4B0}</div><div class="chip-label">Total Value</div><div class="chip-value">${fmtMoney(totalValue)}</div></div>
        <div class="chip ${openRFIs > 0 ? 'red' : 'green'}"><div class="chip-icon">\u{1F4E8}</div><div class="chip-label">Open RFIs</div><div class="chip-value">${openRFIs}</div></div>
        <div class="chip ${pendingCOs > 0 ? 'red' : 'green'}"><div class="chip-icon">\u{1F4DD}</div><div class="chip-label">Pending COs</div><div class="chip-value">${pendingCOs}</div></div>
        ${overdueItems > 0 ? `<div class="chip red"><div class="chip-icon">\u26A0</div><div class="chip-label">Overdue</div><div class="chip-value">${overdueItems}</div></div>` : ''}
      </div>
    </div>

    <!-- Quick Nav -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:18px">
      <div class="dash-nav-card" onclick="showCashFlow()"><span class="dash-nav-icon">\u{1F4CA}</span><span class="dash-nav-label">Cash Flow</span></div>
      <div class="dash-nav-card" onclick="showFleetTools()"><span class="dash-nav-icon">\u{1F69C}</span><span class="dash-nav-label">Fleet & Tools</span></div>
      <div class="dash-nav-card" onclick="showEstimating()"><span class="dash-nav-icon">\u{1F4DD}</span><span class="dash-nav-label">Estimating</span></div>
      <div class="dash-nav-card" onclick="showEmployeeManager()"><span class="dash-nav-icon">\u{1F465}</span><span class="dash-nav-label">Employees</span></div>
      <div class="dash-nav-card" onclick="showTimesheets()"><span class="dash-nav-icon">\u{1F553}</span><span class="dash-nav-label">Timesheets</span></div>
      ${isMaster() ? '<div class="dash-nav-card" onclick="showUserManager()"><span class="dash-nav-icon">\u{1F511}</span><span class="dash-nav-label">User Access</span></div>' : ''}
    </div>

    <!-- 2-Week Look Ahead -->
    ${lookAhead.length ? `<div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm);margin-bottom:18px">
      <div style="font-size:0.85rem;font-weight:700;color:var(--text);margin-bottom:10px">2-Week Look Ahead</div>
      <table class="data-table" style="margin:0">
        <thead><tr><th>Date</th><th>Project</th><th>Type</th><th>Item</th></tr></thead>
        <tbody>${laRows}</tbody>
      </table>
    </div>` : ''}

    <!-- Projects -->
    <div class="dash-header" style="margin-bottom:12px">
      <div style="font-size:0.95rem;font-weight:700;color:var(--text)">Projects (${projects.length})</div>
    </div>
    <div class="projects-grid">${cards}</div>`;
}

function toggleProjectCards() {
  showProjectCards = !showProjectCards;
  const container = document.getElementById('projectCardsContainer');
  const toggle = document.getElementById('projToggle');
  if (container) container.style.display = showProjectCards ? 'block' : 'none';

// ── PROJECT VIEW ─────────────────────────────────────────────
function renderProjectView() {
  const p = getProject(currentProjectId);
  const allTabDefs = [
    ['overview','Overview','\u{1F4CB}'],['changeorders','Change Orders','\u{1F4DD}'],['submittals','Submittals','\u{1F4E4}'],
    ['rfis','RFIs','\u{2753}'],['budget','Budget','\u{1F4B0}'],['billing','Billing','\u{1F4B3}'],
    /* ['dailylogs','Daily Logs','\u{1F4C5}'],['punchlist','Punch List','\u{2705}'], — hidden for now */
    /* ['startup','Startup Checklist','\u{1F680}'], — hidden for now, reimplementing later */
  ];
  const fieldHiddenTabs = ['budget','billing'];
  const tabDefs = isField() ? allTabDefs.filter(([id]) => !fieldHiddenTabs.includes(id)) : allTabDefs;
  const sidebarHtml = tabDefs.map(([id,lbl,icon]) =>
    `<button class="tab ${currentTab===id?'active':''}" onclick="switchTab('${id}')"><span class="tab-icon">${icon}</span>${lbl}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="project-header">
      <div class="proj-title">${p.name}</div>
      <div class="proj-meta">${[p.jobNumber,p.client,p.status].filter(Boolean).join(' \u00B7 ')}</div>
    </div>
    <button class="sidebar-toggle" onclick="document.getElementById('projSidebar').classList.toggle('open')">
      \u2630 Menu
    </button>
    <div class="project-layout">
      <nav class="sidebar" id="projSidebar">${sidebarHtml}</nav>
      <div class="tab-content-area">
        <div class="tab-content" id="tabContent"></div>
      </div>
    </div>
    <nav class="bottom-nav" id="bottomNav">${tabDefs.map(([id,lbl,icon]) =>
      `<button class="bnav-btn ${currentTab===id?'active':''}" onclick="switchTab('${id}')"><span class="bnav-icon">${icon}</span>${lbl}</button>`
    ).join('')}</nav>`;
  renderCurrentTab();
}

function switchTab(tab) {
  currentTab = tab;
  const sidebar = document.getElementById('projSidebar');
  if (sidebar) {
    sidebar.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.getAttribute('onclick') === `switchTab('${tab}')`)
    );
    sidebar.classList.remove('open');
  } else {
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.getAttribute('onclick') === `switchTab('${tab}')`)
    );
  }
  // Update bottom nav
  const bnav = document.getElementById('bottomNav');
  if (bnav) {
    bnav.querySelectorAll('.bnav-btn').forEach(b =>
      b.classList.toggle('active', b.getAttribute('onclick') === `switchTab('${tab}')`)
    );
  }
  renderCurrentTab();
}

function renderCurrentTab() {
  // If field profile lands on a restricted tab, redirect to overview
  if (isField() && (currentTab === 'budget' || currentTab === 'billing')) {
    currentTab = 'overview';
    renderProjectView();
    return;
  }
  const p = getProject(currentProjectId);
  const el = document.getElementById('tabContent');
  const map = { overview:renderOverview, changeorders:renderChangeOrders, submittals:renderSubmittals, rfis:renderRFIs, budget:renderBudget, billing:renderBilling, dailylogs:renderDailyLogs, punchlist:renderPunchList, startup:renderStartup };
  el.innerHTML = (map[currentTab] || (() => ''))(p);
  if (currentTab === 'changeorders') setupCODropzone();
  if (currentTab === 'submittals') setupSubDropzones();
  if (currentTab === 'overview') { setupFileDropzone(); loadFileThumbnails(); }
  if (currentTab === 'dailylogs') loadFileThumbnails();
}

// ── GC CONTACT COLUMNS ───────────────────────────────────────
const GC_ROLES = [
  { key: 'gcSeniorPm', label: 'Senior Project Manager' },
  { key: 'gcPm',       label: 'Project Manager' },
  { key: 'gcAsstPm',   label: 'Assistant PM' },
  { key: 'gcSuper',    label: 'Superintendent' },
  { key: 'gcAsstSuper', label: 'Assistant Superintendent' }
];

function linkEmail(v) { return v ? `<a href="mailto:${v}" style="color:var(--accent-light);text-decoration:none;font-weight:600">${v}</a>` : dash(''); }
function displayPhone(v) {
  if (!v) return '';
  const d = v.replace(/\D/g,'').slice(0,10);
  if (d.length <= 3) return d;
  if (d.length <= 6) return d.slice(0,3)+'-'+d.slice(3);
  return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
}
function linkPhone(v) { if (!v) return dash(''); const display = displayPhone(v); return `<a href="tel:${v.replace(/[^+\d]/g,'')}" style="color:var(--accent-light);text-decoration:none;font-weight:600">${display}</a>`; }

function gcContactCards(p) {
  return GC_ROLES.filter(r => {
    return (p[r.key + 'Name'] || p[r.key + 'Email'] || p[r.key + 'Cell']);
  }).map(r => {
    const name = p[r.key + 'Name'] || '';
    const email = p[r.key + 'Email'] || '';
    const cell = p[r.key + 'Cell'] || '';
    return `<div class="gc-card">
      <div class="gc-card-role">${r.label}</div>
      <div class="gc-card-name">${name || '<span class="empty">—</span>'}</div>
      ${email ? `<div class="gc-card-row"><span class="gc-card-icon">\u2709</span>${linkEmail(email)}</div>` : ''}
      ${cell ? `<div class="gc-card-row"><span class="gc-card-icon">\u{1F4F1}</span>${linkPhone(cell)}</div>` : ''}
    </div>`;
  }).join('');
}

        <h3><span class="ov-toggle">\u25BC</span> Project Files</h3>
        ${fileCount ? `<span class="ov-section-count">${fileCount}</span>` : ''}
      </div>
      <div class="ov-section-body collapsed">
        ${canEditProject() ? `<div id="file_dropzone" class="drop-zone" style="margin-bottom:16px">
          <div class="drop-zone-icon">\u{1F4C1}</div>
          <div class="drop-zone-text">Drop files here or click to browse</div>
          <div class="drop-zone-hint">PDF, images, Word, Excel</div>
        </div>` : ''}
        ${renderProjectFiles(p)}
      </div>
    </div>`;
}

function ovToggle(head) {
  head.classList.toggle('collapsed');
  const body = head.nextElementSibling;
  body.classList.toggle('collapsed');
  if (!body.classList.contains('collapsed')) {
    setTimeout(() => {
      setupFileDropzone(); loadFileThumbnails();
      setupPermitDropZones();
    }, 50);
  }
}

// ── PERMIT FILES ─────────────────────────────────────────────
function setupPermitDropZones() {
  document.querySelectorAll('.permit-dz').forEach(dz => {
    const key = dz.dataset.permit;
    const pid = dz.dataset.project;
    setupDropZone(dz, f => savePermitFile(pid, key, f));
  });
}

function pickPermitFile(projectId, key) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.pdf,image/*';
  inp.onchange = () => { if (inp.files.length) savePermitFile(projectId, key, inp.files[0]); };
  inp.click();
}

function savePermitFile(projectId, key, file) {
  const reader = new FileReader();
  reader.onload = async e => {
    const p = getProject(projectId);
    if (!p.permitFiles) p.permitFiles = {};
    // Remove old file if exists
    if (p.permitFiles[key] && p.permitFiles[key].idbKey) {
      await fileDel(p.permitFiles[key].idbKey);
    }
    const idbKey = await fileSave(e.target.result);
    p.permitFiles[key] = { idbKey, name: file.name, type: file.type };
    saveData();
    showProject(projectId, 'overview');
    showToast('Permit file saved!');
  };
  reader.readAsDataURL(file);
}

async function viewPermitFile(projectId, key) {
  const p = getProject(projectId);
  const pf = (p.permitFiles || {})[key];
  if (!pf || !pf.idbKey) return;
  const data = await fileGet(pf.idbKey);
  if (!data) { showToast('File not found'); return; }
  const labels = {building:'Building Permit',electrical:'Electrical Permit',lowVoltage:'Low Voltage Permit'};
  openFileViewer(labels[key] || pf.name, data, pf.type || '');
}

async function removePermitFile(projectId, key) {
  if (!confirm('Remove this permit file?')) return;
  const p = getProject(projectId);
  if (p.permitFiles && p.permitFiles[key]) {
    if (p.permitFiles[key].idbKey) await fileDel(p.permitFiles[key].idbKey);
    delete p.permitFiles[key];
    saveData();
    showProject(projectId, 'overview');
    showToast('Permit file removed.');
  }
}

// ── NOTIFICATION LIST ────────────────────────────────────────
const NOTIFY_ROLES = ['Foreman','Superintendent','Ops Manager','Project Manager','Estimator','Other'];

function renderNotifyList(p) {
  const list = p.notifyList || [];
  if (!list.length) return '<p style="font-size:0.85rem;color:var(--text-muted)">No contacts added yet</p>';
  const rows = list.map((c,i) => `<tr>
    <td style="font-weight:600">${c.name||''}</td>
    <td>${c.email||''}</td>
    <td><span style="font-size:0.75rem;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(var(--accent),0.08);color:var(--accent-hex)">${c.role||'Other'}</span></td>
    <td style="white-space:nowrap">
      <button class="btn btn-sm btn-secondary" onclick="openNotifyContactModal('${p.id}',${i})">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteNotifyContact('${p.id}',${i})">Del</button>
    </td>
  </tr>`).join('');
  return `<table class="data-table">
    <thead><tr><th>Name</th><th>Email</th><th>Role</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function openNotifyContactModal(projectId, editIdx) {
  const p = getProject(projectId);
  if (!p.notifyList) p.notifyList = [];
  const isEdit = editIdx !== undefined && editIdx !== null;
  const c = isEdit ? p.notifyList[editIdx] : {};
  const roleOptions = NOTIFY_ROLES.map(r => `<option value="${r}" ${c.role===r?'selected':''}>${r}</option>`).join('');

  // Build employee picker — only show employees with emails, exclude already-added
  const existingEmails = p.notifyList.map(n=>n.email).filter(Boolean);
  const availEmps = (db.employees||[]).filter(e => e.email && !existingEmails.includes(e.email));
  const empPickerOptions = availEmps.map(e => `<option value="${e.id}">${e.name} — ${e.role||'Employee'} (${e.email})</option>`).join('');
  const empPicker = !isEdit && availEmps.length ? `
    <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">
      <div style="font-size:0.82rem;font-weight:700;color:var(--text);margin-bottom:8px">Pick from Employee Roster</div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="nc_empPick" onchange="fillFromEmployee()" style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.85rem;background:var(--bg-card-solid);color:var(--text)">
          <option value="">Select employee...</option>${empPickerOptions}
        </select>
      </div>
    </div>
    <div style="font-size:0.82rem;font-weight:700;color:var(--text);margin-bottom:8px">Or Add External Contact</div>` : '';

  modal(isEdit ? 'Edit Notification Contact' : 'Add Notification Contact',
    `${empPicker}
     <div class="form-group"><label>Name</label><input id="nc_name" value="${c.name||''}" placeholder="John Smith"></div>
     <div class="form-group"><label>Email</label><input id="nc_email" value="${c.email||''}" placeholder="john@company.com" type="email"></div>
     <div class="form-group"><label>Role</label><select id="nc_role">${roleOptions}</select></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveNotifyContact('${projectId}',${isEdit?editIdx:'null'})">${isEdit?'Save':'Add'}</button>`);
}

function fillFromEmployee() {
  const empId = val('nc_empPick');
  if (!empId) return;
  const emp = (db.employees||[]).find(e=>e.id===empId);
  if (!emp) return;
  document.getElementById('nc_name').value = emp.name || '';
  document.getElementById('nc_email').value = emp.email || '';
  const roleSel = document.getElementById('nc_role');
  const matchRole = emp.role || 'Other';
  for (let i = 0; i < roleSel.options.length; i++) {
    if (roleSel.options[i].value === matchRole) { roleSel.selectedIndex = i; break; }
  }
}

function saveNotifyContact(projectId, editIdx) {
  const p = getProject(projectId);
  if (!p.notifyList) p.notifyList = [];
  const name = val('nc_name').trim();
  const email = val('nc_email').trim();
  if (!name || !email) { alert('Name and email are required.'); return; }
  const entry = { name, email, role: val('nc_role') };
  if (editIdx !== null && editIdx !== 'null') p.notifyList[editIdx] = entry;
  else p.notifyList.push(entry);
  saveData(); closeModal(); showProject(projectId, 'changeorders'); showToast('Contact saved!');
}

function deleteNotifyContact(projectId, idx) {
  if (!confirm('Remove this contact?')) return;
  const p = getProject(projectId);
  p.notifyList.splice(idx, 1);
  saveData(); showProject(projectId, 'changeorders');
}

async function loadFileThumbnails() {
  document.querySelectorAll('img[data-fileref]').forEach(async img => {
    const ref = img.dataset.fileref;
    if (!ref) return;
    try {
      const data = await fileGet(ref);
      if (data) img.src = data;
    } catch(e) {}
  });
}

function getFileIcon(name, type) {
  if (type && type.includes('pdf')) return '\u{1F4C4}';
  if (type && type.startsWith('image')) return '\u{1F5BC}';
  const ext = (name||'').split('.').pop().toLowerCase();
  if (['doc','docx'].includes(ext)) return '\u{1F4DD}';
  if (['xls','xlsx'].includes(ext)) return '\u{1F4CA}';
  return '\u{1F4CE}';
}

function renderProjectFiles(p) {
  const files = p.files || [];
  if (!files.length) return '<p style="font-size:0.85rem;color:var(--text-muted);text-align:center;padding:20px">No files added yet</p>';
  const catOrder = ['Plans','Specs','Photos','RFIs','Misc'];
  const catIcons = {Plans:'\u{1F4D0}',Specs:'\u{1F4CB}',Photos:'\u{1F4F7}',RFIs:'\u2753',Misc:'\u{1F4CE}'};
  // Group files by category
  const grouped = {};
  files.forEach((f,i) => { const cat = f.category||'Misc'; if(!grouped[cat])grouped[cat]=[]; grouped[cat].push({...f,idx:i}); });
  let html = '';
  catOrder.forEach(cat => {
    const items = grouped[cat];
    if (!items || !items.length) return;
    html += `<div class="file-cat-section">
      <div class="file-cat-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'grid':'none';this.querySelector('.file-cat-toggle').textContent=this.nextElementSibling.style.display==='none'?'\u25B6':'\u25BC'">
        <span class="file-cat-toggle">\u25BC</span>
        <span style="font-size:1.1rem">${catIcons[cat]||'\u{1F4CE}'}</span>
        <span class="file-cat-label">${cat}</span>
        <span class="file-cat-count">${items.length}</span>
      </div>
      <div class="file-cards">`;
    items.forEach(f => {
      const isImage = f.fileType && f.fileType.startsWith('image');
      const iconOrThumb = isImage && f.fileData
        ? `<img class="file-card-thumb" data-fileref="${f.fileData}" alt="${f.name}" src="">`
        : `<div class="file-card-icon">${getFileIcon(f.name, f.fileType)}</div>`;
      html += `<div class="file-card" onclick="viewProjectFile('${p.id}',${f.idx})">
        ${iconOrThumb}
        <div class="file-card-name">${f.name}</div>
        <div class="file-card-meta">${fmtDate(f.dateAdded)}</div>
        <div class="file-card-actions">
          ${canEditProject() ? `<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteProjectFile('${p.id}',${f.idx})">Delete</button>` : ''}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  return html;
}

const FILE_CATEGORIES = ['Plans','Specs','Photos','RFIs','Misc'];

function setupDropZone(el, onFile) {
  if (!el) return;
  el.ondragover = e => { e.preventDefault(); e.stopPropagation(); el.classList.add('dragover'); };
  el.ondragleave = e => { e.stopPropagation(); el.classList.remove('dragover'); };
  el.ondrop = e => { e.preventDefault(); e.stopPropagation(); el.classList.remove('dragover'); if(e.dataTransfer.files.length) onFile(e.dataTransfer.files[0]); };
}
function setupFileDropzone() {
  const dz = document.getElementById('file_dropzone');
  if (!dz) return;
  setupDropZone(dz, f => promptFileCategory(f));
  dz.onclick = () => { const inp=document.createElement('input'); inp.type='file'; inp.accept='.pdf,image/*,.doc,.docx,.xls,.xlsx'; inp.onchange=()=>{if(inp.files.length)promptFileCategory(inp.files[0]);}; inp.click(); };
}

function promptFileCategory(file) {
  const options = FILE_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
  modal('Add File',
    `<div class="form-group"><label>File</label><div style="font-weight:600;color:#1e293b">${file.name}</div></div>
     <div class="form-group"><label>Category</label><select id="file_category" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.875rem">${options}</select></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveProjectFile()">Save</button>`);
  // Store file reference temporarily
  window._pendingFile = file;
}

function saveProjectFile() {
  const file = window._pendingFile;
  if (!file) return;
  const category = val('file_category');
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const ref = await fileSave(e.target.result);
      const p = getProject(currentProjectId);
      if (!p.files) p.files = [];
      const today = new Date().toISOString().slice(0,10);
      p.files.unshift({ name: file.name, category, dateAdded: today, fileData: ref, fileType: file.type });
      window._pendingFile = null;
      saveData(); closeModal(); showProject(currentProjectId, 'overview'); showToast('File added!');
    } catch(err) { console.error(err); showToast('Error saving file'); }
  };
  reader.readAsDataURL(file);
}

async function fvLoadPdfMobile(dataUrl) {
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf = await pdfjsLib.getDocument(dataUrl).promise;
    fvState.pdf = pdf;
    fvState.totalPages = pdf.numPages;
    const main = document.getElementById('fvMain');
    const containerWidth = main.getBoundingClientRect().width;
    const dpr = window.devicePixelRatio || 2;
    // Cap pixels per canvas to ~8M to prevent mobile crashes on large drawings
    const MAX_PIXELS = 8000000;
    main.innerHTML = '';
    document.getElementById('fvPageInfo').textContent = `${pdf.numPages} page${pdf.numPages > 1 ? 's' : ''}`;
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const baseVp = page.getViewport({ scale: 1 });
      const fitScale = (containerWidth - 16) / baseVp.width;
      let renderScale = Math.max(fitScale * dpr, 2);
      // Check if canvas would exceed pixel cap and reduce if needed
      const testW = baseVp.width * renderScale;
      const testH = baseVp.height * renderScale;
      if (testW * testH > MAX_PIXELS) {
        renderScale = Math.sqrt(MAX_PIXELS / (baseVp.width * baseVp.height));
      }
      const viewport = page.getViewport({ scale: renderScale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width = (baseVp.width * fitScale) + 'px';
      canvas.style.height = (baseVp.height * fitScale) + 'px';
      canvas.style.display = 'block';
      canvas.style.margin = '0 auto 8px';
      canvas.style.borderRadius = '4px';
      canvas.style.boxShadow = '0 2px 12px rgba(0,0,0,0.4)';
      const ctx = canvas.getContext('2d');
      if (!ctx) { console.error('Canvas context failed for page', i); continue; }
      await page.render({ canvasContext: ctx, viewport }).promise;
      main.appendChild(canvas);
    }
  } catch(err) {
    console.error('PDF load error:', err);
    const main = document.getElementById('fvMain');
    if (main) main.innerHTML = `<div class="fv-loading" style="color:#ef4444;text-align:center;padding:20px">
      <div style="margin-bottom:12px">Failed to load PDF</div>
      <button class="fv-btn" onclick="window.open('${dataUrl}','_blank')" style="margin:0 auto">Open in Browser</button>
    </div>`;
  }
}

function fvKeyHandler(e) {
  if (e.key === 'Escape') { closeModal(); e.preventDefault(); }
  if (e.key === 'ArrowLeft') fvPrevPage();
  if (e.key === 'ArrowRight') fvNextPage();
  if (e.key === '+' || e.key === '=') fvState.pdf ? fvZoom(0.25) : fvImgZoom(0.25);
  if (e.key === '-') fvState.pdf ? fvZoom(-0.25) : fvImgZoom(-0.25);
}

async function fvLoadPdf(dataUrl) {
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const loadingTask = pdfjsLib.getDocument(dataUrl);
    const pdf = await loadingTask.promise;
    fvState.pdf = pdf;
    fvState.totalPages = pdf.numPages;
    fvState.currentPage = 1;
    document.getElementById('fvPageInfo').textContent = `1 of ${pdf.numPages}`;
    // Render thumbnails
    fvRenderThumbnails(pdf);
    // Render first page
    fvRenderPage(1);
  } catch(err) {
    console.error('PDF load error:', err);
    document.getElementById('fvMain').innerHTML = `<div class="fv-loading" style="color:#ef4444">Failed to load PDF. <button class="fv-btn" onclick="fvFallbackViewer()" style="margin-top:10px">Open in browser viewer</button></div>`;
  }
}

function fvFallbackViewer() {
  const main = document.getElementById('fvMain');
  if (main) main.innerHTML = `<iframe src="${fvState.fileData}" style="width:100%;height:100%;border:none"></iframe>`;
}

async function fvRenderThumbnails(pdf) {
  const sidebar = document.getElementById('fvSidebar');
  if (!sidebar) return;
  sidebar.innerHTML = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 0.3 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    const div = document.createElement('div');
    div.className = 'fv-thumb' + (i === 1 ? ' active' : '');
    div.dataset.page = i;
    div.onclick = () => fvGoToPage(i);
    div.appendChild(canvas);
    const num = document.createElement('span');
    num.className = 'fv-thumb-num';
    num.textContent = i;
    div.appendChild(num);
    sidebar.appendChild(div);
  }
}

async function fvRenderPage(pageNum) {
  const pdf = fvState.pdf;
  if (!pdf) return;
  const page = await pdf.getPage(pageNum);
  const main = document.getElementById('fvMain');
  const mainRect = main.getBoundingClientRect();
  const baseViewport = page.getViewport({ scale: 1 });
  // Render canvas at devicePixelRatio for crisp quality on all screens
  const fitScale = Math.min((mainRect.width - 60) / baseViewport.width, (mainRect.height - 40) / baseViewport.height);
  fvState.fitScale = fitScale;
  const dpr = window.devicePixelRatio || 2;
  const renderScale = fitScale * Math.max(dpr, 2);
  const viewport = page.getViewport({ scale: renderScale });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  // Display at fit size, CSS zoom handles the rest
  canvas.style.width = (baseViewport.width * fitScale) + 'px';
  canvas.style.height = (baseViewport.height * fitScale) + 'px';
  canvas.style.cursor = 'grab';
  canvas.style.transformOrigin = '0 0';
  canvas.style.flexShrink = '0';
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;
  // Put canvas in a wrapper so scroll container works properly
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'min-width:max-content;min-height:max-content;display:flex;align-items:center;justify-content:center;padding:20px';
  wrapper.appendChild(canvas);
  main.innerHTML = '';
  main.appendChild(wrapper);
  fvState.canvas = canvas;
  fvState.baseW = baseViewport.width * fitScale;
  fvState.baseH = baseViewport.height * fitScale;
  // Apply current zoom via CSS transform (instant, no re-render)
  fvApplyZoom();
  // Setup interactions
  fvSetupScrollZoom(main);
  fvSetupPan(main, canvas);
  // Update UI
  document.getElementById('fvPageInfo').textContent = `${pageNum} of ${fvState.totalPages}`;
  // Update thumbnail active state
  document.querySelectorAll('.fv-thumb').forEach(t => t.classList.toggle('active', parseInt(t.dataset.page) === pageNum));
  const activeThumb = document.querySelector('.fv-thumb.active');
  if (activeThumb) activeThumb.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

// Apply zoom via CSS transform (instant — no PDF re-render needed)
function fvApplyZoom() {
  const canvas = fvState.canvas;
  if (!canvas) return;
  const scale = fvState.zoom;
  canvas.style.width = (fvState.baseW * scale) + 'px';
  canvas.style.height = (fvState.baseH * scale) + 'px';
  const zi = document.getElementById('fvZoomInfo');
  if (zi) zi.textContent = `${Math.round(scale * 100)}%`;
}

// ── SCROLL TO ZOOM ──────────────────────────────────────────
function fvSetupScrollZoom(main) {
  main.onwheel = e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 0.9 : 1.1; // Multiplicative for smooth feel
    fvState.zoom = Math.max(0.2, Math.min(5, fvState.zoom * factor));
    fvApplyZoom();
  };
}

// ── CLICK AND DRAG TO PAN ───────────────────────────────────
function fvSetupPan(main, canvas) {
  let dragging = false, startX, startY, scrollLeft, scrollTop;
  canvas.onmousedown = e => {
    dragging = true;
    canvas.style.cursor = 'grabbing';
    startX = e.clientX;
    startY = e.clientY;
    scrollLeft = main.scrollLeft;
    scrollTop = main.scrollTop;
    e.preventDefault();
  };
  document.addEventListener('mousemove', fvState._panMove = e => {
    if (!dragging) return;
    main.scrollLeft = scrollLeft - (e.clientX - startX);
    main.scrollTop = scrollTop - (e.clientY - startY);
  });
  document.addEventListener('mouseup', fvState._panUp = () => {
    if (!dragging) return;
    dragging = false;
    if (canvas) canvas.style.cursor = 'grab';
  });
}

function fvGoToPage(num) {
  if (num < 1 || num > fvState.totalPages) return;
  fvState.currentPage = num;
  fvState.zoom = 1; // Reset zoom when changing pages
  fvRenderPage(num);
}
function fvPrevPage() { fvGoToPage(fvState.currentPage - 1); }
function fvNextPage() { fvGoToPage(fvState.currentPage + 1); }

function fvZoom(delta) {
  const factor = delta > 0 ? 1.2 : 0.8;
  fvState.zoom = Math.max(0.2, Math.min(5, fvState.zoom * factor));
  fvApplyZoom();
}

function fvFitPage() {
  fvState.zoom = 1;
  fvApplyZoom();
  // Re-center
  const main = document.getElementById('fvMain');
  if (main) { main.scrollLeft = 0; main.scrollTop = 0; }
}

function fvDownload() {
  const a = document.createElement('a');
  a.href = fvState.fileData;
  a.download = fvState.title || 'download';
  a.click();
}

function fvPrint() {
  const win = window.open('');
  if (!win) { showToast('Pop-up blocked — please allow pop-ups to print'); return; }
  win.document.write(`<iframe src="${fvState.fileData}" style="width:100%;height:100%;border:none" onload="setTimeout(()=>{window.print();window.close()},500)"></iframe>`);
}

// ── IMAGE VIEWER CONTROLS ───────────────────────────────────
function fvImgZoom(delta) {
  const factor = delta > 0 ? 1.1 : 0.9;
  fvState.zoom = Math.max(0.2, Math.min(5, fvState.zoom * factor));
  fvApplyImgZoom();
}

function fvApplyImgZoom() {
  const img = document.getElementById('fvImage');
  if (!img || !fvState.imgBaseW) return;
  const w = fvState.imgBaseW * fvState.zoom;
  const h = fvState.imgBaseH * fvState.zoom;
  img.style.width = w + 'px';
  img.style.height = h + 'px';
  img.style.maxWidth = 'none';
  img.style.maxHeight = 'none';
  img.style.transform = fvState.rotation ? `rotate(${fvState.rotation}deg)` : '';
  document.getElementById('fvZoomInfo').textContent = `${Math.round(fvState.zoom * 100)}%`;
}

function fvImgFit() {
  fvState.zoom = 1;
  fvState.rotation = 0;
  const img = document.getElementById('fvImage');
  if (!img) return;
  // Store natural size on first load
  if (!fvState.imgBaseW) {
    const main = document.getElementById('fvMain');
    const mr = main.getBoundingClientRect();
    const fitW = mr.width - 40;
    const fitH = mr.height - 40;
    const scale = Math.min(fitW / img.naturalWidth, fitH / img.naturalHeight, 1);
    fvState.imgBaseW = img.naturalWidth * scale;
    fvState.imgBaseH = img.naturalHeight * scale;
  }
  img.style.width = fvState.imgBaseW + 'px';
  img.style.height = fvState.imgBaseH + 'px';
  img.style.maxWidth = 'none';
  img.style.maxHeight = 'none';
  img.style.transform = '';
  document.getElementById('fvZoomInfo').textContent = '100%';
  const main = document.getElementById('fvMain');
  if (main) { main.scrollLeft = 0; main.scrollTop = 0; }
}

function fvSetupImgInteraction() {
  const main = document.getElementById('fvMain');
  const img = document.getElementById('fvImage');
  if (!main || !img) return;
  img.style.cursor = 'grab';
  img.style.flexShrink = '0';
  // Wrap image for proper scroll behavior
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'min-width:max-content;min-height:max-content;display:flex;align-items:center;justify-content:center;padding:20px';
  img.parentNode.insertBefore(wrapper, img);
  wrapper.appendChild(img);
  // Scroll to zoom
  main.onwheel = e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    fvState.zoom = Math.max(0.2, Math.min(5, fvState.zoom * factor));
    fvApplyImgZoom();
  };
  // Click and drag to pan
  fvSetupPan(main, img);
}

function fvImgRotate(deg) {
  fvState.rotation = (fvState.rotation + deg) % 360;
  fvApplyImgZoom();
}

async function viewProjectFile(projectId, idx) {
  const p = getProject(projectId);
  const f = p.files[idx];
  if (!f || !f.fileData) return;
  const data = await fileGet(f.fileData);
  if (!data) { showToast('File not found'); return; }
  openFileViewer(f.name, data, f.fileType);
}

async function deleteProjectFile(projectId, idx) {
  if (!confirm('Delete this file?')) return;
  const p = getProject(projectId);
  const f = p.files[idx];
  if (f && f.fileData) await fileDel(f.fileData);
  p.files.splice(idx,1);
  saveData(); showProject(projectId, 'overview'); showToast('File deleted.');
}

// ── CHANGE ORDERS ────────────────────────────────────────────
function coStyle(s){const m={'Pending':'background:rgba(245,158,11,0.12);color:#f59e0b','Approved':'background:rgba(34,197,94,0.12);color:#22c55e','Not Approved':'background:rgba(239,68,68,0.12);color:#ef4444'};return m[s]||'background:var(--bg-surface);color:var(--text-secondary)'}

function changeCOStatus(projectId, idx, status) {
  const p = getProject(projectId);
  p.changeOrders[idx].status = status;
  saveData();
  showProject(projectId, 'changeorders');
}

function notifyCOStatus(projectId, idx) {
  const ejsPub = localStorage.getItem('electricalPM_emailjs_pubkey');
  const ejsSvc = localStorage.getItem('electricalPM_emailjs_service');
  const ejsTpl = localStorage.getItem('electricalPM_emailjs_template');

  if (!ejsPub || !ejsSvc || !ejsTpl) {
    alert('EmailJS is not set up yet. Go to Settings and configure EmailJS first.');
    return;
  }

  const p = getProject(projectId);
  const c = p.changeOrders[idx];
  const notifyList = (p.notifyList || []).filter(c => c.email);

  if (!notifyList.length) {
    alert('No notification contacts set for this project. Open the Notification List at the bottom of this Change Orders tab to add contacts.');
    return;
  }

  const statusEmoji = c.status === 'Approved' ? 'APPROVED' : 'NOT APPROVED';
  const coLabel = 'CO #' + (c.number || idx+1) + (c.officialCONum ? ' (Official: ' + c.officialCONum + ')' : '');

  // Build recipient picker modal
  const contactRows = notifyList.map((contact, ci) =>
    `<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-xs);border:1px solid var(--border);cursor:pointer;transition:background var(--transition-fast)" onmouseover="this.style.background='rgba(136,58,234,0.05)'" onmouseout="this.style.background=''">
      <input type="checkbox" checked class="notify-recipient-cb" data-idx="${ci}" style="width:18px;height:18px;accent-color:var(--accent-hex);cursor:pointer"
        onchange="updateNotifyCount()">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:0.88rem;color:var(--text)">${contact.name || 'No Name'}</div>
        <div style="font-size:0.78rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis">${contact.email}</div>
      </div>
      <span style="font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(var(--accent),0.1);color:var(--accent-hex)">${contact.role || ''}</span>
    </label>`
  ).join('');

  modal('Select Recipients — ' + coLabel,
    `<div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:0.85rem;color:var(--text-secondary)" id="notifyCountLabel">${notifyList.length} of ${notifyList.length} selected</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-secondary" onclick="toggleAllNotifyRecipients(true)">Select All</button>
        <button class="btn btn-sm btn-secondary" onclick="toggleAllNotifyRecipients(false)">Deselect All</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;padding:2px">${contactRows}</div>
    <div style="margin-top:14px;padding:12px;border-radius:var(--radius-xs);background:rgba(var(--accent),0.05);border:1px solid rgba(var(--accent),0.15)">
      <div style="font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:4px">Email Preview</div>
      <div style="font-size:0.78rem;color:var(--text-secondary)"><strong>Subject:</strong> ${coLabel} ${statusEmoji} — ${p.name || 'Project'}</div>
      <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:2px"><strong>Status:</strong> ${statusEmoji}</div>
    </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" id="notifySendBtn" onclick="sendCONotification('${projectId}',${idx})">Send to ${notifyList.length} Recipient(s)</button>`);
}

function toggleAllNotifyRecipients(checked) {
  document.querySelectorAll('.notify-recipient-cb').forEach(cb => { cb.checked = checked; });
  updateNotifyCount();
}

function updateNotifyCount() {
  const cbs = document.querySelectorAll('.notify-recipient-cb');
  const checked = [...cbs].filter(cb => cb.checked).length;
  const total = cbs.length;
  const label = document.getElementById('notifyCountLabel');
  if (label) label.textContent = checked + ' of ' + total + ' selected';
  const btn = document.getElementById('notifySendBtn');
  if (btn) {
    btn.textContent = 'Send to ' + checked + ' Recipient(s)';
    btn.disabled = checked === 0;
    btn.style.opacity = checked === 0 ? '0.5' : '1';
  }
}

function sendCONotification(projectId, idx) {
  const ejsPub = localStorage.getItem('electricalPM_emailjs_pubkey');
  const ejsSvc = localStorage.getItem('electricalPM_emailjs_service');
  const ejsTpl = localStorage.getItem('electricalPM_emailjs_template');

  const p = getProject(projectId);
  const c = p.changeOrders[idx];
  const notifyList = (p.notifyList || []).filter(c => c.email);

  // Get selected recipients from checkboxes
  const cbs = document.querySelectorAll('.notify-recipient-cb');
  const selectedEmails = [...cbs].filter(cb => cb.checked).map(cb => notifyList[parseInt(cb.dataset.idx)].email);

  if (!selectedEmails.length) {
    showToast('Select at least one recipient');
    return;
  }

  const recipients = selectedEmails.join(', ');
  const statusEmoji = c.status === 'Approved' ? 'APPROVED' : 'NOT APPROVED';
  const summary = c.fieldSummary || 'No AI summary available for this change order.';

  let emailBody = 'CHANGE ORDER UPDATE\n';
  emailBody += '═══════════════════════════════\n\n';
  emailBody += 'Project: ' + (p.name || 'Unknown') + '\n';
  emailBody += 'Job #: ' + (p.jobNumber || 'N/A') + '\n';
  emailBody += 'CO #: ' + (c.number || idx+1) + (c.officialCONum ? ' (Official: ' + c.officialCONum + ')' : '') + '\n';
  emailBody += 'Status: ' + statusEmoji + '\n';
  if (c.approvalDate) emailBody += 'Date: ' + c.approvalDate + '\n';
  emailBody += '\n───────────────────────────────\n';
  emailBody += 'FIELD SUMMARY\n';
  emailBody += '───────────────────────────────\n';
  emailBody += summary + '\n';
  emailBody += '\n───────────────────────────────\n';
  emailBody += 'Sent from ElectricalPM — Cahaba Electric\n';

  const subject = 'CO #' + (c.number || idx+1) + ' ' + statusEmoji + ' — ' + (p.name || 'Project');

  closeModal();
  showToast('Sending notification...');
  emailjs.init(ejsPub);
  emailjs.send(ejsSvc, ejsTpl, {
    to_email: recipients,
    subject: subject,
    message: emailBody
  }).then(() => {
    showToast('Notification sent to ' + selectedEmails.length + ' recipient(s)!');
  }).catch(err => {
    console.error('Email error:', err);
    alert('Failed to send email. Check your EmailJS settings.\n\n' + (err.text || err.message || err));
  });
}

function changeCODate(projectId, idx, date) {

}

function formatCOAmount(projectId, idx, el) {
  const raw = el.value.replace(/[^0-9.\-]/g, '');
  const num = parseFloat(raw);
  const p = getProject(projectId);
  if (!isNaN(num)) {
    p.changeOrders[idx].amount = String(num);
    el.value = '$' + num.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    el.dataset.raw = String(num);
  } else {
    p.changeOrders[idx].amount = '';
    el.value = '';
    el.dataset.raw = '';
  }
  saveData();
  showProject(projectId, 'changeorders');
}

function setupCODropzone() {

  setupDropZone(dz, f => dropCOFromMain(f));
  dz.onclick = () => { const inp=document.createElement('input'); inp.type='file'; inp.accept='.pdf,image/*'; inp.onchange=()=>{if(inp.files.length)dropCOFromMain(inp.files[0]);}; inp.click(); };
}

function dropCOFromMain(file) {
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const ref = await fileSave(e.target.result);
      const p = getProject(currentProjectId);
      if (!p.changeOrders) p.changeOrders = [];
      const nextNum = p.changeOrders.length + 1;
      const coIdx = p.changeOrders.length;
      p.changeOrders.push({
        number: String(nextNum),
        amount: '',
        status: 'Pending',
        approvalDate: '',
        notes: '',
        officialReceived: false,
        fileData: ref,
        fileType: file.type,
        fieldSummaryLoading: true
      });
      saveData();
      showProject(currentProjectId, 'changeorders');
      showToast('CO #' + nextNum + ' added — generating field summary...');
      generateFieldSummary(currentProjectId, coIdx, e.target.result, file.type);
    } catch(err) { console.error(err); showToast('Error saving file'); }
  };
  reader.readAsDataURL(file);
}

function generateFieldSummary(projectId, coIdx, fileData, fileType) {
  const apiKey = localStorage.getItem('electricalPM_claudeKey');
  if (!apiKey) {
    showToast('No API key — set it in Settings to enable AI summaries');
    const p = getProject(projectId);
    if (p && p.changeOrders[coIdx]) { p.changeOrders[coIdx].fieldSummaryLoading = false; saveData(); }
    return;
  }

  const base64 = fileData.split(',')[1];
  const mediaType = fileType === 'application/pdf' ? 'application/pdf' : fileType;

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'document',
            source: { type: 'base64', media_type: mediaType, data: base64 }
          },
          {
            type: 'text',
            text: 'This is a construction change order document. Please provide a concise summary of this change order that describes the scope of work and any relevant details, but COMPLETELY EXCLUDE all financial information — no dollar amounts, no costs, no prices, no totals, no percentages related to money. The summary should be useful for field staff who need to know WHAT work is being done but not HOW MUCH it costs. Keep it brief and clear, using bullet points.'
          }
        ]
      }]
    })
  })
  .then(r => r.json())
  .then(data => {
    const p = getProject(projectId);
    if (!p || !p.changeOrders[coIdx]) return;
    if (data.content && data.content[0]) {
      p.changeOrders[coIdx].fieldSummary = data.content[0].text;
    } else if (data.error) {
      p.changeOrders[coIdx].fieldSummary = 'Error: ' + (data.error.message || 'API request failed');
    }
    p.changeOrders[coIdx].fieldSummaryLoading = false;
    saveData();
    if (currentProjectId === projectId && currentTab === 'changeorders') {
      showProject(projectId, 'changeorders');
    }
    showToast('Field summary ready for CO #' + p.changeOrders[coIdx].number);
  })
  .catch(err => {
    const p = getProject(projectId);
    if (p && p.changeOrders[coIdx]) {
      p.changeOrders[coIdx].fieldSummaryLoading = false;
      p.changeOrders[coIdx].fieldSummary = 'Error: Could not reach AI service';
      saveData();
    }
    showToast('AI summary failed — check your internet connection');
  });
}

async function retryFieldSummary(projectId, coIdx) {
  const p = getProject(projectId);
  if (!p || !p.changeOrders[coIdx]) return;
  const co = p.changeOrders[coIdx];
  if (!co.fileData) { showToast('No PDF attached to this CO'); return; }

  co.fieldSummaryLoading = true;
  co.fieldSummary = '';
  saveData();
  if (currentProjectId === projectId && currentTab === 'changeorders') showProject(projectId, 'changeorders');
  showToast('Generating field summary for CO #' + (co.number || '') + '...');

  try {
    const raw = await fileGet(co.fileData);
    if (!raw) { throw new Error('Could not load PDF'); }
    let dataUrl = raw;
    // If fileGet returned a URL (supa: files), fetch and convert to data URL
    if (raw.startsWith('http')) {
      const resp = await fetch(raw);
      const blob = await resp.blob();
      dataUrl = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    }
    generateFieldSummary(projectId, coIdx, dataUrl, co.fileType || 'application/pdf');
  } catch (e) {
    console.error('Retry summary error:', e);
    co.fieldSummaryLoading = false;
    saveData();
    if (currentProjectId === projectId && currentTab === 'changeorders') showProject(projectId, 'changeorders');
    showToast('Could not load PDF — try re-uploading the CO');
  }
}

function viewFieldSummary(idx) {
  const p = getProject(currentProjectId);
  const c = p.changeOrders[idx];
  if (!c || !c.fieldSummary) return;
  modal('Field Summary — CO #' + (c.number||''),
    `<div style="font-size:0.9rem;line-height:1.6;color:var(--text);white-space:pre-wrap">${c.fieldSummary}</div>`,

}

function closeCONumPicker() {
  const el = document.getElementById('coNumPopup');
  if (el) el.remove();
}

function openCONumPicker(projectId, idx, btn) {
  closeCONumPicker();
  const p = getProject(projectId);
  const current = p.changeOrders[idx].officialCONum || '';
  const rect = btn.getBoundingClientRect();
  const popup = document.createElement('div');
  popup.id = 'coNumPopup';
  popup.className = 'co-num-popup';
  // Show 7 items, each ~30px tall
  popup.style.maxHeight = '210px';
  popup.style.left = rect.left + 'px';
  popup.style.top = (rect.bottom + 4) + 'px';

  // Add "—" option to clear
  const clearOpt = document.createElement('div');
  clearOpt.textContent = '—';
  if (!current) clearOpt.classList.add('active');
  clearOpt.onmousedown = e => { e.preventDefault(); p.changeOrders[idx].officialCONum = ''; saveData(); btn.textContent = '—'; closeCONumPicker(); };
  popup.appendChild(clearOpt);

  for (let n = 1; n <= 50; n++) {
    const opt = document.createElement('div');
    opt.textContent = n;
    if (current == String(n)) opt.classList.add('active');
    opt.onmousedown = e => { e.preventDefault(); p.changeOrders[idx].officialCONum = String(n); saveData(); btn.textContent = n; closeCONumPicker(); };
    popup.appendChild(opt);
  }
  document.body.appendChild(popup);

  // Scroll to active item
  const activeEl = popup.querySelector('.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'center' });

  // Close on click outside
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!popup.contains(e.target) && e.target !== btn) { closeCONumPicker(); document.removeEventListener('click', handler); }
    });
  }, 10);
}

async function viewCOFile(idx) {
  if (isField()) { showToast('CO documents are restricted. View the Field Summary instead.'); return; }
  const p = getProject(currentProjectId);
  const c = p.changeOrders[idx];
  if (!c || !c.fileData) return;
  const data = await fileGet(c.fileData);
  if (!data) { showToast('File not found'); return; }
  openFileViewer('Change Order #' + (c.number||''), data, c.fileType);
}

// ── SUBMITTALS ───────────────────────────────────────────────
const SUBMITTAL_TYPES = ['Lighting','Controls','Power','Floor Box','Fire Alarm Drawings','Fire Alarm Submittals'];
const SUBMITTAL_ICONS = {'Lighting':'\u{1F4A1}','Controls':'\u{1F39B}','Power':'\u26A1','Floor Box':'\u{1F4E6}','Fire Alarm Drawings':'\u{1F6A8}','Fire Alarm Submittals':'\u{1F525}'};

function subStyle(s){const m={'Pending':'background:rgba(245,158,11,0.12);color:#f59e0b','Approved':'background:rgba(34,197,94,0.12);color:#22c55e','Approved as Noted':'background:rgba(20,184,166,0.12);color:#14b8a6','Rejected':'background:rgba(239,68,68,0.12);color:#ef4444','Resubmit':'background:rgba(99,102,241,0.12);color:#6366f1'};return m[s]||'background:var(--bg-surface);color:var(--text-secondary)'}

function ensureSubmittals(p) {
  if (!p.submittals) p.submittals = [];
  if (!p.submittalConfig) p.submittalConfig = {};
}

function ensureSuppliers() { if (!db.suppliers) db.suppliers = []; }

function renderSubmittals(p) {
  ensureSubmittals(p);
  ensureSuppliers();
  const activeTypes = SUBMITTAL_TYPES.filter(t => p.submittalConfig[t]);

  const dateFields = [
    { key: 'dateRequested', label: 'Requested' },
    { key: 'dateSubmitted', label: 'Submitted' },
    { key: 'dateReturned', label: 'Released' },
    { key: 'dateReturned2', label: 'Returned' }
  ];

  const listItems = activeTypes.map((t, ti) => {
    const s = p.submittals.find(x => x.description === t) || {};
    const tKey = t.replace(/[^a-zA-Z0-9]/g,'_');
    const statusText = s.status || 'Pending';

    // Progress: how many of the 4 date steps are filled
    const filled = dateFields.filter(d => s[d.key]).length;
    const pct = Math.round(filled / dateFields.length * 100);
    const barColor = statusText === 'Approved' || statusText === 'Approved as Noted' ? '#22c55e'
      : statusText === 'Rejected' ? '#ef4444'
      : statusText === 'Resubmit' ? '#6366f1'
      : pct > 0 ? '#f59e0b' : 'var(--border)';

    // Current step text for the row
    const stepText = filled === 0 ? 'Not started'
      : filled === 4 ? (statusText === 'Approved' || statusText === 'Approved as Noted' ? 'Complete' : 'Returned')
      : dateFields[filled - 1].label;

    // Status badge
    const statusBadge = `<span style="font-size:0.72rem;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;${subStyle(statusText)}">${statusText}</span>`;

    // Expanded detail: dates
    const datesHtml = dateFields.map(d => {
      const val = s[d.key] || '';
      const display = val ? new Date(val+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}) : '\u2014';
      return `<div class="sub-detail-item">
        <span class="sub-detail-label">${d.label}</span>
        ${!canEditProject()
          ? `<span class="sub-detail-value">${display}</span>`
          : `<input type="date" value="${val}" onchange="changeSubField('${p.id}','${t}','${d.key}',this.value);showProject('${p.id}','submittals')" style="padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:0.8rem;font-weight:600;color:var(--text);background:var(--bg-card-solid);cursor:pointer;width:100%">`
        }
      </div>`;
    }).join('');

    // Expanded detail: files
    const initialBtn = s.initialFile
      ? `<div class="sub-file-chip has-file" onclick="event.stopPropagation();viewSubFile('${p.id}','${t}','initialFile')">\u{1F4C4} Initial PDF${canEditProject() ? ` <span onclick="event.stopPropagation();deleteSubFile('${p.id}','${t}','initialFile')" style="margin-left:4px;opacity:0.5">\u2715</span>` : ''}</div>`
      : (canEditProject() ? `<div class="sub-file-chip empty" id="sdi_${tKey}">\u{1F4C1} Upload Initial</div>` : '');
    const approvedBtn = s.approvedFile
      ? `<div class="sub-file-chip has-file" onclick="event.stopPropagation();viewSubFile('${p.id}','${t}','approvedFile')">\u{1F4C4} Approved PDF${canEditProject() ? ` <span onclick="event.stopPropagation();deleteSubFile('${p.id}','${t}','approvedFile')" style="margin-left:4px;opacity:0.5">\u2715</span>` : ''}</div>`
      : (canEditProject() ? `<div class="sub-file-chip empty" id="sda_${tKey}">\u{1F4C1} Upload Approved</div>` : '');

    // Expanded detail: supplier + status (office editable)
    const supplierOpts = ['', ...db.suppliers].map(sup =>
      `<option value="${sup}" ${(s.supplier||'')===sup?'selected':''}>${sup || '\u2014 Select \u2014'}</option>`
    ).join('') + `<option value="__add__">+ Add New...</option>`;
    const supplierCtrl = !canEditProject() ? '' : `<select onchange="event.stopPropagation();subSupplierChange('${p.id}','${t}',this)" style="padding:4px 8px;border-radius:6px;font-size:0.78rem;font-weight:600;border:1.5px solid var(--border);cursor:pointer;background:var(--bg-card-solid);color:var(--text)">${supplierOpts}</select>`;
    const statusCtrl = !canEditProject() ? '' : `<select onchange="event.stopPropagation();changeSubField('${p.id}','${t}','status',this.value);showProject('${p.id}','submittals')" style="padding:4px 8px;border-radius:6px;font-size:0.78rem;font-weight:700;border:1.5px solid var(--border);cursor:pointer;${subStyle(statusText)}">
      <option value="Pending" ${statusText==='Pending'?'selected':''}>Pending</option>
      <option value="Approved" ${statusText==='Approved'?'selected':''}>Approved</option>
      <option value="Approved as Noted" ${statusText==='Approved as Noted'?'selected':''}>Approved as Noted</option>
      <option value="Rejected" ${statusText==='Rejected'?'selected':''}>Rejected</option>
      <option value="Resubmit" ${statusText==='Resubmit'?'selected':''}>Resubmit</option>
    </select>`;

    return `<div class="sub-row" id="sub_row_${ti}" onclick="toggleSubList(${ti})">
      <div class="sub-row-header">
        <span class="sub-row-name">${SUBMITTAL_ICONS[t]||'\u{1F4C4}'} ${t}</span>
        ${s.supplier ? `<span class="sub-row-supplier">${s.supplier}</span>` : ''}
        <div class="sub-row-bar"><div class="sub-row-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        ${statusBadge}
      </div>
      <div class="sub-row-detail" onclick="event.stopPropagation()">
        <div class="sub-detail-dates">${datesHtml}</div>
        <div class="sub-detail-files">${initialBtn}${approvedBtn}</div>
        ${canEditProject() ? `<div class="sub-detail-controls" style="margin-top:10px">${supplierCtrl}${statusCtrl}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const noItems = !activeTypes.length ? `<div style="text-align:center;padding:40px 20px;color:var(--text-muted)"><div style="font-size:2rem;margin-bottom:8px">\u{1F4CB}</div><div style="font-size:0.9rem;font-weight:600">No submittals selected</div><div style="font-size:0.82rem;margin-top:4px">Click "Select Submittals" to choose which ones apply</div></div>` : '';

  const sl = p.supplierLink || {};
  const supplierBar = sl.url
    ? `<div class="supplier-link-bar" style="margin-top:20px">
        <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius-sm)">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:1rem">\u{1F4E6}</span>
              <span style="font-weight:700;font-size:0.88rem;color:var(--text)">${sl.supplier || 'Supplier'}</span>
            </div>
            ${sl.description ? `<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:10px">${sl.description}</div>` : ''}
            <a href="${sl.url}" target="_blank" rel="noopener" class="btn btn-primary" style="width:100%;text-align:center;padding:10px 16px;font-size:0.88rem">Open Live Sheet</a>
          </div>
        </div>
        ${canEditProject() ? `<div style="display:flex;gap:6px;margin-top:8px">
          <button class="btn btn-sm btn-secondary" onclick="editSupplierLink('${p.id}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="removeSupplierLink('${p.id}')">Remove</button>
        </div>` : ''}
      </div>`
    : (canEditProject() ? `<div style="text-align:center;padding:14px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);cursor:pointer;margin-top:20px" onclick="editSupplierLink('${p.id}')">
        <span style="font-size:0.85rem;color:var(--text-muted)">\u{1F4E6} Add supplier tracking link (Google Doc / Sheet for ESDs)</span>
      </div>` : '');

  return `
    <div class="section-header"><h3>Submittals</h3>${canEditProject() ? `<div style="display:flex;gap:6px"><button class="btn btn-secondary btn-sm" onclick="manageSuppliers('${p.id}')">Manage Suppliers</button><button class="btn btn-primary btn-sm" onclick="openSubmittalPicker('${p.id}')">Select Submittals</button></div>` : ''}</div>
    <div class="sub-list">${listItems}${noItems}</div>
    ${supplierBar}`;
}

function toggleSubRow(id) {
  const row = document.getElementById(id);
  if (!row) return;
  const idx = id.replace('sub_exp_', '');
  const btn = document.getElementById('sub_btn_' + idx);
  if (row.style.display === 'none') {
    row.style.display = '';
    if (btn) btn.textContent = '\u25BC';
    // Setup drop zones in the expanded row
    setTimeout(() => setupSubDropzones(), 50);
  } else {
    row.style.display = 'none';
    if (btn) btn.textContent = '\u25B6';
  }
}

function toggleSubList(idx) {
  const row = document.getElementById('sub_row_' + idx);
  if (!row) return;
  const wasOpen = row.classList.contains('open');
  // Close all others
  document.querySelectorAll('.sub-row.open').forEach(r => r.classList.remove('open'));
  if (!wasOpen) {
    row.classList.add('open');
    setTimeout(() => setupSubDropzones(), 50);
  }
}

function changeSubField(projectId, type, field, value) {
  const p = getProject(projectId);
  ensureSubmittals(p);
  let s = p.submittals.find(x => x.description === type);
  if (!s) {
    s = { description: type, status: 'Pending', dateSubmitted: '', dateReturned: '', resubmittalDate: '' };
    p.submittals.push(s);
  }
  s[field] = value;
  saveData();
  if (field === 'status') showProject(projectId, 'submittals');
}

function setupSubDropzones() {
  const p = getProject(currentProjectId);
  if (!p) return;
  ensureSubmittals(p);
  const activeTypes = SUBMITTAL_TYPES.filter(t => p.submittalConfig[t]);
  activeTypes.forEach(t => {
    const tKey = t.replace(/[^a-zA-Z0-9]/g,'_');
    setupOneSubDrop('sdi_' + tKey, currentProjectId, t, 'initialFile');
    setupOneSubDrop('sda_' + tKey, currentProjectId, t, 'approvedFile');
  });
}

function setupOneSubDrop(elId, projectId, type, field) {
  const el = document.getElementById(elId);
  if (!el) return;
  setupDropZone(el, f => handleSubFile(projectId, type, field, f));
  // Click to browse — on "Drop PDF" it opens file picker, on "View" it views the file
  const p = getProject(projectId);
  const s = p.submittals.find(x => x.description === type) || {};
  if (!s[field]) {
    el.onclick = e => { e.stopPropagation(); const inp=document.createElement('input'); inp.type='file'; inp.accept='.pdf,image/*'; inp.onchange=()=>{if(inp.files.length)handleSubFile(projectId,type,field,inp.files[0]);}; inp.click(); };
  }
}

async function handleSubFile(projectId, type, field, file) {
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const ref = await fileSave(e.target.result);
      const p = getProject(projectId);
      ensureSubmittals(p);
      let s = p.submittals.find(x => x.description === type);
      if (!s) {
        s = { description: type, status: 'Pending', dateSubmitted: '', dateReturned: '' };
        p.submittals.push(s);
      }
      // Delete old file if replacing
      if (s[field]) await fileDel(s[field]);
      s[field] = ref;
      s[field + 'Type'] = file.type;
      saveData();
      showProject(projectId, 'submittals');
      showToast(type + ' — file attached!');
    } catch(err) { console.error('File save error:', err); showToast('Error saving file'); }
  };
  reader.readAsDataURL(file);
}

function subFileReplace(projectId, type, field) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.pdf,image/*';
  inp.onchange = () => { if (inp.files.length) handleSubFile(projectId, type, field, inp.files[0]); };
  inp.click();
}

async function deleteSubFile(projectId, type, field) {
  if (!confirm('Remove this file?')) return;
  const p = getProject(projectId);
  const s = p.submittals.find(x => x.description === type);
  if (s) { await fileDel(s[field]); delete s[field]; delete s[field + 'Type']; saveData(); showProject(projectId, 'submittals'); showToast('File removed'); }
}

async function viewSubFile(projectId, type, field) {
  const p = getProject(projectId);
  const s = p.submittals.find(x => x.description === type);
  if (!s || !s[field]) return;
  const label = field === 'initialFile' ? type + ' — Initial' : type + ' — Approved';
  const data = await fileGet(s[field]);
  if (!data) { showToast('File not found'); return; }
  openFileViewer(label, data, s[field + 'Type']);
}

     <div style="margin-top:12px;display:flex;gap:8px">

       <button class="btn btn-primary btn-sm" onclick="addSupplierFromManage('${projectId}')">Add</button>

function addSupplierFromManage(projectId) {
  const name = val('ms_new').trim();
  if (!name) return;
  ensureSuppliers();
  if (!db.suppliers.includes(name)) {
    db.suppliers.push(name);
    db.suppliers.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    saveData();
  }
  manageSuppliers(projectId);
  showToast(name + ' added!');
}

function deleteSupplier(idx, projectId) {
  if (!confirm('Delete "' + db.suppliers[idx] + '"? It will be removed from the list but submittals already assigned to it will keep their value.')) return;
  db.suppliers.splice(idx, 1);
  saveData();
  manageSuppliers(projectId);
  showToast('Supplier deleted.');
}

function renameSupplier(idx, projectId) {
  const oldName = db.suppliers[idx];
  const newName = prompt('Rename supplier:', oldName);
  if (!newName || newName.trim() === oldName) return;
  const trimmed = newName.trim();
  // Update all submittals that reference the old name
  db.projects.forEach(p => {
    (p.submittals || []).forEach(s => {
      if (s.supplier === oldName) s.supplier = trimmed;
    });
  });
  db.suppliers[idx] = trimmed;
  db.suppliers.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
  saveData();
  manageSuppliers(projectId);
  showToast('Renamed to ' + trimmed);
}
