// ── BUDGET ───────────────────────────────────────────────────
const MATERIAL_CATS = ['Power','Lighting','Controls','Floor Box','Misc Materials'];

function ensureBudget(p) {
  if (!p.budget) p.budget = {};
  if (!p.budget.materials) p.budget.materials = {};
  if (!p.budget.materialLog) p.budget.materialLog = [];
  if (!p.budget.quotedLabor) p.budget.quotedLabor = '';
  if (!p.budget.laborEntries) p.budget.laborEntries = [];
  if (!p.budget.subCosts) p.budget.subCosts = [];
  if (!p.budget.equipmentCosts) p.budget.equipmentCosts = [];
  if (!p.budget.permitsFees) p.budget.permitsFees = [];
  if (p.budget.percentComplete === undefined) p.budget.percentComplete = 0;
  if (!p.budget.costSnapshots) p.budget.costSnapshots = [];
  if (!db.employees) db.employees = [];
}

function getApprovedCOTotal(p) {
  return (p.changeOrders||[]).filter(c=>c.status==='Approved').reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
}

function getUpdatedContractValue(p) {
  return (parseFloat(p.contractValue)||0) + getApprovedCOTotal(p);
}

function budgetMoneyInput(val, pid, path) {
  const display = val ? '$' + parseFloat(val).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '';
  return `<input type="text" value="${display}" placeholder="$0.00" data-raw="${val||''}" onfocus="this.value=this.dataset.raw||''" onblur="saveBudgetField('${pid}','${path}',this)" style="width:120px;padding:5px 10px;border:none;border-bottom:1.5px solid var(--border);border-radius:0;font-size:0.85rem;font-weight:600;color:var(--text);background:transparent;text-align:right">`;
}

function saveBudgetField(pid, path, el) {
  const raw = el.value.replace(/[^0-9.\-]/g,'');
  const num = parseFloat(raw);
  const p = getProject(pid);
  ensureBudget(p);
  // Handle CO cost-to-complete: path like "_coCost.0"
  if (path.startsWith('_coCost.')) {
    const coIdx = parseInt(path.split('.')[1]);
    if (p.changeOrders && p.changeOrders[coIdx]) {
      p.changeOrders[coIdx].costToComplete = !isNaN(num) ? String(num) : '';
    }
  } else {
    // path like "materials.Power.quoted" or "quotedLabor" or "subCosts.0.quoted"
    const parts = path.split('.');
    let obj = p.budget;
    for (let i=0; i<parts.length-1; i++) {
      const key = parts[i];
      if (Array.isArray(obj[key])) { obj = obj[key]; }
      else if (!isNaN(parseInt(key))) { obj = obj[parseInt(key)]; }
      else { if (!obj[key]) obj[key] = {}; obj = obj[key]; }
    }
    const lastKey = parts[parts.length-1];
    obj[!isNaN(parseInt(lastKey)) ? parseInt(lastKey) : lastKey] = !isNaN(num) ? String(num) : '';
  }
  if (!isNaN(num)) {
    el.value = '$' + num.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    el.dataset.raw = String(num);
  } else { el.value = ''; el.dataset.raw = ''; }
  saveData();
  showProject(pid, 'budget');
}

function calcBudgetTotals(p) {
  ensureBudget(p);
  const b = p.budget;
  let matQuoted=0, matActual=0;
  const miscM = b.materials['Misc Materials']||{}; matQuoted=parseFloat(miscM.quoted)||0; matActual=parseFloat(miscM.actual)||0;
  const matLogTotal = b.materialLog.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  matActual += matLogTotal;
  const quotedLabor = parseFloat(b.quotedLabor)||0;
  let laborCost=0, totalHrs=0, totalOT=0;
  b.laborEntries.forEach(le => {
    const emp = db.employees.find(e=>e.id===le.employeeId);
    const rate=emp?parseFloat(emp.rate)||0:0, otRate=emp?parseFloat(emp.otRate)||0:0;
    const hrs=parseFloat(le.hours)||0, ot=parseFloat(le.otHours)||0;
    laborCost+=(rate*hrs)+(otRate*ot); totalHrs+=hrs; totalOT+=ot;
  });
  const subQuoted = b.subCosts.reduce((s,c)=>s+(parseFloat(c.quoted)||0),0);
  const subActual = b.subCosts.reduce((s,c)=>s+(parseFloat(c.actual)||0),0);
  const equipTotal = b.equipmentCosts.reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
  const permitTotal = b.permitsFees.reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
  const coCosts = (p.changeOrders||[]).reduce((s,c)=>s+(parseFloat(c.costToComplete)||0),0);
  const coRevenue = (p.changeOrders||[]).filter(c=>c.status==='Approved').reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
  const totalQuoted = matQuoted + quotedLabor + subQuoted + (parseFloat(b.quotedEquipment)||0) + (parseFloat(b.quotedPermits)||0);
  const totalActual = matActual + laborCost + subActual + equipTotal + permitTotal + coCosts;
  const updatedContract = getUpdatedContractValue(p);
  const profit = updatedContract - totalActual;
  const profitPct = updatedContract > 0 ? (profit / updatedContract * 100) : 0;
  const pctSpent = totalQuoted > 0 ? (totalActual / totalQuoted * 100) : 0;
  return { matQuoted, matActual, quotedLabor, laborCost, totalHrs, totalOT, subQuoted, subActual, equipTotal, permitTotal, coCosts, coRevenue, totalQuoted, totalActual, updatedContract, profit, profitPct, pctSpent };
}

function budgetVarianceBar(quoted, actual) {
  if (!quoted && !actual) return '<span class="empty">—</span>';
  const v = quoted - actual;
  const pct = quoted > 0 ? Math.min((actual / quoted) * 100, 100) : (actual > 0 ? 100 : 0);
  const cls = pct > 95 ? 'red' : (pct > 80 ? 'yellow' : 'green');
  return `<div class="var-bar-cell">
    <div class="var-bar-track"><div class="var-bar-fill ${cls}" style="width:${pct}%"></div></div>
    <span style="font-weight:600;color:${v<0?'#dc2626':'#16a34a'};white-space:nowrap">${v>=0?'+':''}${fmtMoney(v)}</span>
  </div>`;
}

function renderBudget(p) {
  ensureBudget(p);
  const b = p.budget;
  const t = calcBudgetTotals(p);

  // Materials rows with inline variance bars
  const matRows = MATERIAL_CATS.map(cat => {
    const m = b.materials[cat] || {};
    const q = parseFloat(m.quoted)||0, a = parseFloat(m.actual)||0;
    return `<tr>
      <td style="font-weight:600">${cat}</td>
      <td style="text-align:right">${budgetMoneyInput(m.quoted||'', p.id, 'materials.'+cat+'.quoted')}</td>
      <td style="text-align:right">${budgetMoneyInput(m.actual||'', p.id, 'materials.'+cat+'.actual')}</td>
      <td>${budgetVarianceBar(q, a)}</td>
    </tr>`;
  }).join('');
  const matVar = t.matQuoted - t.matActual;

  // Material Log
  const matLogTotal = b.materialLog.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const matLogRows = b.materialLog.length ? b.materialLog.map((entry,i) => `<tr>
    <td style="font-size:0.8rem;color:var(--text-secondary)">${fmtDate(entry.date)}</td>
    <td style="font-weight:600;text-align:right">${fmtMoney(parseFloat(entry.amount)||0)}</td>
    <td style="color:var(--text-secondary);font-size:0.85rem">${entry.notes||''}</td>
    <td style="white-space:nowrap"><button class="btn btn-sm btn-danger" onclick="deleteMatLogEntry('${p.id}',${i})">X</button></td>
  </tr>`).join('') : '';

  // Labor
  let totalLaborCost=0, totalHours=0, totalOTHours=0;
  const labRows = b.laborEntries.length ? b.laborEntries.map((le,i) => {
    const emp = db.employees.find(e => e.id === le.employeeId);
    const rate = emp ? parseFloat(emp.rate)||0 : 0;
    const otRate = emp ? parseFloat(emp.otRate)||0 : 0;
    const hrs = parseFloat(le.hours)||0;
    const otHrs = parseFloat(le.otHours)||0;
    const cost = (rate * hrs) + (otRate * otHrs);
    totalLaborCost += cost; totalHours += hrs; totalOTHours += otHrs;
    return `<tr>
      <td style="font-weight:600">${emp ? emp.name : '<span class="empty">Unknown</span>'}</td>
      <td style="color:var(--text-secondary);font-size:0.8rem">${emp ? fmtMoney(rate)+'/hr' : '—'}</td>
      <td style="color:var(--text-secondary);font-size:0.8rem">${emp ? fmtMoney(otRate)+'/hr' : '—'}</td>
      <td style="text-align:center"><input type="text" value="" placeholder="Enter hrs" id="weeklyHrs_${i}" onkeydown="if(event.key==='Enter')addWeeklyHours('${p.id}',${i},this)" style="width:85px;padding:5px 10px;border:1.5px solid rgba(var(--accent),0.2);border-radius:6px;font-size:0.85rem;font-weight:600;color:var(--accent-hex);background:rgba(var(--accent),0.06);text-align:center"></td>
      <td style="font-weight:600;text-align:right">${hrs||0}</td>
      <td style="font-weight:600;text-align:right">${otHrs||0}</td>
      <td style="font-weight:600;text-align:right;padding-right:20px">${fmtMoney(cost)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="removeLaborEntry('${p.id}',${i})">Remove</button></td>
    </tr>`;
  }).join('') : '';
  const laborVar = t.quotedLabor - totalLaborCost;
  const availEmps = db.employees.filter(e => !b.laborEntries.find(le => le.employeeId === e.id));
  const empOptions = availEmps.map(e => `<option value="${e.id}">${e.name} (${fmtMoney(parseFloat(e.rate)||0)}/hr)</option>`).join('');

  // Subcontractor costs with variance bars
  const subRows = b.subCosts.length ? b.subCosts.map((sc,i) => {
    const sq = parseFloat(sc.quoted)||0, sa = parseFloat(sc.actual)||0;
    return `<tr>
    <td style="font-weight:600">${sc.name||'—'}</td>
    <td style="text-align:right">${budgetMoneyInput(sc.quoted||'', p.id, 'subCosts.'+i+'.quoted')}</td>
    <td style="text-align:right">${budgetMoneyInput(sc.actual||'', p.id, 'subCosts.'+i+'.actual')}</td>
    <td>${budgetVarianceBar(sq, sa)}</td>
    <td style="white-space:nowrap"><button class="btn btn-sm btn-danger" onclick="deleteSubCost('${p.id}',${i})">Del</button></td>
  </tr>`;
  }).join('') : '';
  const subVar = t.subQuoted - t.subActual;

  // Equipment costs
  const equipRows = b.equipmentCosts.length ? b.equipmentCosts.map((ec,i) => `<tr>
    <td style="font-weight:600">${ec.description||'—'}</td>
    <td style="text-align:right">${budgetMoneyInput(ec.amount||'', p.id, 'equipmentCosts.'+i+'.amount')}</td>
    <td>${fmtDate(ec.date)}</td>
    <td style="white-space:nowrap"><button class="btn btn-sm btn-danger" onclick="deleteBudgetItem('${p.id}','equipmentCosts',${i})">Del</button></td>
  </tr>`).join('') : '';

  // Permits & fees
  const permitRows = b.permitsFees.length ? b.permitsFees.map((pf,i) => `<tr>
    <td style="font-weight:600">${pf.description||'—'}</td>
    <td style="text-align:right">${budgetMoneyInput(pf.amount||'', p.id, 'permitsFees.'+i+'.amount')}</td>
    <td>${fmtDate(pf.date)}</td>
    <td style="white-space:nowrap"><button class="btn btn-sm btn-danger" onclick="deleteBudgetItem('${p.id}','permitsFees',${i})">Del</button></td>
  </tr>`).join('') : '';

  // CO cost impact
  const cos = (p.changeOrders||[]).filter(c=>c.status==='Approved'||parseFloat(c.costToComplete)>0);
  const coRows = cos.length ? cos.map((c,i) => {
    const realIdx = (p.changeOrders||[]).indexOf(c);
    const rev = c.status==='Approved' ? parseFloat(c.amount)||0 : 0;
    const cost = parseFloat(c.costToComplete)||0;
    const coProfit = rev - cost;
    return `<div class="co-cost-row">
      <span style="font-weight:700;min-width:50px">CO #${c.number||realIdx+1}</span>
      <span style="flex:1;color:var(--text-secondary)">${c.notes||'—'}</span>
      <span style="min-width:90px;text-align:right;color:#22c55e;font-weight:600">+${fmtMoney(rev)}</span>
      <span style="min-width:20px;text-align:center;color:var(--text-muted)">-</span>
      <span style="min-width:90px">${budgetMoneyInput(c.costToComplete||'', p.id, '_coCost.'+realIdx)}</span>
      <span class="co-cost-profit" style="color:${coProfit>=0?'#22c55e':'#ef4444'}">${coProfit>=0?'+':''}${fmtMoney(coProfit)}</span>
    </div>`;
  }).join('') : '<div style="font-size:0.85rem;color:var(--text-muted);padding:12px">No approved COs yet</div>';

  // % Complete vs % Budget Spent
  const pctComplete = b.percentComplete || 0;
  const pctSpent = t.totalQuoted > 0 ? Math.round(t.totalActual / t.totalQuoted * 100) : 0;
  const healthDiff = pctSpent - pctComplete;
  const healthClass = healthDiff > 10 ? 'bh-alert-bad' : (healthDiff > 5 ? 'bh-alert-warn' : 'bh-alert-ok');
  const healthIcon = healthDiff > 10 ? '&#9888;' : (healthDiff > 5 ? '&#9679;' : '&#10003;');
  const healthMsg = healthDiff > 10 ? 'Over budget — spending is ahead of progress'
    : (healthDiff > 5 ? 'Watch closely — spending is slightly ahead of progress'
    : (pctComplete > 0 ? 'On track — spending aligned with progress' : 'Set your % complete to see budget health'));

  // Cost trend (snapshots)
  const snaps = b.costSnapshots || [];
  const maxSnap = snaps.length ? Math.max(...snaps.map(s=>(parseFloat(s.labor)||0)+(parseFloat(s.material)||0)+(parseFloat(s.other)||0)), 1) : 1;
  const trendBars = snaps.length ? snaps.slice(-12).map(s => {
    const lab = parseFloat(s.labor)||0, mat = parseFloat(s.material)||0, oth = parseFloat(s.other)||0;
    const total = lab+mat+oth;
    const h = total > 0 ? Math.max((total/maxSnap)*100, 5) : 0;
    const labH = total>0 ? (lab/total)*h : 0, matH = total>0 ? (mat/total)*h : 0, othH = h-labH-matH;
    return `<div class="bt-bar-group">
      <div class="bt-bar bt-bar-other" style="height:${othH}%"></div>
      <div class="bt-bar bt-bar-material" style="height:${matH}%"></div>
      <div class="bt-bar bt-bar-labor" style="height:${labH}%"></div>
      <div class="bt-label">${s.label||''}</div>
    </div>`;
  }).join('') : '<div style="font-size:0.85rem;color:var(--text-muted);padding:20px;text-align:center">Click "Snapshot" to record this week\'s costs. Over time this builds a trend chart.</div>';

  // Donut chart data
  const donutData = [
    { label: 'Materials', value: t.matActual, color: '#14b8a6' },
    { label: 'Labor', value: t.laborCost, color: '#8836ea' },
    { label: 'Subs', value: t.subActual, color: '#6366f1' },
    { label: 'Equipment', value: t.equipTotal, color: '#f59e0b' },
    { label: 'Permits', value: t.permitTotal, color: '#ec4899' },
    { label: 'CO Costs', value: t.coCosts, color: '#ef4444' }
  ].filter(d => d.value > 0);
  const donutTotal = donutData.reduce((s,d) => s + d.value, 0);

  // Build SVG donut
  let donutSvg = '';
  if (donutTotal > 0) {
    const cx=80, cy=80, r=60, r2=42;
    let cumAngle = -90;
    const paths = donutData.map(d => {
      const pct = d.value / donutTotal;
      const angle = pct * 360;
      const startRad = cumAngle * Math.PI / 180;
      const endRad = (cumAngle + angle) * Math.PI / 180;
      const largeArc = angle > 180 ? 1 : 0;
      const x1 = cx + r * Math.cos(startRad), y1 = cy + r * Math.sin(startRad);
      const x2 = cx + r * Math.cos(endRad), y2 = cy + r * Math.sin(endRad);
      const x3 = cx + r2 * Math.cos(endRad), y3 = cy + r2 * Math.sin(endRad);
      const x4 = cx + r2 * Math.cos(startRad), y4 = cy + r2 * Math.sin(startRad);
      cumAngle += angle;
      if (donutData.length === 1) {
        return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${r-r2}"/>`;
      }
      return `<path d="M${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} L${x3},${y3} A${r2},${r2} 0 ${largeArc} 0 ${x4},${y4} Z" fill="${d.color}" opacity="0.85"/>`;
    }).join('');
    donutSvg = `<svg viewBox="0 0 160 160" width="160" height="160">${paths}</svg>`;
  } else {
    donutSvg = `<svg viewBox="0 0 160 160" width="160" height="160"><circle cx="80" cy="80" r="60" fill="none" stroke="var(--border)" stroke-width="18"/></svg>`;
  }
  const donutLegend = donutData.map(d => `<div class="donut-legend-item"><div class="donut-legend-dot" style="background:${d.color}"></div>${d.label}: ${fmtMoney(d.value)}</div>`).join('');

  // Accordion section helper — remembers open/closed state
  const accState = window._budgetAccState || {};
  function accSection(key, icon, title, summaryHtml, bodyHtml, actionBtn) {
    const isOpen = accState[key] === true; // default closed
    return `<div class="budget-accordion">
      <div class="budget-acc-header ${isOpen?'':'collapsed'}" onclick="toggleBudgetAcc('${key}',this)">
        <div class="budget-acc-left">
          <div class="budget-acc-icon">${icon}</div>
          <div class="budget-acc-title">${title}</div>
        </div>
        <div class="budget-acc-summary">${summaryHtml}${actionBtn?actionBtn:''}<span class="budget-acc-toggle">&#9660;</span></div>
      </div>
      <div class="budget-acc-body ${isOpen?'':'collapsed'}">${bodyHtml}</div>
    </div>`;
  }

  // Accordion summary tags
  const matTag = t.matQuoted||t.matActual ? `<span class="budget-acc-tag ${matVar<0?'red':'green'}">${matVar>=0?'+':''}${fmtMoney(matVar)}</span>` : '<span class="budget-acc-tag neutral">No data</span>';

// ── BUDGET: ACCORDION TOGGLE ────────────────────────────────
window._budgetAccState = {};
function toggleBudgetAcc(key, headerEl) {
  const body = headerEl.nextElementSibling;
  const isCollapsed = headerEl.classList.toggle('collapsed');
  body.classList.toggle('collapsed', isCollapsed);
  window._budgetAccState[key] = !isCollapsed;
}

function addWeeklyHours(pid, idx, el) {
  const total = parseFloat(el.value.replace(/[^0-9.]/g,''));
  if (isNaN(total) || total <= 0) { el.value = ''; return; }
  const p = getProject(pid);
  ensureBudget(p);
  const le = p.budget.laborEntries[idx];
  const reg = Math.min(total, 40);
  const ot = Math.max(total - 40, 0);
  le.hours = String((parseFloat(le.hours)||0) + reg);
  le.otHours = String((parseFloat(le.otHours)||0) + ot);
  saveData();
  showProject(pid, 'budget');
  showToast(reg + ' hrs + ' + ot + ' OT added');
}

function saveLaborField(pid, idx, field, val) {
  const p = getProject(pid);
  ensureBudget(p);
  const raw = val.replace(/[^0-9.]/g,'');
  p.budget.laborEntries[idx][field] = raw;
  saveData();
  showProject(pid, 'budget');
}

function addLaborEntry(pid) {
  const empId = val('addEmpSelect');
  if (!empId) return;
  const p = getProject(pid);
  ensureBudget(p);
  p.budget.laborEntries.push({ employeeId: empId, hours: '' });
  saveData();
  showProject(pid, 'budget');
}

function removeLaborEntry(pid, idx) {
  const p = getProject(pid);
  ensureBudget(p);
  p.budget.laborEntries.splice(idx, 1);
  saveData();
  showProject(pid, 'budget');
}

// ── BUDGET: COST SNAPSHOTS ──────────────────────────────────
function takeCostSnapshot(pid) {
  const p = getProject(pid); ensureBudget(p);
  const t = calcBudgetTotals(p);
  const today = new Date();
  const label = (today.getMonth()+1) + '/' + today.getDate();
  p.budget.costSnapshots.push({
    date: today.toISOString().slice(0,10),
    label,
    labor: t.laborCost.toFixed(2),
    material: t.matActual.toFixed(2),
    other: (t.subActual + t.equipTotal + t.permitTotal + t.coCosts).toFixed(2)
  });
  saveData(); showProject(pid, 'budget'); showToast('Snapshot recorded!');
}

  document.getElementById('headerTitle').textContent = 'Employee Manager';
  renderEmployeeManager();
}

function renderEmployeeManager() {
  if (!db.employees) db.employees = [];
  const rows = db.employees.length ? db.employees.map((e,i) => `<tr>
    <td style="font-weight:600">${e.name||''}</td>
    <td>${e.email||'<span class="empty">—</span>'}</td>
    <td>${e.phone||'<span class="empty">—</span>'}</td>
    <td><span style="font-size:0.75rem;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(var(--accent),0.08);color:var(--accent-hex)">${e.role||'—'}</span></td>
    ${!isField() ? `<td style="text-align:right">${e.rate ? fmtMoney(parseFloat(e.rate)) : '<span class="empty">—</span>'}</td>
    <td style="text-align:right">${e.otRate ? fmtMoney(parseFloat(e.otRate)) : '<span class="empty">—</span>'}</td>` : ''}
    <td style="white-space:nowrap">
      <button class="btn btn-sm btn-secondary" onclick="openEmployeeModal(${i})">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteEmployee(${i})">Delete</button>
    </td>
  </tr>`).join('') : `<tr><td colspan="${isField()?5:7}" class="table-empty">No employees yet. Click "+ Add Employee" to get started.</td></tr>`;

  document.getElementById('mainContent').innerHTML = `
    <div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--glass-border)">
      <div class="section-header"><h3>Employee Roster (${db.employees.length})</h3><button class="btn btn-primary btn-sm" onclick="openEmployeeModal()">+ Add Employee</button></div>
      <table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th>${!isField()?'<th style="text-align:right">Rate/hr</th><th style="text-align:right">OT Rate/hr</th>':''}<th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function openEmployeeModal(editIdx) {
  if (!db.employees) db.employees = [];
  const isEdit = editIdx !== undefined && editIdx !== null;
  const e = isEdit ? db.employees[editIdx] : {};
  const roleOptions = EMP_ROLES.map(r => `<option value="${r}" ${e.role===r?'selected':''}>${r}</option>`).join('');
  modal(isEdit ? 'Edit Employee' : 'Add Employee',
    `<div class="form-group"><label>Name</label><input id="emp_name" value="${e.name||''}" placeholder="John Smith"></div>
     <div class="form-row">
       <div class="form-group"><label>Email</label><input id="emp_email" value="${e.email||''}" placeholder="john@company.com" type="email"></div>
       <div class="form-group"><label>Phone</label><input id="emp_phone" value="${e.phone||''}" placeholder="205-555-1234" type="tel" oninput="fmtPhone(this)" maxlength="12"></div>
     </div>
     <div class="form-group"><label>Role</label><select id="emp_role"><option value="">Select role...</option>${roleOptions}</select></div>
     <div class="form-row">
       <div class="form-group"><label>Hourly Rate</label><input id="emp_rate" value="${e.rate||''}" placeholder="0.00" type="number" step="0.01"></div>
       <div class="form-group"><label>OT Rate</label><input id="emp_otRate" value="${e.otRate||''}" placeholder="0.00" type="number" step="0.01"></div>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveEmployee(${isEdit?editIdx:'null'})">${isEdit?'Save':'Add'}</button>`);
}

function saveEmployee(editIdx) {
  const name = val('emp_name').trim();
  if (!name) { alert('Name is required.'); return; }
  const data = { name, email:val('emp_email').trim(), phone:val('emp_phone').trim(), role:val('emp_role'), rate:val('emp_rate'), otRate:val('emp_otRate') };
  if (editIdx !== null) {
    data.id = db.employees[editIdx].id;
    db.employees[editIdx] = data;
  } else {
    data.id = genId();
    db.employees.push(data);
  }
  saveData(); closeModal(); renderEmployeeManager(); showToast(editIdx!==null?'Employee updated!':'Employee added!');
}

function deleteEmployee(idx) {
  if (!confirm('Delete ' + db.employees[idx].name + '? This won\'t remove them from existing project labor entries.')) return;
  db.employees.splice(idx, 1);
  saveData(); renderEmployeeManager(); showToast('Employee deleted.');
}

async function approveUser(userId, role, name, email) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${_cachedAccessToken}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ role })
    });
    if (!res.ok) throw new Error('Approve failed');

    // Auto-add to Employee Roster if not already there
    if (email) {
      if (!db.employees) db.employees = [];
      const exists = db.employees.some(e => e.email && e.email.toLowerCase() === email.toLowerCase());
      if (!exists) {
        const empRole = role === 'master' ? 'Master' : role === 'admin' ? 'Office' : 'Field';
        db.employees.push({ id: genId(), name: name || '', email, phone: '', role: empRole, rate: '', otRate: '' });
        saveData();
      }
    }

    const label = role === 'admin' ? 'Office' : 'Field';
    showToast(`User approved as ${label} — added to Employee Roster`);
    renderUserManager();
  } catch (e) {
    console.error('Approve error:', e);
    showToast('Failed to approve user');
  }
}

async function syncUsersToRoster() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?role=neq.pending&select=*`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${_cachedAccessToken}`,
        'Accept': 'application/json'
      }
    });
    const users = await res.json();
    if (!Array.isArray(users)) throw new Error('Failed to load users');

    if (!db.employees) db.employees = [];
    let added = 0;
    for (const u of users) {
      if (!u.email) continue;
      const exists = db.employees.some(e => e.email && e.email.toLowerCase() === u.email.toLowerCase());
      if (!exists) {
        const empRole = u.role === 'master' ? 'Master' : u.role === 'admin' ? 'Office' : 'Field';
        db.employees.push({ id: genId(), name: u.full_name || '', email: u.email, phone: '', role: empRole, rate: '', otRate: '' });
        added++;
      }
    }
    if (added > 0) {
      saveData();
      showToast(`${added} user${added > 1 ? 's' : ''} added to Employee Roster`);
    } else {
      showToast('All users already in Employee Roster');
    }
  } catch (e) {
    console.error('Sync error:', e);
    showToast('Could not sync users');
  }
}

// ── TIMESHEETS ───────────────────────────────────────────────

function getEmployeeRole() {
  if (!currentUserProfile || !db.employees) return '';
  const emp = db.employees.find(e => e.email && currentUserProfile.email && e.email.toLowerCase() === currentUserProfile.email.toLowerCase());
  return emp ? (emp.role || '') : '';
}

function canAccessTimesheets() {
  return true;
}

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.getFullYear(), d.getMonth(), diff).toISOString().split('T')[0];
}

function getWeekDays(weekStart) {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart + 'T00:00:00');
    d.setDate(d.getDate() + i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

function fmtDayShort(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'numeric', day: 'numeric' });
}

let _currentTimesheetWeek = getWeekStart(new Date());

function showTimesheets() {
  if (!canAccessTimesheets()) { showToast('Timesheets are not available for your role'); showDashboard(); return; }
  currentProjectId = null;
  document.getElementById('backBtn').style.display = '';
  document.getElementById('headerTitle').textContent = 'Timesheets';
  renderTimesheets();
}

async function loadTimesheets(weekStart) {
  try {
    const rows = await supaFetch(`timesheets?week_start=eq.${weekStart}&select=*`);
    return rows || [];
  } catch (e) { console.error('Load timesheets error:', e); return []; }
}

async function renderTimesheets() {
  const week = _currentTimesheetWeek;
  const days = getWeekDays(week);
  const weekLabel = fmtDayShort(days[0]) + ' — ' + fmtDayShort(days[6]);

  document.getElementById('mainContent').innerHTML = `
    <div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--glass-border)">
      <div class="section-header"><h3>Loading...</h3></div>
    </div>`;

  const timesheets = await loadTimesheets(week);

  if (isField()) {
    renderFieldTimesheets(week, days, weekLabel, timesheets);
  } else {
    renderOfficeTimesheets(week, days, weekLabel, timesheets);
  }
}

function changeTimesheetWeek(dir) {
  const d = new Date(_currentTimesheetWeek + 'T00:00:00');
  d.setDate(d.getDate() + (dir * 7));
  _currentTimesheetWeek = d.toISOString().split('T')[0];
  renderTimesheets();
}

// ── FIELD VIEW: submit time per project ──────────────────────

function renderFieldTimesheets(week, days, weekLabel, timesheets) {
  const userId = currentUser?.id;
  const mySheets = timesheets.filter(t => t.submitted_by === userId);

  const sheetCards = mySheets.map(ts => {
    const p = db.projects.find(x => x.id === ts.project_id);
    const pName = p ? (p.jobNumber ? p.jobNumber + ' — ' + p.name : p.name) : 'Unknown Project';
    const entries = ts.entries || [];
    let totalHrs = 0, totalOT = 0;
    entries.forEach(e => { totalHrs += parseFloat(e.hours) || 0; totalOT += parseFloat(e.otHours) || 0; });
    const empCount = [...new Set(entries.map(e => e.employeeId))].length;

    const statusBadge = ts.status === 'approved'
      ? '<span style="background:rgba(34,197,94,0.12);color:#22c55e;font-weight:700;padding:3px 10px;border-radius:6px;font-size:0.75rem">Approved</span>'
      : ts.status === 'submitted'
      ? '<span style="background:rgba(99,102,241,0.12);color:#6366f1;font-weight:700;padding:3px 10px;border-radius:6px;font-size:0.75rem">Submitted</span>'
      : '<span style="background:rgba(100,116,139,0.12);color:#64748b;font-weight:700;padding:3px 10px;border-radius:6px;font-size:0.75rem">Draft</span>';

    const canEdit = ts.status !== 'approved';

    return `<div class="mobile-card" style="cursor:${canEdit ? 'pointer' : 'default'}" ${canEdit ? `onclick="openTimesheetEntry('${ts.project_id}','${week}','${ts.id}')"` : ''}>
      <div class="mc-row"><div class="mc-title">${pName}</div>${statusBadge}</div>
      <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px">${empCount} employee${empCount !== 1 ? 's' : ''} \u2022 ${totalHrs} hrs${totalOT ? ' + ' + totalOT + ' OT' : ''}</div>
      ${canEdit ? '<div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">Tap to edit</div>' : ''}
    </div>`;
  }).join('');

  const projects = db.projects.filter(p => (p.status || 'Active') === 'Active');
  const projOptions = projects.map(p => `<option value="${p.id}">${p.jobNumber ? p.jobNumber + ' — ' : ''}${p.name}</option>`).join('');

  document.getElementById('mainContent').innerHTML = `
    <div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--glass-border)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:10px">

function startNewTimesheet() {

async function openTimesheetEntry(projectId, weekStart, existingId) {
  const p = db.projects.find(x => x.id === projectId);
  if (!p) return;
  const pName = p.jobNumber ? p.jobNumber + ' — ' + p.name : p.name;
  const days = getWeekDays(weekStart);

  // Pull employee list from Supabase profiles (available to all users) + local roster
  let emps = (db.employees || []).filter(e => e.name);
  try {
    const profiles = await supaFetch(`profiles?role=neq.pending&select=id,email,full_name,role`);
    if (profiles && profiles.length) {
      profiles.forEach(pr => {
        const already = emps.find(e => e.email && pr.email && e.email.toLowerCase() === pr.email.toLowerCase());
        if (!already && pr.full_name) {
          emps.push({ id: pr.id, name: pr.full_name, email: pr.email, role: pr.role === 'admin' ? 'Office' : pr.role === 'master' ? 'Master' : 'Field' });
        }
      });
    }
  } catch (e) { console.error('Load profiles for timesheet:', e); }

  // Load existing if editing
  let existingEntries = [];
  if (existingId) {
    const sheets = await loadTimesheets(weekStart);
    const sheet = sheets.find(t => t.id === existingId);
    if (sheet) existingEntries = sheet.entries || [];
  }

  // Sum existing entries per employee (flatten days into totals)
  const empTotals = {};
  existingEntries.forEach(e => {
    if (!empTotals[e.employeeId]) empTotals[e.employeeId] = { hours: 0, otHours: 0 };
    empTotals[e.employeeId].hours += parseFloat(e.hours) || 0;
    empTotals[e.employeeId].otHours += parseFloat(e.otHours) || 0;
  });

  const empRows = emps.map(emp => {
    const existing = empTotals[emp.id] || { hours: '', otHours: '' };
    const hrs = existing.hours || '';
    const ot = existing.otHours || '';
    return `<tr>
      <td style="font-weight:600;font-size:0.88rem;padding:10px 12px">${emp.name}</td>
      <td style="text-align:center;padding:6px">
        <input type="number" min="0" step="0.5" value="${hrs}" placeholder="0" data-emp="${emp.id}" data-type="hours" style="width:70px;padding:8px;border:1.5px solid var(--border);border-radius:6px;font-size:0.9rem;font-weight:600;text-align:center;background:var(--bg-surface);color:var(--text)">
      </td>
      <td style="text-align:center;padding:6px">
        <input type="number" min="0" step="0.5" value="${ot}" placeholder="0" data-emp="${emp.id}" data-type="otHours" style="width:70px;padding:8px;border:1.5px solid rgba(245,158,11,0.3);border-radius:6px;font-size:0.9rem;font-weight:600;text-align:center;background:rgba(245,158,11,0.04);color:#f59e0b">
      </td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--glass-border)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <div>
          <div style="font-size:1rem;font-weight:800;color:var(--text)">${pName}</div>
          <div style="font-size:0.8rem;color:var(--text-secondary)">Week of ${fmtDayShort(days[0])} — ${fmtDayShort(days[6])}</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="renderTimesheets()">\u2190 Back</button>
      </div>
      <p style="font-size:0.82rem;color:var(--text-muted);margin:0 0 12px">Enter total hours and overtime for each person who worked this project this week.</p>
      <table class="data-table" style="margin:0" id="tsEntryTable">
        <thead><tr><th>Employee</th><th style="text-align:center">Hours</th><th style="text-align:center">OT</th></tr></thead>
        <tbody>${empRows}</tbody>
      </table>
      <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="saveTimesheetDraft('${projectId}','${weekStart}','${existingId||''}')">Save Draft</button>
        <button class="btn btn-primary" onclick="submitTimesheetEntry('${projectId}','${weekStart}','${existingId||''}')">Submit</button>
        ${existingId ? `<button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="deleteTimesheet('${existingId}')">Delete</button>` : ''}
      </div>
    </div>`;
}

function collectTimesheetEntries() {
  const entries = [];
  document.querySelectorAll('#tsEntryTable input[data-type="hours"]').forEach(input => {
    const empId = input.dataset.emp;
    const hrs = parseFloat(input.value) || 0;
    const otInput = document.querySelector(`#tsEntryTable input[data-emp="${empId}"][data-type="otHours"]`);
    const ot = otInput ? (parseFloat(otInput.value) || 0) : 0;
    if (hrs > 0 || ot > 0) {
      entries.push({ employeeId: empId, hours: hrs, otHours: ot });
    }
  });
  return entries;
}

async function saveTimesheetDraft(projectId, weekStart, existingId) {
  const entries = collectTimesheetEntries();
  const data = {
    id: existingId || genId(),
    project_id: projectId,
    submitted_by: currentUser?.id,
    submitted_by_name: currentUserProfile?.full_name || '',
    week_start: weekStart,
    status: 'draft',
    entries: entries,
    updated_at: new Date().toISOString()
  };
  try {
    await supaFetch('timesheets', {
      method: 'POST',
      body: JSON.stringify(data),
      prefer: 'return=minimal,resolution=merge-duplicates'
    });
    showToast('Draft saved');
  } catch (e) { showToast('Failed to save draft'); console.error(e); }
}

async function submitTimesheetEntry(projectId, weekStart, existingId) {
  const entries = collectTimesheetEntries();
  if (!entries.length) { showToast('Enter hours for at least one person'); return; }
  const data = {
    id: existingId || genId(),
    project_id: projectId,
    submitted_by: currentUser?.id,
    submitted_by_name: currentUserProfile?.full_name || '',
    week_start: weekStart,
    status: 'submitted',
    entries: entries,
    updated_at: new Date().toISOString()
  };
  try {
    await supaFetch('timesheets', {
      method: 'POST',
      body: JSON.stringify(data),
      prefer: 'return=minimal,resolution=merge-duplicates'
    });
    showToast('Timesheet submitted!');
    renderTimesheets();
  } catch (e) { showToast('Failed to submit'); console.error(e); }
}

async function deleteTimesheet(tsId) {
  if (!confirm('Delete this timesheet?')) return;
  try {

async function pushTimesheetsToBudget(weekStart) {
  if (!confirm('Push all approved timesheets for this week to project budgets?')) return;

  const sheets = await loadTimesheets(weekStart);
  const approved = sheets.filter(t => t.status === 'approved');
  if (!approved.length) { showToast('No approved timesheets to push'); return; }

  let projectsUpdated = 0;
  approved.forEach(ts => {
    const p = getProject(ts.project_id);
    if (!p) return;
    if (!p.budget) p.budget = {};
    if (!p.budget.laborEntries) p.budget.laborEntries = [];

    // Sum hours per employee from this timesheet
    const empHours = {};
    (ts.entries || []).forEach(e => {
      if (!empHours[e.employeeId]) empHours[e.employeeId] = { hours: 0, otHours: 0 };
      empHours[e.employeeId].hours += parseFloat(e.hours) || 0;
      empHours[e.employeeId].otHours += parseFloat(e.otHours) || 0;
    });

    for (const [empId, totals] of Object.entries(empHours)) {
      let entry = p.budget.laborEntries.find(le => le.employeeId === empId);
      if (entry) {
        entry.hours = (parseFloat(entry.hours) || 0) + totals.hours;
        entry.otHours = (parseFloat(entry.otHours) || 0) + totals.otHours;
      } else {
        p.budget.laborEntries.push({ employeeId: empId, hours: totals.hours, otHours: totals.otHours });
      }
    }
    projectsUpdated++;
  });

  saveData();
  showToast(`Hours pushed to ${projectsUpdated} project${projectsUpdated > 1 ? 's' : ''}`);
}

function exportTimesheetsForADP(weekStart) {
  const days = getWeekDays(weekStart);
  // Load from already-rendered data — fetch again
  loadTimesheets(weekStart).then(sheets => {
    const approvedAndSubmitted = sheets.filter(t => t.status === 'approved' || t.status === 'submitted');
    if (!approvedAndSubmitted.length) { showToast('No timesheets to export'); return; }

    // Aggregate by employee across all projects
    const empTotals = {}; // { empId: { name, email, role, days: {date: {hours, ot}}, totalHrs, totalOT } }
    approvedAndSubmitted.forEach(ts => {
      const p = db.projects.find(x => x.id === ts.project_id);
      (ts.entries || []).forEach(e => {
        if (!empTotals[e.employeeId]) {
          const emp = (db.employees || []).find(x => x.id === e.employeeId);
          empTotals[e.employeeId] = {
            name: emp ? emp.name : 'Unknown',
            email: emp ? emp.email : '',
            role: emp ? emp.role : '',
            projects: {},
            totalHrs: 0, totalOT: 0
          };
        }
        const et = empTotals[e.employeeId];
        const hrs = parseFloat(e.hours) || 0;
        const ot = parseFloat(e.otHours) || 0;
        et.totalHrs += hrs;
        et.totalOT += ot;
        const projName = p ? (p.jobNumber || p.name) : 'Unknown';
        if (!et.projects[projName]) et.projects[projName] = { hours: 0, otHours: 0 };
        et.projects[projName].hours += hrs;
        et.projects[projName].otHours += ot;
      });
    });

    // Build CSV
    let csv = 'Employee,Email,Role,Total Hours,Total OT,Project Breakdown\n';
    Object.values(empTotals).sort((a, b) => a.name.localeCompare(b.name)).forEach(et => {
      const breakdown = Object.entries(et.projects).map(([proj, hrs]) => `${proj}: ${hrs.hours}h${hrs.otHours ? ' +' + hrs.otHours + 'OT' : ''}`).join(' | ');
      csv += `"${et.name}","${et.email}","${et.role}",${et.totalHrs},${et.totalOT},"${breakdown}"\n`;
    });

    // Download
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `payroll_${weekStart}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Payroll export downloaded');
  });
}

// ── STARTUP CHECKLIST ────────────────────────────────────────
const CHECKLIST = [
  {phase:'Phase 1: Pre-Construction',items:['Contract executed and signed','Insurance certificates on file','Building permit obtained','Electrical permit obtained','Submittals submitted to engineer','Material procurement initiated','Power company POC established']},
  {phase:'Phase 2: Underground',items:['Underground layout marked','Conduit / ductbank installed','Underground grounding complete','Underground inspection called','Underground inspection passed']},
  {phase:'Phase 3: Rough-In',items:['Panel / equipment locations confirmed','In-wall rough-in complete','Overhead rough-in complete','Fire alarm rough-in complete','Low voltage rough-in complete','Rough-in inspection called','Rough-in inspection passed']},
  {phase:'Phase 4: Trim-Out',items:['Devices and receptacles installed','Fixtures installed','Panel trim-out complete','Fire alarm devices installed','Low voltage trim complete','Equipment startup complete']},
  {phase:'Phase 5: Closeout',items:['Final inspection called','Final inspection passed','Punch list complete','As-built drawings submitted','O&M manuals submitted','Final billing submitted']}
];

function ckKey(item){ return item.replace(/[^a-z0-9]/gi,'_').toLowerCase().slice(0,40); }

function renderStartup(p) {
  const checks = p.startupChecks || {};
  const total = CHECKLIST.reduce((n,ph) => n+ph.items.length, 0);
  const done = CHECKLIST.reduce((n,ph) => n+ph.items.filter(it => checks[ckKey(it)]).length, 0);
  const pct = Math.round(done/total*100);

  const phases = CHECKLIST.map(ph => {
    const phDone = ph.items.filter(it => checks[ckKey(it)]).length;
    const items = ph.items.map(it => {
      const k = ckKey(it), chk = checks[k]||false;
      return `<div class="check-item ${chk?'checked':''}" id="ci_${k}"><input type="checkbox" id="chk_${k}" ${chk?'checked':''} ${canEditProject() ? `onchange="toggleCheck('${p.id}','${k}',this.checked)"` : 'disabled'} ><label for="chk_${k}">${it}</label></div>`;
    }).join('');
    return `<div class="checklist-phase"><h4>${ph.phase} <span style="font-weight:400;font-size:0.8rem">${phDone}/${ph.items.length}</span></h4>${items}</div>`;
  }).join('');

  return `
    <div class="section-header"><h3>Startup Checklist</h3><span style="font-size:0.85rem;color:var(--text-secondary);font-weight:600" id="ckCount">${done}/${total} (${pct}%)</span></div>
    <div style="background:var(--border);border-radius:8px;height:8px;margin-bottom:24px;overflow:hidden"><div id="ckBar" style="background:linear-gradient(135deg,var(--accent-hex),var(--accent-light));height:100%;width:${pct}%;transition:width 0.3s;border-radius:8px"></div></div>
    ${phases}`;
}

function toggleCheck(projectId, key, checked) {
  const p = getProject(projectId);
  if (!p.startupChecks) p.startupChecks = {};
  p.startupChecks[key] = checked;
  saveData();
  const ci = document.getElementById('ci_'+key);
  if (ci) ci.classList.toggle('checked', checked);
  const checks = p.startupChecks;
  const total = CHECKLIST.reduce((n,ph) => n+ph.items.length, 0);
  const done = CHECKLIST.reduce((n,ph) => n+ph.items.filter(it => checks[ckKey(it)]).length, 0);
  const pct = Math.round(done/total*100);
  const countEl = document.getElementById('ckCount');
  if (countEl) countEl.textContent = `${done}/${total} (${pct}%)`;
  const barEl = document.getElementById('ckBar');
  if (barEl) barEl.style.width = pct+'%';
}

// ── BILLING ──────────────────────────────────────────────────
function ensureBilling(p) {
  if (!p.billing) p.billing = {};
  if (!p.billing.payApps) p.billing.payApps = [];
  if (!p.billing.retainagePct) p.billing.retainagePct = '10';
  if (!p.billing.retainageReleases) p.billing.retainageReleases = [];
  if (!p.billing.billingDay) p.billing.billingDay = '25';
}

function getBillingTotals(p) {
  ensureBilling(p);
  const originalContract = parseFloat(p.contractValue) || 0;
  const approvedCOs = getApprovedCOTotal(p);
  const adjustedContract = originalContract + approvedCOs;
  const retPct = parseFloat(p.billing.retainagePct) || 10;

  let totalBilled = 0, totalReceived = 0;
  p.billing.payApps.forEach(pa => {
    totalBilled += parseFloat(pa.amountBilled) || 0;
    totalReceived += parseFloat(pa.amountPaid) || 0;
  });

  const retainageHeld = totalBilled * (retPct / 100);
  const retainageReleased = (p.billing.retainageReleases || []).reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
  const retainageBalance = retainageHeld - retainageReleased;
  const remainingToBill = adjustedContract - totalBilled;
  const outstanding = totalBilled - retainageHeld - totalReceived + retainageReleased;

  return { originalContract, approvedCOs, adjustedContract, totalBilled, totalReceived, retainageHeld, retainageReleased, retainageBalance, remainingToBill, outstanding, retPct };
}

function getBillingIndicator(p) {
  const span = getProjectMonthSpan(p);
  if (!span.start || !span.end) return null;
  const totals = getBillingTotals(p);
  if (!totals.adjustedContract) return null;
  const now = new Date();
  const start = span.start;
  const end = span.end;
  const totalDays = Math.max(1, (end - start) / (1000*60*60*24));
  const elapsed = Math.max(0, Math.min((now - start) / (1000*60*60*24), totalDays));
  const pctSchedule = Math.round((elapsed / totalDays) * 100);
  const pctBilled = Math.round((totals.totalBilled / totals.adjustedContract) * 100);
  const diff = pctBilled - pctSchedule;
  let cls, label;
  if (diff >= 5) { cls = 'bill-over'; label = `Over-billing by ${diff}% (${pctBilled}% billed vs ${pctSchedule}% schedule)`; }
  else if (diff <= -10) { cls = 'bill-under'; label = `Under-billing by ${Math.abs(diff)}% (${pctBilled}% billed vs ${pctSchedule}% schedule) — cash flow risk`; }
  else { cls = 'bill-on-track'; label = `On track (${pctBilled}% billed, ${pctSchedule}% through schedule)`; }
  return { cls, label, pctBilled, pctSchedule };
}

function getAgingText(pa) {
  if (!pa.dateSubmitted) return '';
  if (pa.status === 'Paid' && pa.datePaid) {
    const d1 = new Date(pa.dateSubmitted + 'T00:00:00');
    const d2 = new Date(pa.datePaid + 'T00:00:00');
    const days = Math.round((d2 - d1) / (1000*60*60*24));
    const cls = days <= 30 ? 'bill-aging-ok' : (days <= 45 ? 'bill-aging-slow' : 'bill-aging-bad');
    return `<span class="${cls}">${days} days</span>`;
  }
  if (pa.status !== 'Paid' && pa.dateSubmitted) {
    const d1 = new Date(pa.dateSubmitted + 'T00:00:00');
    const days = Math.round((new Date() - d1) / (1000*60*60*24));
    if (days > 30) {
      const cls = days <= 45 ? 'bill-aging-slow' : 'bill-aging-bad';
      return `<span class="${cls}">${days} days outstanding</span>`;
    }
  }
  return '';
}

  const indicator = getBillingIndicator(p);
  const retPct = t.retPct;

  const pctRem = Math.max(0, 100 - pctBilled - pctRet);

  // Pay app rows
  const paRows = p.billing.payApps.length ? p.billing.payApps.map((pa, i) => {

    const statusCls = 'bill-pa-status-' + (pa.status || 'Submitted');

        <button class="btn btn-sm btn-danger" onclick="deletePayApp('${p.id}',${i})">Del</button>
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="11" class="table-empty">No pay applications yet</td></tr>`;

  // CO billing tracker
  const cos = (p.changeOrders || []).filter(c => c.status === 'Approved');
  const coRows = cos.length ? cos.map((c, ci) => {
    const origIdx = (p.changeOrders || []).indexOf(c);
    const billedIn = c.billedInPayApp || '';
    const isUnbilled = !billedIn;
    const paOpts = p.billing.payApps.map((pa, pi) => `<option value="${pa.number||pi+1}" ${billedIn===(pa.number||String(pi+1))?'selected':''}>PA #${pa.number||pi+1}</option>`).join('');
    return `<div class="bill-co-row ${isUnbilled?'bill-co-unbilled':''}">
      <div style="font-weight:700;min-width:50px">CO #${c.number||origIdx+1}</div>
      <div style="min-width:80px">${c.officialCONum ? 'Official #'+c.officialCONum : '<span style="color:#dc2626;font-weight:600;font-size:0.8rem">No Official #</span>'}</div>
      <div style="flex:1;color:var(--text-secondary)">${fmtMoney(c.amount)}</div>
      <div style="display:flex;align-items:center;gap:6px">
        <select onchange="setCOBilledIn('${p.id}',${origIdx},this.value)" style="padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:0.8rem">
          <option value="">Not Billed</option>
          ${paOpts}
        </select>
        ${isUnbilled ? '<span style="font-size:0.75rem;color:#dc2626;font-weight:700">UNBILLED</span>' : '<span style="font-size:0.75rem;color:#22c55e;font-weight:700">BILLED</span>'}

  // Pending COs
  const pendingCOs = (p.changeOrders || []).filter(c => c.status === 'Pending');
  const pendingHtml = pendingCOs.length ? `<div style="margin-top:12px"><div style="font-size:0.75rem;font-weight:700;color:#f59e0b;text-transform:uppercase;margin-bottom:6px">Pending COs (not yet approved — ${fmtMoney(pendingCOs.reduce((s,c)=>s+(parseFloat(c.amount)||0),0))} potential)</div>${pendingCOs.map(c => {
    const idx = (p.changeOrders||[]).indexOf(c);
    return `<div class="bill-co-row" style="opacity:0.6"><div style="font-weight:600;min-width:50px">CO #${c.number||idx+1}</div><div style="flex:1">${fmtMoney(c.amount)}</div><span class="status-badge" style="background:#fef3c7;color:#f59e0b">Pending</span></div>`;

  const retReleaseRows = (p.billing.retainageReleases || []).map((r, i) =>

      <div class="chip green"><div class="chip-icon">\u{1F4E4}</div><div class="chip-label">Total Billed</div><div class="chip-value">${fmtMoney(t.totalBilled)}</div></div>
      <div class="chip"><div class="chip-icon">\u{1F512}</div><div class="chip-label">Retainage Held</div><div class="chip-value">${fmtMoney(t.retainageBalance)}</div></div>
      <div class="chip"><div class="chip-icon">\u{1F4CB}</div><div class="chip-label">Remaining to Bill</div><div class="chip-value">${fmtMoney(t.remainingToBill)}</div></div>
    </div>

    ${indicator ? `<div class="bill-indicator ${indicator.cls}">${indicator.label}</div>` : ''}

    <div class="bill-progress">

      </div>

      </div>
      <div class="cf-control-group">
        <label>Billing Cutoff Day</label>
        <input type="number" value="${p.billing.billingDay||'25'}" style="width:70px" min="1" max="31" onblur="p=getProject('${p.id}');ensureBilling(p);p.billing.billingDay=this.value;saveData()">
      </div>
    </div>

    <div style="margin-bottom:24px">
      <div style="font-size:0.85rem;font-weight:700;color:var(--text);margin-bottom:8px">Pay Applications</div>
      <div style="overflow-x:auto">
        <table class="data-table desktop-table">
          <thead><tr><th>#</th><th>Period</th><th style="text-align:right">Billed</th><th style="text-align:right">Retainage</th><th style="text-align:right">Net</th><th>Status</th><th>Submitted</th><th>Paid</th><th style="text-align:right">Amt Paid</th><th style="text-align:center">Aging</th><th></th></tr></thead>
          <tbody>${paRows}</tbody>
        </table>
      </div>
      <div class="mobile-cards">${p.billing.payApps.length ? p.billing.payApps.map((pa, i) => {
        const amt = parseFloat(pa.amountBilled) || 0;
        const ret = amt * (retPct / 100);
        const net = amt - ret;
        const aging = getAgingText(pa);
        const statusCls = 'bill-pa-status-' + (pa.status || 'Submitted');
        return `<div class="mobile-card">
          <div class="mc-row"><div class="mc-title">PA #${pa.number||i+1}</div><span class="status-badge ${statusCls}">${pa.status||'Submitted'}</span></div>
          ${pa.periodFrom ? `<div class="mc-row"><span class="mc-label">Period</span><span class="mc-value" style="font-size:0.8rem">${fmtDate(pa.periodFrom)} – ${fmtDate(pa.periodTo)}</span></div>` : ''}
          <div class="mc-row"><span class="mc-label">Billed</span><span class="mc-value">${fmtMoney(amt)}</span></div>
          <div class="mc-row"><span class="mc-label">Retainage</span><span class="mc-value" style="color:#f59e0b">${fmtMoney(ret)}</span></div>
          <div class="mc-row"><span class="mc-label">Net</span><span class="mc-value">${fmtMoney(net)}</span></div>
          ${pa.dateSubmitted ? `<div class="mc-row"><span class="mc-label">Submitted</span><span class="mc-value">${fmtDate(pa.dateSubmitted)}</span></div>` : ''}
          ${pa.datePaid ? `<div class="mc-row"><span class="mc-label">Paid</span><span class="mc-value">${fmtDate(pa.datePaid)}</span></div>` : ''}
          ${pa.amountPaid ? `<div class="mc-row"><span class="mc-label">Amt Paid</span><span class="mc-value" style="color:#22c55e">${fmtMoney(pa.amountPaid)}</span></div>` : ''}
          ${aging ? `<div class="mc-row"><span class="mc-label">Aging</span><span class="mc-value">${aging}</span></div>` : ''}

            <button class="btn btn-sm btn-secondary" onclick="openPayAppModal('${p.id}',${i})">Edit</button>

            <button class="btn btn-sm btn-danger" onclick="deletePayApp('${p.id}',${i})">Del</button>
          </div>
        </div>`;

    ${coRows}

    ${retReleaseRows || '<p style="font-size:0.85rem;color:var(--text-muted)">No retainage released yet</p>'}`;
}

// ── MODAL HELPERS ────────────────────────────────────────────
function closeModal() {
  document.removeEventListener('keydown', fvKeyHandler);
  if (fvState._panMove) document.removeEventListener('mousemove', fvState._panMove);
  if (fvState._panUp) document.removeEventListener('mouseup', fvState._panUp);
  if (fvState.pdf) { fvState.pdf.destroy(); fvState.pdf = null; }
  fvState.fitScale = null;
  document.getElementById('modalContainer').innerHTML = '';
}

function modal(title, body, footer) {
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><h2>${title}</h2><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body">${body}</div>
        <div class="modal-footer">${footer}</div>
      </div>
    </div>`;
}

function sel(id, options, current) {
  return `<select id="${id}">${options.map(o=>`<option value="${o}" ${current===o?'selected':''}>${o}</option>`).join('')}</select>`;
}

function val(id) { const el=document.getElementById(id); return el?el.value:''; }

function fmtPhone(el) {
  const digits = el.value.replace(/\D/g, '').slice(0, 10);
  if (digits.length <= 3) el.value = digits;
  else if (digits.length <= 6) el.value = digits.slice(0,3) + '-' + digits.slice(3);
  else el.value = digits.slice(0,3) + '-' + digits.slice(3,6) + '-' + digits.slice(6);
}
function phoneAttr() { return 'type="tel" oninput="fmtPhone(this)" maxlength="12"'; }

async function saveProject(id) {
  const name = val('f_name').trim();
  if (!name) { alert('Project name is required.'); return; }
  const fields = ['jobNumber','status','name','client','address','pm','contractValue','startDate','completionDate','poNumber','inspectionPhone','buildingPermit','electricalPermit','dateUnderground','dateInwall','dateOverhead','dateFireAlarm','dateFinalElectrical','dateService','gcCompany','gcSeniorPmName','gcSeniorPmEmail','gcSeniorPmCell','gcPmName','gcPmEmail','gcPmCell','gcAsstPmName','gcAsstPmEmail','gcAsstPmCell','gcSuperName','gcSuperEmail','gcSuperCell','gcAsstSuperName','gcAsstSuperEmail','gcAsstSuperCell','notes'];
  // Save N/A inspections list
  const naVal = val('f_naInspections');
  const naList = naVal ? naVal.split(',').filter(Boolean) : [];

  if (id) {
    const p = getProject(id);
    fields.forEach(f => { p[f] = val('f_'+f); });
    p.naInspections = naList;
    // Clear date/passed for N/A'd inspections
    naList.forEach(key => { p[key] = ''; p[key+'Passed'] = false; });
    extractContacts(p);
    saveData();
    saveProject_cloud(p);
    closeModal(); showProject(id, currentTab); showToast('Project updated!');
  } else {
    const p = { id:genId(), subcontractors:[], changeOrders:[], submittals:[], materials:[], labor:[], startupChecks:{}, contracts:[], rfis:[], dailyLogs:[], punchList:[], billing:{}, notificationContacts:[], files:[], budget:{} };
    fields.forEach(f => { p[f] = val('f_'+f); });
    p.naInspections = naList;
    db.projects.push(p);
    extractContacts(p);
    saveData();
    saveProject_cloud(p);
    closeModal(); showDashboard(); showToast('Project created!');
  }
}

function deleteProject(id) {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  db.projects = db.projects.filter(p => p.id !== id);
  saveData();
  deleteProject_cloud(id).then(() => { _lastCloudHash = null; });
  closeModal(); showDashboard(); showToast('Project deleted.');
}

  const row = document.getElementById('insp_row_' + key);
  const btn = document.getElementById('na_btn_' + key);
  const input = document.getElementById('f_' + key);
  if (list.includes(key)) {

    row.style.opacity = '1';
    input.disabled = false;

     <div style="font-size:0.9rem;font-weight:700;color:var(--accent-hex);margin-bottom:10px">Backup</div>
     <div style="display:flex;gap:8px;flex-wrap:wrap">
       <button class="btn btn-secondary" onclick="exportData()">Export Backup</button>
       <label class="btn btn-secondary" style="cursor:pointer">Import Backup<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveSettings()">Save</button>`);
}

async function runDataMigration() {
  const statusEl = document.getElementById('migrationStatus');
  // Read from localStorage directly — that's where the old local data lives
  let localProjects = [];
  try {
    const raw = localStorage.getItem('electricalPM_v2');
    if (raw) { const parsed = JSON.parse(raw); localProjects = parsed.projects || []; }
  } catch(e) {}
  const projects = localProjects;
  if (!projects.length) { statusEl.innerHTML = '<div style="color:var(--text-muted)">No projects found in local storage.</div>'; return; }

  statusEl.innerHTML = `<div style="color:var(--accent-hex);font-weight:600">Migrating 0 / ${projects.length} projects...</div>`;
  let success = 0;
  let failed = 0;

  for (let i = 0; i < projects.length; i++) {
    statusEl.innerHTML = `<div style="color:var(--accent-hex);font-weight:600">Migrating ${i + 1} / ${projects.length}: ${projects[i].name || 'Unnamed'}...</div>`;
    try {
      console.log('Migrating:', projects[i].name, 'id:', projects[i].id);
      const row = projectToRow(projects[i]);
      console.log('Row built, pushing to cloud...');
      const result = await saveProject_cloud(projects[i]);
      console.log('Result:', result);
      if (result) { success++; } else { failed++; console.error('saveProject_cloud returned null for:', projects[i].name); }
    } catch (e) {
      console.error('Migration error for project:', projects[i].name, e);
      failed++;
    }
  }

  let msg = `<div style="color:#16a34a;font-weight:600">${success} project${success !== 1 ? 's' : ''} migrated to cloud!</div>`;
  if (failed > 0) msg += `<div style="color:#dc2626;font-weight:600">${failed} failed — check console for details.</div>`;
  else msg += `<div style="color:var(--text-secondary);font-size:0.78rem;margin-top:4px">Reloading in 3 seconds...</div>`;
  statusEl.innerHTML = msg;
  if (failed === 0) setTimeout(() => location.reload(), 3000);
}

function saveSettings() {
  const key = val('set_apiKey').trim();
  if (key) { localStorage.setItem('electricalPM_claudeKey', key); }
  else { localStorage.removeItem('electricalPM_claudeKey'); }

  // EmailJS settings
  const fields = [
    ['set_ejs_pubkey', 'electricalPM_emailjs_pubkey'],
    ['set_ejs_service', 'electricalPM_emailjs_service'],
    ['set_ejs_template', 'electricalPM_emailjs_template'],
    ['set_ejs_recipients', 'electricalPM_emailjs_recipients']
  ];
  fields.forEach(([inputId, storageKey]) => {
    const v = val(inputId).trim();
    if (v) localStorage.setItem(storageKey, v);
    else localStorage.removeItem(storageKey);
  });

  closeModal();
  showToast('Settings saved!');
}

// ── CONTACTS / AUTOCOMPLETE ──────────────────────────────────
function ensureContacts() {
  if (!db.contacts) db.contacts = { companies: [], supers: [], pms: [] };
}

function extractContacts(p) {
  ensureContacts();
  if (p.gcCompany && p.gcCompany.trim()) {
    const name = p.gcCompany.trim();
    if (!db.contacts.companies.includes(name)) db.contacts.companies.push(name);
  }
  if (p.gcSuperName && p.gcSuperName.trim()) {
    const existing = db.contacts.supers.find(s => s.name.toLowerCase() === p.gcSuperName.trim().toLowerCase());
    if (existing) {
      if (p.gcSuperEmail) existing.email = p.gcSuperEmail;
      if (p.gcSuperCell) existing.cell = p.gcSuperCell;
    } else {
      db.contacts.supers.push({ name: p.gcSuperName.trim(), email: p.gcSuperEmail||'', cell: p.gcSuperCell||'' });
    }
  }
  if (p.gcPmName && p.gcPmName.trim()) {
    const existing = db.contacts.pms.find(pm => pm.name.toLowerCase() === p.gcPmName.trim().toLowerCase());
    if (existing) {
      if (p.gcPmEmail) existing.email = p.gcPmEmail;
      if (p.gcPmCell) existing.cell = p.gcPmCell;
    } else {
      db.contacts.pms.push({ name: p.gcPmName.trim(), email: p.gcPmEmail||'', cell: p.gcPmCell||'' });
    }
  }
}

function extractSubContact(s) {
  ensureContacts();
  if (!db.contacts.subs) db.contacts.subs = [];
  if (s.company && s.company.trim()) {
    const existing = db.contacts.subs.find(x => x.company.toLowerCase() === s.company.trim().toLowerCase());
    if (existing) {
      if (s.trade) existing.trade = s.trade;
      if (s.contact) existing.contact = s.contact;
      if (s.email) existing.email = s.email;
      if (s.cell) existing.cell = s.cell;
    } else {
      db.contacts.subs.push({ company:s.company.trim(), trade:s.trade||'', contact:s.contact||'', email:s.email||'', cell:s.cell||'' });
    }
  }
}

function migrateContacts() {
  ensureContacts();
  if (!db.contacts.subs) db.contacts.subs = [];
  db.projects.forEach(p => {
    extractContacts(p);
    (p.subcontractors||[]).forEach(s => extractSubContact(s));
  });
}

function setVal(id, value) {
  const el = document.getElementById(id);
  if (el) el.value = value;
}

function closeAC() {
  const el = document.getElementById('ac_dropdown');
  if (el) el.remove();
}

function setupAC(inputId, getSuggestions, onSelect) {
  const input = document.getElementById(inputId);
  if (!input) return;
  input.setAttribute('autocomplete', 'off');

  function showDropdown() {
    closeAC();
    const suggestions = getSuggestions(input.value.trim());
    if (!suggestions.length) return;
    const rect = input.getBoundingClientRect();
    const dd = document.createElement('div');
    dd.id = 'ac_dropdown';
    dd.className = 'ac-dropdown';
    dd.style.top = (rect.bottom + 2) + 'px';
    dd.style.left = rect.left + 'px';
    dd.style.width = rect.width + 'px';
    suggestions.slice(0, 8).forEach(s => {
      const item = document.createElement('div');
      item.className = 'ac-item';
      const main = document.createElement('div');
      main.textContent = s.label || s.name || s;
      item.appendChild(main);
      if (s.email || s.cell) {
        const sub = document.createElement('div');
        sub.className = 'ac-sub';
        sub.textContent = [s.email, s.cell].filter(Boolean).join('  ·  ');
        item.appendChild(sub);
      }
      item.onmousedown = e => { e.preventDefault(); onSelect(s); closeAC(); };
      dd.appendChild(item);
    });
    document.body.appendChild(dd);
  }

  input.addEventListener('input', showDropdown);
  input.addEventListener('focus', showDropdown);
  input.addEventListener('blur', () => setTimeout(closeAC, 200));
  input.addEventListener('keydown', e => { if (e.key === 'Escape') closeAC(); });
}

function setupGCAutocomplete() {
  ensureContacts();
  setupAC('f_gcCompany',
    q => db.contacts.companies.filter(c => c.toLowerCase().includes(q.toLowerCase())).map(c => ({ label: c })),
    item => setVal('f_gcCompany', item.label)
  );
  setupAC('f_gcSuperName',
    q => db.contacts.supers.filter(s => s.name.toLowerCase().includes(q.toLowerCase())),
    item => { setVal('f_gcSuperName', item.name); if (item.email) setVal('f_gcSuperEmail', item.email); if (item.cell) setVal('f_gcSuperCell', item.cell); }
  );
  setupAC('f_gcPmName',
    q => db.contacts.pms.filter(p => p.name.toLowerCase().includes(q.toLowerCase())),
    item => { setVal('f_gcPmName', item.name); if (item.email) setVal('f_gcPmEmail', item.email); if (item.cell) setVal('f_gcPmCell', item.cell); }
  );
}

function setupSubAutocomplete() {
  ensureContacts();
  if (!db.contacts.subs) db.contacts.subs = [];
  setupAC('s_company',
    q => db.contacts.subs.filter(s => s.company.toLowerCase().includes(q.toLowerCase())).map(s => ({ label: s.company, email: s.email, cell: s.cell, contact: s.contact, trade: s.trade })),
    item => { setVal('s_company', item.label); if (item.contact) setVal('s_contact', item.contact); if (item.trade) setVal('s_trade', item.trade); if (item.email) setVal('s_email', item.email); if (item.cell) setVal('s_cell', item.cell); }
  );
  setupAC('s_contact',
    q => db.contacts.subs.filter(s => s.contact && s.contact.toLowerCase().includes(q.toLowerCase())).map(s => ({ label: s.contact, name: s.contact, email: s.email, cell: s.cell, company: s.company, trade: s.trade })),
    item => { setVal('s_contact', item.label); if (item.company) setVal('s_company', item.company); if (item.trade) setVal('s_trade', item.trade); if (item.email) setVal('s_email', item.email); if (item.cell) setVal('s_cell', item.cell); }
  );
}

// ── DAILY LOGS ───────────────────────────────────────────────
const WEATHER_OPTIONS = ['Clear','Partly Cloudy','Cloudy','Rain','Storms','Snow','Windy','Hot','Cold'];

function ensureDailyLogs(p) { if (!p.dailyLogs) p.dailyLogs = []; }

async function viewDLPhoto(projectId, logIdx, photoIdx) {
  const p = getProject(projectId);
  const ph = p.dailyLogs[logIdx].photos[photoIdx];
  if (!ph || !ph.data) return;
  const data = await fileGet(ph.data);
  if (!data) { showToast('Photo not found'); return; }
  openFileViewer(ph.name || 'Photo', data, ph.type || 'image/jpeg');
}

function renderDailyLogs(p) {
  ensureDailyLogs(p);
  const logs = p.dailyLogs.slice().sort((a,b) => b.date.localeCompare(a.date));

  const entries = logs.length ? logs.map((l, i) => {
    const realIdx = p.dailyLogs.indexOf(l);

    }).join('');

    const photoThumbs = (l.photos || []).map((ph, pi) =>
      `<img class="dl-photo-thumb" data-fileref="${ph.data}" src="" onclick="viewDLPhoto('${p.id}',${realIdx},${pi})" title="${ph.name||'Photo'}">`
    ).join('');

    return `<div class="dl-entry">
      <div class="dl-entry-header">
        <div class="dl-entry-date">${fmtDate(l.date)}</div>
        <div style="display:flex;gap:8px;align-items:center">
          ${l.weather ? `<span class="dl-weather">${l.weather}</span>` : ''}
          ${canEditProject() ? `<button class="btn btn-secondary btn-sm" onclick="openDailyLogModal('${p.id}',${realIdx})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteDailyLog('${p.id}',${realIdx})">Delete</button>` : ''}
        </div>
      </div>
      ${(l.crew && l.crew.length) ? `<div class="dl-section"><div class="dl-section-label">Crew on Site (${l.crew.length})</div><div class="dl-crew-tags">${crewTags}</div></div>` : ''}
      ${l.workPerformed ? `<div class="dl-section"><div class="dl-section-label">Work Performed</div><div class="dl-section-text">${l.workPerformed}</div></div>` : ''}
      ${l.delays ? `<div class="dl-section"><div class="dl-section-label">Delays / Issues</div><div class="dl-section-text" style="color:#dc2626">${l.delays}</div></div>` : ''}
      ${l.visitors ? `<div class="dl-section"><div class="dl-section-label">Visitors</div><div class="dl-section-text">${l.visitors}</div></div>` : ''}
      ${l.safetyNotes ? `<div class="dl-section"><div class="dl-section-label">Safety Notes</div><div class="dl-section-text">${l.safetyNotes}</div></div>` : ''}
      ${photoThumbs ? `<div class="dl-section"><div class="dl-section-label">Photos</div><div class="dl-photos">${photoThumbs}</div></div>` : ''}
    </div>`;
  }).join('') : '<div class="table-empty" style="padding:40px">No daily logs yet. Click "+ Add Log" to create your first entry.</div>';

  return `
    <div class="section-header"><h3>Daily Logs</h3>${canEditProject() ? `<button class="btn btn-primary btn-sm" onclick="openDailyLogModal('${p.id}')">+ Add Log</button>` : ''}</div>
    ${entries}`;
}

function openDailyLogModal(projectId, editIdx) {
  const p = getProject(projectId);
  ensureDailyLogs(p);
  const isEdit = editIdx != null && editIdx !== undefined;
  const l = isEdit ? p.dailyLogs[editIdx] : {};
  const today = new Date().toISOString().slice(0, 10);

  const weatherOpts = WEATHER_OPTIONS.map(w => `<option value="${w}" ${l.weather===w?'selected':''}>${w}</option>`).join('');

  // Crew checkboxes
  const crewChecks = (db.employees || []).map(e => {

    return `<div class="check-item" style="padding:4px 0"><input type="checkbox" id="dlc_${e.id}" ${checked}><label for="dlc_${e.id}">${e.name}</label></div>`;
  }).join('') || '<p style="font-size:0.85rem;color:var(--text-muted)">No employees — add them in Budget > Manage Employees</p>';

  const existingPhotos = (l.photos || []).length
    ? `<div style="margin-bottom:8px;font-size:0.82rem;color:#16a34a;font-weight:600">${l.photos.length} photo(s) attached</div>`
    : '';

  modal(isEdit ? 'Edit Daily Log' : 'New Daily Log',

       <div class="form-group"><label>Weather</label><select id="dl_weather"><option value="">Select...</option>${weatherOpts}</select></div>
     </div>
     <div class="form-group"><label>Crew on Site</label><div style="max-height:150px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;padding:8px" id="dl_crew_box">${crewChecks}</div></div>
     <div class="form-group"><label>Work Performed</label><textarea id="dl_work" rows="3" placeholder="What was accomplished today...">${l.workPerformed||''}</textarea></div>
     <div class="form-group"><label>Delays / Issues</label><textarea id="dl_delays" rows="2" placeholder="Any delays, weather issues, material shortages...">${l.delays||''}</textarea></div>
     <div class="form-group"><label>Visitors</label><input id="dl_visitors" value="${l.visitors||''}" placeholder="Inspectors, GC, owner, etc."></div>
     <div class="form-group"><label>Safety Notes</label><textarea id="dl_safety" rows="2" placeholder="Safety observations, incidents, toolbox talk topic...">${l.safetyNotes||''}</textarea></div>
     <div class="form-group"><label>Photos</label>
       ${existingPhotos}
       <input type="file" id="dl_photos" accept="image/*" multiple style="font-size:0.85rem">
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveDailyLog('${projectId}',${isEdit?editIdx:'null'})">Save</button>`);
}

function saveDailyLog(projectId, editIdx) {
  const p = getProject(projectId);
  ensureDailyLogs(p);
  const date = val('dl_date');
  if (!date) { alert('Date is required.'); return; }

  const crew = (db.employees || []).filter(e => {
    const cb = document.getElementById('dlc_' + e.id);
    return cb && cb.checked;
  }).map(e => e.id);

  const entry = {
    date,
    weather: val('dl_weather'),
    crew,
    workPerformed: val('dl_work'),
    delays: val('dl_delays'),
    visitors: val('dl_visitors'),
    safetyNotes: val('dl_safety'),
    photos: []
  };

  // Keep existing photos if editing
  const isEdit = editIdx !== null && editIdx !== 'null' && editIdx !== undefined;
  if (isEdit && p.dailyLogs[editIdx] && p.dailyLogs[editIdx].photos) {
    entry.photos = p.dailyLogs[editIdx].photos.slice();
  }

  // Process new photos — save to IndexedDB
  const fileInput = document.getElementById('dl_photos');
  if (fileInput && fileInput.files.length) {
    let remaining = fileInput.files.length;
    Array.from(fileInput.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const ref = await fileSave(e.target.result);
          entry.photos.push({ name: file.name, data: ref, type: file.type });
        } catch(err) { console.error(err); }
        remaining--;
        if (remaining === 0) {
          finishSaveDailyLog(p, entry, projectId, editIdx, isEdit);
        }
      };
      reader.readAsDataURL(file);
    });
  } else {
    finishSaveDailyLog(p, entry, projectId, editIdx, isEdit);
  }
}

function finishSaveDailyLog(p, entry, projectId, editIdx, isEdit) {
  if (isEdit) p.dailyLogs[editIdx] = entry;
  else p.dailyLogs.push(entry);
  saveData(); closeModal(); showProject(projectId, 'dailylogs'); showToast('Daily log saved!');
}

function deleteDailyLog(projectId, idx) {
  if (!confirm('Delete this daily log?')) return;
  getProject(projectId).dailyLogs.splice(idx, 1);
  saveData(); showProject(projectId, 'dailylogs'); showToast('Log deleted.');
}

// ── PUNCH LIST ───────────────────────────────────────────────
function ensurePunchList(p) { if (!p.punchList) p.punchList = []; }

function renderPunchList(p) {
  ensurePunchList(p);
  const items = p.punchList;
  const total = items.length;
  const done = items.filter(i => i.status === 'Complete').length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  const openItems = items.filter(i => i.status !== 'Complete').map((item, _) => {
    const realIdx = items.indexOf(item);
    return renderPunchItem(p, item, realIdx);
  }).join('');

  const doneItems = items.filter(i => i.status === 'Complete').map((item, _) => {
    const realIdx = items.indexOf(item);
    return renderPunchItem(p, item, realIdx);
  }).join('');

  return `
    <div class="section-header"><h3>Punch List</h3>${canEditProject() ? `<button class="btn btn-primary btn-sm" onclick="openPunchModal('${p.id}')">+ Add Item</button>` : ''}</div>
    ${total > 0 ? `<div class="pl-progress">
      <div class="pl-progress-bar"><div class="pl-progress-fill" style="width:${pct}%"></div></div>
      <span style="font-size:0.85rem;font-weight:700;color:var(--text-secondary)">${done}/${total} (${pct}%)</span>
    </div>` : ''}
    ${openItems || (total === 0 ? '<div class="table-empty" style="padding:40px">No punch list items yet. Click "+ Add Item" to get started.</div>' : '')}
    ${doneItems ? `<div style="margin-top:16px"><div style="font-size:0.78rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">Completed (${done}) ▾</div><div style="display:none">${doneItems}</div></div>` : ''}`;
}

function renderPunchItem(p, item, idx) {
  const isComplete = item.status === 'Complete';
  const priClass = 'pl-priority-' + (item.priority || 'Medium');
  const empName = item.assignedTo ? ((db.employees || []).find(e => e.id === item.assignedTo)?.name || '') : '';
  return `<div class="pl-item ${isComplete?'pl-complete':''}">
    <input type="checkbox" class="pl-item-check" ${isComplete?'checked':''} onchange="togglePunchItem('${p.id}',${idx},this.checked)">
    <div class="pl-item-body">
      <div class="pl-item-desc">${item.description}</div>
      <div class="pl-item-meta">
        ${item.location ? `<span>${item.location}</span>` : ''}
        ${item.priority ? `<span class="pl-priority ${priClass}">${item.priority}</span>` : ''}
        ${empName ? `<span class="ft-assign-badge">${empName}</span>` : ''}
        ${item.dateAdded ? `<span>Added ${fmtDate(item.dateAdded)}</span>` : ''}
        ${isComplete && item.dateCompleted ? `<span style="color:#16a34a">Done ${fmtDate(item.dateCompleted)}</span>` : ''}
      </div>
    </div>
    ${canEditProject() ? `<div style="display:flex;gap:4px">
      <button class="btn btn-secondary btn-sm" onclick="openPunchModal('${p.id}',${idx})">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deletePunchItem('${p.id}',${idx})">Del</button>
    </div>` : ''}
  </div>`;
}

function togglePunchItem(projectId, idx, checked) {
  const p = getProject(projectId);
  ensurePunchList(p);
  const item = p.punchList[idx];
  if (checked) {
    item.status = 'Complete';
    item.dateCompleted = new Date().toISOString().slice(0, 10);
  } else {
    item.status = 'Open';
    item.dateCompleted = '';
  }
  saveData(); showProject(projectId, 'punchlist');
}

function openPunchModal(projectId, editIdx) {
  const p = getProject(projectId);
  ensurePunchList(p);
  const isEdit = editIdx != null && editIdx !== undefined;
  const item = isEdit ? p.punchList[editIdx] : {};
  const empOpts = (db.employees || []).map(e => `<option value="${e.id}" ${item.assignedTo===e.id?'selected':''}>${e.name}</option>`).join('');
  const statusOpts = ['Open','In Progress','Complete'].map(s => `<option value="${s}" ${(item.status||'Open')===s?'selected':''}>${s}</option>`).join('');
  const priOpts = ['High','Medium','Low'].map(s => `<option value="${s}" ${(item.priority||'Medium')===s?'selected':''}>${s}</option>`).join('');

  modal(isEdit ? 'Edit Punch Item' : 'Add Punch Item',
    `<div class="form-group"><label>Description *</label><textarea id="pl_desc" rows="2" placeholder="What needs to be fixed or finished...">${item.description||''}</textarea></div>
     <div class="form-row">
       <div class="form-group"><label>Room / Location</label><input id="pl_loc" value="${item.location||''}" placeholder="e.g. Room 201, Mech Room, Lobby"></div>
       <div class="form-group"><label>Priority</label><select id="pl_pri">${priOpts}</select></div>
     </div>
     <div class="form-row">
       <div class="form-group"><label>Assigned To</label><select id="pl_assign"><option value="">Unassigned</option>${empOpts}</select></div>
       <div class="form-group"><label>Status</label><select id="pl_status">${statusOpts}</select></div>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="savePunchItem('${projectId}',${isEdit?editIdx:'null'})">Save</button>`);
}

function savePunchItem(projectId, editIdx) {
  const p = getProject(projectId);
  ensurePunchList(p);
  const desc = val('pl_desc').trim();
  if (!desc) { alert('Description is required.'); return; }
  const isEdit = editIdx !== null && editIdx !== 'null' && editIdx !== undefined;
  const item = {
    description: desc,
    location: val('pl_loc'),
    priority: val('pl_pri'),
    assignedTo: val('pl_assign'),
    status: val('pl_status'),
    dateAdded: isEdit ? (p.punchList[editIdx].dateAdded || new Date().toISOString().slice(0,10)) : new Date().toISOString().slice(0,10),
    dateCompleted: val('pl_status') === 'Complete' ? (isEdit && p.punchList[editIdx].dateCompleted ? p.punchList[editIdx].dateCompleted : new Date().toISOString().slice(0,10)) : ''
  };
  if (isEdit) p.punchList[editIdx] = item;
  else p.punchList.push(item);
  saveData(); closeModal(); showProject(projectId, 'punchlist'); showToast('Saved!');
}

function deletePunchItem(projectId, idx) {
  if (!confirm('Delete this punch list item?')) return;
